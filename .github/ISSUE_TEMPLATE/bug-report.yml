name: Bug 报告
description: 报告页面、试玩、投票、排序或数据错误
title: "[Bug] "
body:
  - type: input
    id: url
    attributes:
      label: 页面地址
      placeholder: https://llm-arcade.pages.dev/...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: "1. 打开……\n2. 点击……\n3. 出现……"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果与实际结果
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 设备与浏览器
      placeholder: iPhone 15 / Safari，Mac / Chrome 149
    validations:
      required: true
  - type: input
    id: entrant
    attributes:
      label: 涉及的赛道或作品
      placeholder: mario / glm5.2
  - type: textarea
    id: evidence
    attributes:
      label: 截图、录屏或控制台信息
      description: 可以直接拖入附件。请先删除账号、Cookie、Token 等敏感信息。
