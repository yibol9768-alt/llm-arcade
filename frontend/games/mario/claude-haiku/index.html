<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Game - Claude Haiku</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: white;
            font-size: 32px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .game-info {
            color: white;
            font-size: 18px;
            display: flex;
            gap: 30px;
            background: rgba(0,0,0,0.3);
            padding: 15px 30px;
            border-radius: 10px;
        }

        canvas {
            border: 3px solid #333;
            background: linear-gradient(to bottom, #87ceeb 0%, #87ceeb 60%, #90ee90 60%, #90ee90 100%);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .controls {
            color: white;
            background: rgba(0,0,0,0.3);
            padding: 15px 30px;
            border-radius: 10px;
            text-align: center;
            max-width: 800px;
        }

        .controls p {
            margin: 5px 0;
            font-size: 16px;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 1000;
            font-size: 28px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .game-over.show {
            display: block;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .reset-button {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 18px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .reset-button:hover {
            background: #ff5252;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍄 马里奥游戏 🍄</h1>
        <div class="game-info">
            <div>得分: <span id="score">0</span></div>
            <div>生命: <span id="lives">3</span></div>
            <div>关卡: <span id="level">1</span></div>
        </div>
        <div style="position: relative;">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <div class="game-over" id="gameOverScreen">
                <div id="gameOverText"></div>
                <button class="reset-button" onclick="resetGame()">重新开始</button>
            </div>
        </div>
        <div class="controls">
            <p>⌨️ 控制: 左右箭头键/A/D移动 | 空格/W 跳跃</p>
            <p>🎯 目标: 收集所有金币并击败敌人！</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏状态
        let gameState = 'playing';
        let score = 0;
        let lives = 3;
        let level = 1;
        let totalCoins = 0;
        let coinsCollected = 0;

        // 键盘状态
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.key] = true);
        window.addEventListener('keyup', (e) => keys[e.key] = false);

        // 玩家对象
        const player = {
            x: 50,
            y: 400,
            width: 30,
            height: 40,
            velocityY: 0,
            velocityX: 0,
            speed: 5,
            jumpPower: 15,
            isJumping: false,
            direction: 1
        };

        // 平台
        const platforms = [
            { x: 0, y: 550, width: 800, height: 50 }, // 地面
            { x: 100, y: 480, width: 200, height: 20 },
            { x: 500, y: 480, width: 200, height: 20 },
            { x: 250, y: 380, width: 150, height: 20 },
            { x: 550, y: 380, width: 150, height: 20 },
            { x: 150, y: 280, width: 200, height: 20 },
            { x: 500, y: 280, width: 200, height: 20 },
            { x: 350, y: 180, width: 100, height: 20 }
        ];

        // 敌人
        let enemies = [];
        function createEnemies() {
            enemies = [
                { x: 300, y: 430, width: 30, height: 30, speed: 2.5, direction: 1, type: 'turtle' },
                { x: 600, y: 330, width: 30, height: 30, speed: 2, direction: -1, type: 'mushroom' },
                { x: 200, y: 230, width: 30, height: 30, speed: 2.5, direction: 1, type: 'turtle' }
            ];
        }

        // 金币
        let coins = [];
        function createCoins() {
            coins = [
                { x: 150, y: 450, collected: false, size: 8 },
                { x: 250, y: 450, collected: false, size: 8 },
                { x: 550, y: 450, collected: false, size: 8 },
                { x: 650, y: 450, collected: false, size: 8 },
                { x: 300, y: 350, collected: false, size: 8 },
                { x: 450, y: 350, collected: false, size: 8 },
                { x: 600, y: 350, collected: false, size: 8 },
                { x: 200, y: 250, collected: false, size: 8 },
                { x: 350, y: 250, collected: false, size: 8 },
                { x: 550, y: 250, collected: false, size: 8 },
                { x: 400, y: 150, collected: false, size: 8 }
            ];
            totalCoins = coins.length;
            coinsCollected = 0;
        }

        // 初始化
        createEnemies();
        createCoins();

        // 碰撞检测
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // 更新玩家位置
        function updatePlayer() {
            // 水平移动
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                player.velocityX = -player.speed;
                player.direction = -1;
            } else if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                player.velocityX = player.speed;
                player.direction = 1;
            } else {
                player.velocityX = 0;
            }

            player.x += player.velocityX;

            // 边界检查
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            // 重力
            player.velocityY += 0.6;
            player.y += player.velocityY;

            // 平台碰撞
            let onPlatform = false;
            for (let platform of platforms) {
                if (checkCollision(player, platform)) {
                    if (player.velocityY >= 0 && player.y + player.height - player.velocityY <= platform.y + 5) {
                        player.y = platform.y - player.height;
                        player.velocityY = 0;
                        player.isJumping = false;
                        onPlatform = true;
                    }
                }
            }

            // 跳跃
            if ((keys[' '] || keys['w'] || keys['W']) && !player.isJumping && onPlatform) {
                player.velocityY = -player.jumpPower;
                player.isJumping = true;
            }

            // 掉出屏幕
            if (player.y > canvas.height) {
                loseLife();
            }
        }

        // 更新敌人
        function updateEnemies() {
            for (let enemy of enemies) {
                enemy.x += enemy.speed * enemy.direction;

                // 平台边界反弹
                for (let platform of platforms) {
                    if (enemy.y + enemy.height >= platform.y &&
                        enemy.y <= platform.y + platform.height &&
                        enemy.x + enemy.width >= platform.x &&
                        enemy.x <= platform.x + platform.width) {
                        if (enemy.x < platform.x + platform.width / 2) {
                            enemy.direction = -1;
                        } else {
                            enemy.direction = 1;
                        }
                    }
                }

                // 边界反弹
                if (enemy.x < 0 || enemy.x + enemy.width > canvas.width) {
                    enemy.direction *= -1;
                }

                // 与玩家碰撞
                if (checkCollision(player, enemy)) {
                    if (player.velocityY > 0 && player.y + player.height - player.velocityY < enemy.y + 10) {
                        // 踩到敌人
                        score += 100;
                        enemy.x = -100;
                        enemy.y = -100;
                    } else {
                        // 敌人伤害
                        loseLife();
                    }
                }
            }
        }

        // 更新金币
        function updateCoins() {
            for (let coin of coins) {
                if (!coin.collected && checkCollision(player, coin)) {
                    coin.collected = true;
                    score += 10;
                    coinsCollected++;
                }
            }

            if (coinsCollected === totalCoins && enemies.every(e => e.x < 0)) {
                gameState = 'won';
                showGameOver(true);
            }
        }

        // 失去一条生命
        function loseLife() {
            lives--;
            if (lives <= 0) {
                gameState = 'gameover';
                showGameOver(false);
            } else {
                player.x = 50;
                player.y = 400;
                player.velocityY = 0;
            }
        }

        // 显示游戏结束
        function showGameOver(won) {
            const screen = document.getElementById('gameOverScreen');
            const text = document.getElementById('gameOverText');
            if (won) {
                text.innerHTML = `🎉 恭喜！<br>你赢了！<br>最终得分: ${score}`;
            } else {
                text.innerHTML = `💀 游戏结束<br>最终得分: ${score}`;
            }
            screen.classList.add('show');
        }

        // 重置游戏
        function resetGame() {
            gameState = 'playing';
            score = 0;
            lives = 3;
            level = 1;
            player.x = 50;
            player.y = 400;
            player.velocityY = 0;
            player.velocityX = 0;
            createEnemies();
            createCoins();
            document.getElementById('gameOverScreen').classList.remove('show');
        }

        // 绘制玩家
        function drawPlayer() {
            // 身体
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // 头
            ctx.fillStyle = '#ffdbac';
            ctx.fillRect(player.x + 3, player.y - 8, player.width - 6, 10);

            // 眼睛
            ctx.fillStyle = '#000';
            if (player.direction > 0) {
                ctx.fillRect(player.x + 8, player.y - 5, 4, 4);
            } else {
                ctx.fillRect(player.x + player.width - 12, player.y - 5, 4, 4);
            }

            // 胡须
            ctx.fillStyle = '#000';
            ctx.fillRect(player.x + 5, player.y - 3, 8, 2);
        }

        // 绘制平台
        function drawPlatforms() {
            ctx.fillStyle = '#8b4513';
            for (let platform of platforms) {
                // 平台主体
                ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
                // 边框
                ctx.strokeStyle = '#654321';
                ctx.lineWidth = 2;
                ctx.strokeRect(platform.x, platform.y, platform.width, platform.height);
            }
        }

        // 绘制敌人
        function drawEnemies() {
            for (let enemy of enemies) {
                if (enemy.type === 'turtle') {
                    // 龟壳
                    ctx.fillStyle = '#228b22';
                    ctx.beginPath();
                    ctx.ellipse(enemy.x + enemy.width / 2, enemy.y + 8, enemy.width / 2, 8, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 头
                    ctx.fillStyle = '#32cd32';
                    ctx.fillRect(enemy.x + 6, enemy.y + 10, 18, 12);
                    // 眼睛
                    ctx.fillStyle = '#000';
                    ctx.fillRect(enemy.x + 10, enemy.y + 13, 3, 3);
                    ctx.fillRect(enemy.x + 17, enemy.y + 13, 3, 3);
                } else if (enemy.type === 'mushroom') {
                    // 蘑菇
                    ctx.fillStyle = '#ff1493';
                    ctx.beginPath();
                    ctx.arc(enemy.x + 15, enemy.y + 10, 12, 0, Math.PI * 2);
                    ctx.fill();
                    // 茎
                    ctx.fillStyle = '#8b4513';
                    ctx.fillRect(enemy.x + 12, enemy.y + 20, 6, 10);
                    // 眼睛
                    ctx.fillStyle = '#000';
                    ctx.fillRect(enemy.x + 10, enemy.y + 8, 4, 4);
                    ctx.fillRect(enemy.x + 16, enemy.y + 8, 4, 4);
                }
            }
        }

        // 绘制金币
        function drawCoins() {
            for (let coin of coins) {
                if (!coin.collected) {
                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath();
                    ctx.arc(coin.x, coin.y, coin.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#daa520';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }
        }

        // 主游戏循环
        function gameLoop() {
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState === 'playing') {
                updatePlayer();
                updateEnemies();
                updateCoins();
            }

            // 绘制
            drawPlatforms();
            drawEnemies();
            drawCoins();
            drawPlayer();

            // 更新UI
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('level').textContent = level;

            requestAnimationFrame(gameLoop);
        }

        // 启动游戏
        gameLoop();
    </script>
</body>
</html>
