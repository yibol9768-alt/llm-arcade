<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>九大行星立体探索</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-0: #02040a;
      --bg-1: #07101e;
      --bg-2: #111d35;
      --panel: rgba(9, 13, 24, 0.68);
      --panel-border: rgba(172, 196, 255, 0.16);
      --text: #ecf2ff;
      --muted: rgba(232, 240, 255, 0.72);
      --accent: #7fd1ff;
      --accent-2: #f6c56d;
      --good: #6ee7b7;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(58, 74, 135, 0.22), transparent 28%),
        radial-gradient(circle at 20% 25%, rgba(22, 85, 146, 0.16), transparent 18%),
        linear-gradient(160deg, var(--bg-0), var(--bg-1) 55%, var(--bg-2));
      color: var(--text);
      font-family: "HarmonyOS Sans SC", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(72, 105, 195, 0.12), transparent 36%),
        radial-gradient(circle at 15% 80%, rgba(55, 198, 178, 0.08), transparent 20%),
        linear-gradient(180deg, rgba(2, 5, 12, 0.8), rgba(3, 7, 15, 0.96));
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: grab;
    }

    canvas:active {
      cursor: grabbing;
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .panel {
      pointer-events: auto;
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(15, 21, 38, 0.76), rgba(8, 10, 18, 0.62));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .topbar {
      position: absolute;
      top: 18px;
      left: 18px;
      right: 18px;
      display: flex;
      gap: 14px;
      justify-content: space-between;
      align-items: flex-start;
    }

    .hero {
      padding: 16px 18px 15px;
      max-width: min(560px, calc(100vw - 36px));
    }

    .title {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 10px;
      margin: 0 0 8px;
      font-size: clamp(20px, 2.2vw, 30px);
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .title small {
      font-size: 12px;
      font-weight: 600;
      color: rgba(243, 247, 255, 0.65);
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .intro {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 13px;
    }

    .controls {
      padding: 14px 14px 12px;
      width: min(410px, calc(100vw - 36px));
    }

    .controls-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px 12px;
      align-items: center;
    }

    .label {
      font-size: 12px;
      color: rgba(233, 240, 255, 0.84);
    }

    .value {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.72);
      text-align: right;
      min-width: 68px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 1px solid rgba(153, 185, 255, 0.24);
      border-radius: 12px;
      padding: 10px 12px;
      background: linear-gradient(180deg, rgba(38, 52, 86, 0.88), rgba(19, 25, 40, 0.94));
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(124, 207, 255, 0.46);
      background: linear-gradient(180deg, rgba(48, 66, 110, 0.96), rgba(22, 29, 48, 0.98));
    }

    button:active {
      transform: translateY(0);
    }

    .hud {
      position: absolute;
      left: 18px;
      bottom: 18px;
      width: min(360px, calc(100vw - 36px));
      padding: 16px 16px 14px;
    }

    .hud h2 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0.02em;
    }

    .hud .meta {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 7px 10px;
      align-items: start;
      font-size: 13px;
      line-height: 1.45;
    }

    .hud .k {
      color: rgba(237, 243, 255, 0.62);
    }

    .hud .v {
      color: rgba(245, 249, 255, 0.95);
    }

    .tips {
      position: absolute;
      right: 18px;
      bottom: 18px;
      width: min(292px, calc(100vw - 36px));
      padding: 14px 15px 13px;
      color: rgba(236, 242, 255, 0.86);
      font-size: 12.5px;
      line-height: 1.6;
    }

    .tips strong {
      color: #ffffff;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .chip {
      padding: 6px 9px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: rgba(245, 248, 255, 0.92);
      font-size: 11px;
    }

    .scene-note {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(244, 249, 255, 0.12);
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    @media (max-width: 760px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        width: min(100%, calc(100vw - 36px));
      }

      .hud,
      .tips {
        position: absolute;
        width: min(100%, calc(100vw - 36px));
      }

      .tips {
        bottom: 18px;
        top: auto;
      }

      .hud {
        bottom: auto;
        top: 190px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="stage" aria-label="太阳系九大行星探索画布"></canvas>

    <div class="overlay">
      <div class="topbar">
        <section class="panel hero">
          <h1 class="title">九大行星立体探索 <small>包含冥王星</small></h1>
          <p class="intro">
            太阳位于中心，九大天体围绕公转。拖拽旋转视角，滚轮缩放，点击任意行星可聚焦并查看中文信息。
            所有轨道与尺寸均为压缩后的可视化比例，保证在有限场景内连续运行。
          </p>
        </section>

        <section class="panel controls">
          <div class="controls-grid">
            <div class="label">公转速度</div>
            <div class="value" id="speedText">1.00x</div>
            <input id="speed" type="range" min="0.15" max="3.5" step="0.01" value="1" style="grid-column: 1 / -1;" />
            <div class="label">当前状态</div>
            <div class="value" id="statusText">自由探索</div>
          </div>
          <div class="buttons">
            <button id="togglePause" type="button">暂停</button>
            <button id="resetView" type="button">重置视角</button>
          </div>
        </section>
      </div>

      <section class="panel hud" id="infoPanel">
        <h2 id="planetTitle">未选中行星</h2>
        <div class="meta">
          <div class="k">名称</div><div class="v" id="infoName">点击任意行星开始探索</div>
          <div class="k">轨道半径</div><div class="v" id="infoRadius">-</div>
          <div class="k">模拟周期</div><div class="v" id="infoPeriod">-</div>
          <div class="k">特征</div><div class="v" id="infoDesc">太阳系九大行星会持续公转，支持拖拽、缩放和聚焦。</div>
        </div>
      </section>

      <section class="panel tips">
        <div><strong>操作：</strong>鼠标拖拽旋转，滚轮缩放，点击行星聚焦；触屏可单指拖动、双指缩放。</div>
        <div class="chip-row">
          <span class="chip">太阳居中</span>
          <span class="chip">九行星公转</span>
          <span class="chip">土星带环</span>
          <span class="chip">中文信息面板</span>
        </div>
      </section>

      <div class="scene-note">SOLAR SYSTEM</div>
    </div>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById('stage');
      const ctx = canvas.getContext('2d', { alpha: false });
      const speedInput = document.getElementById('speed');
      const speedText = document.getElementById('speedText');
      const statusText = document.getElementById('statusText');
      const togglePause = document.getElementById('togglePause');
      const resetView = document.getElementById('resetView');
      const planetTitle = document.getElementById('planetTitle');
      const infoName = document.getElementById('infoName');
      const infoRadius = document.getElementById('infoRadius');
      const infoPeriod = document.getElementById('infoPeriod');
      const infoDesc = document.getElementById('infoDesc');

      const DPR = () => Math.max(1, Math.min(2.25, window.devicePixelRatio || 1));
      let width = 0;
      let height = 0;
      let dpr = DPR();

      const ORIGIN = { x: 0, y: 0, z: 0 };
      const TAU = Math.PI * 2;
      const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
      const lerp = (a, b, t) => a + (b - a) * t;
      const lerpVec = (a, b, t) => ({
        x: lerp(a.x, b.x, t),
        y: lerp(a.y, b.y, t),
        z: lerp(a.z, b.z, t),
      });
      const sub = (a, b) => ({ x: a.x - b.x, y: a.y - b.y, z: a.z - b.z });
      const add = (a, b) => ({ x: a.x + b.x, y: a.y + b.y, z: a.z + b.z });
      const dot = (a, b) => a.x * b.x + a.y * b.y + a.z * b.z;
      const cross = (a, b) => ({
        x: a.y * b.z - a.z * b.y,
        y: a.z * b.x - a.x * b.z,
        z: a.x * b.y - a.y * b.x,
      });
      const length = (v) => Math.hypot(v.x, v.y, v.z);
      const normalize = (v) => {
        const len = length(v) || 1;
        return { x: v.x / len, y: v.y / len, z: v.z / len };
      };

      const planets = [
        {
          id: 'mercury',
          name: '水星',
          latin: 'Mercury',
          orbitRadius: 48,
          radius: 4.3,
          period: 4.3,
          inclination: 0.12,
          colorA: '#e3d4b9',
          colorB: '#907f6e',
          accent: '#f2e7d0',
          description: '离太阳最近的岩质行星，表面布满撞击坑，昼夜温差极大。',
          type: 'rocky',
          labelBias: 8,
        },
        {
          id: 'venus',
          name: '金星',
          latin: 'Venus',
          orbitRadius: 66,
          radius: 6.4,
          period: 6.2,
          inclination: 0.28,
          colorA: '#f5d08c',
          colorB: '#b97d3f',
          accent: '#fff2cc',
          description: '厚厚云层包裹的炽热行星，视觉上呈现温暖的金橙色光泽。',
          type: 'cloudy',
          labelBias: 10,
        },
        {
          id: 'earth',
          name: '地球',
          latin: 'Earth',
          orbitRadius: 86,
          radius: 6.9,
          period: 7.8,
          inclination: 0.0,
          colorA: '#69a9ff',
          colorB: '#1a4f9f',
          accent: '#8df3c9',
          description: '蓝绿相间的居住世界，带有海洋、云层与陆地色块。',
          type: 'earth',
          labelBias: 10,
        },
        {
          id: 'mars',
          name: '火星',
          latin: 'Mars',
          orbitRadius: 106,
          radius: 5.8,
          period: 9.4,
          inclination: 0.32,
          colorA: '#ffb08a',
          colorB: '#b84d3c',
          accent: '#ffd4bf',
          description: '红色表面与暗色地貌并存，极冠和荒漠纹理清晰可见。',
          type: 'rocky',
          labelBias: 10,
        },
        {
          id: 'jupiter',
          name: '木星',
          latin: 'Jupiter',
          orbitRadius: 142,
          radius: 15.6,
          period: 14.9,
          inclination: 0.18,
          colorA: '#f0c59b',
          colorB: '#a86b3b',
          accent: '#fff0db',
          description: '最大的气体巨行星，具有显著的条纹与巨大的体量感。',
          type: 'gas',
          labelBias: 14,
        },
        {
          id: 'saturn',
          name: '土星',
          latin: 'Saturn',
          orbitRadius: 178,
          radius: 13.2,
          period: 18.4,
          inclination: 0.25,
          colorA: '#f3d59b',
          colorB: '#b48b56',
          accent: '#fff6df',
          description: '最具辨识度的行星之一，拥有宽阔而优雅的行星环。',
          type: 'ringed',
          labelBias: 15,
          ring: {
            radius: 23,
            thickness: 6,
            tiltX: 0.7,
            tiltY: 0.25,
            color: '#efe1bf',
            color2: '#caa96e',
          },
        },
        {
          id: 'uranus',
          name: '天王星',
          latin: 'Uranus',
          orbitRadius: 212,
          radius: 10.2,
          period: 22.6,
          inclination: 0.38,
          colorA: '#9fe8ff',
          colorB: '#4ca0d8',
          accent: '#e4ffff',
          description: '冰巨行星，整体色调偏青蓝，给人寒冷而安静的感觉。',
          type: 'ice',
          labelBias: 12,
        },
        {
          id: 'neptune',
          name: '海王星',
          latin: 'Neptune',
          orbitRadius: 246,
          radius: 10.0,
          period: 26.8,
          inclination: 0.55,
          colorA: '#72a3ff',
          colorB: '#1b46b8',
          accent: '#bcd3ff',
          description: '深蓝色冰巨行星，公转缓慢，颜色最接近夜空本身。',
          type: 'ice',
          labelBias: 12,
        },
        {
          id: 'pluto',
          name: '冥王星',
          latin: 'Pluto',
          orbitRadius: 274,
          radius: 4.0,
          period: 31.2,
          inclination: 0.9,
          colorA: '#ddd3c1',
          colorB: '#8f7f6a',
          accent: '#f6efe0',
          description: '矮行星冥王星位于最外层，轨道倾角更明显，具探索感。',
          type: 'dwarf',
          labelBias: 8,
        },
      ];

      const starCount = 340;
      const stars = [];
      const starSeed = 7919;
      function seeded(i) {
        const x = Math.sin(i * 12.9898 + starSeed) * 43758.5453;
        return x - Math.floor(x);
      }
      for (let i = 0; i < starCount; i++) {
        const u = seeded(i * 2 + 1);
        const v = seeded(i * 2 + 2);
        const theta = u * TAU;
        const phi = Math.acos(2 * v - 1);
        const radius = 2200 + seeded(i * 3 + 3) * 1800;
        const x = radius * Math.sin(phi) * Math.cos(theta);
        const y = radius * Math.cos(phi) * 0.75;
        const z = radius * Math.sin(phi) * Math.sin(theta);
        stars.push({
          x, y, z,
          size: 0.8 + seeded(i * 5 + 4) * 1.8,
          alpha: 0.35 + seeded(i * 7 + 5) * 0.55,
          tw: 0.6 + seeded(i * 11 + 6) * 1.8,
          hue: 200 + seeded(i * 13 + 7) * 40,
        });
      }

      const view = {
        yaw: 0.78,
        pitch: 0.28,
        distance: 540,
        target: { x: 0, y: 0, z: 0 },
        goalYaw: 0.78,
        goalPitch: 0.28,
        goalDistance: 540,
        goalTarget: { x: 0, y: 0, z: 0 },
        paused: false,
        speed: 1,
        focusIndex: -1,
      };

      let simTime = 0;
      let lastFrame = performance.now();

      function resize() {
        dpr = DPR();
        width = Math.max(1, window.innerWidth);
        height = Math.max(1, window.innerHeight);
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      window.addEventListener('resize', resize, { passive: true });
      resize();

      function orbitPosition(planet, time) {
        const angle = time / planet.period * TAU + planet.id.length * 0.31;
        const x = Math.cos(angle) * planet.orbitRadius;
        const z = Math.sin(angle) * planet.orbitRadius;
        const cosI = Math.cos(planet.inclination);
        const sinI = Math.sin(planet.inclination);
        const y = -z * sinI;
        const zz = z * cosI;
        return { x, y, z: zz };
      }

      function ringPosition(ring, angle) {
        const x = Math.cos(angle) * ring.radius;
        const z = Math.sin(angle) * ring.radius;
        const cosX = Math.cos(ring.tiltX);
        const sinX = Math.sin(ring.tiltX);
        const cosY = Math.cos(ring.tiltY);
        const sinY = Math.sin(ring.tiltY);

        let px = x;
        let py = 0;
        let pz = z;

        let y1 = py * cosX - pz * sinX;
        let z1 = py * sinX + pz * cosX;
        let x2 = px * cosY + z1 * sinY;
        let z2 = -px * sinY + z1 * cosY;
        return { x: x2, y: y1, z: z2 };
      }

      function cameraState() {
        const cy = Math.cos(view.yaw);
        const sy = Math.sin(view.yaw);
        const cp = Math.cos(view.pitch);
        const sp = Math.sin(view.pitch);
        const position = {
          x: view.target.x + view.distance * cp * sy,
          y: view.target.y + view.distance * sp,
          z: view.target.z + view.distance * cp * cy,
        };
        const forward = normalize(sub(view.target, position));
        const right = normalize(cross(forward, { x: 0, y: 1, z: 0 }));
        const up = cross(right, forward);
        return { position, forward, right, up };
      }

      function project(world, cam) {
        const v = sub(world, cam.position);
        const x = dot(v, cam.right);
        const y = dot(v, cam.up);
        const z = dot(v, cam.forward);
        if (z <= 2) return null;
        const focal = Math.min(width, height) * 0.84;
        const scale = focal / z;
        return {
          x: width * 0.5 + x * scale,
          y: height * 0.5 - y * scale,
          scale,
          depth: z,
        };
      }

      function planetWorld(planet, time) {
        return add(orbitPosition(planet, time), ORIGIN);
      }

      function drawBackground(cam) {
        const bg = ctx.createRadialGradient(width * 0.5, height * 0.45, 0, width * 0.5, height * 0.45, Math.max(width, height) * 0.9);
        bg.addColorStop(0, '#10264a');
        bg.addColorStop(0.28, '#07111f');
        bg.addColorStop(1, '#02040a');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, width, height);

        const vignette = ctx.createRadialGradient(width * 0.5, height * 0.5, Math.min(width, height) * 0.2, width * 0.5, height * 0.5, Math.max(width, height) * 0.72);
        vignette.addColorStop(0, 'rgba(255,255,255,0.01)');
        vignette.addColorStop(0.7, 'rgba(0,0,0,0.0)');
        vignette.addColorStop(1, 'rgba(0,0,0,0.4)');
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, width, height);

        const starFade = Math.min(1, 460 / view.distance);
        for (const star of stars) {
          const twinkle = 0.65 + 0.35 * Math.sin(simTime * star.tw + star.x * 0.0004);
          const proj = project(star, cam);
          if (!proj) continue;
          const alpha = star.alpha * twinkle * starFade;
          if (alpha < 0.05) continue;
          ctx.fillStyle = `hsla(${star.hue}, 80%, 88%, ${alpha})`;
          ctx.beginPath();
          ctx.arc(proj.x, proj.y, star.size * (0.6 + proj.scale * 0.02), 0, TAU);
          ctx.fill();
        }
      }

      function drawOrbit(planet, cam, selected) {
        const segments = 120;
        const points = [];
        const focusBoost = selected ? 1 : 0;
        for (let i = 0; i <= segments; i++) {
          const a = (i / segments) * TAU;
          const x = Math.cos(a) * planet.orbitRadius;
          const z = Math.sin(a) * planet.orbitRadius;
          const cosI = Math.cos(planet.inclination);
          const sinI = Math.sin(planet.inclination);
          const y = -z * sinI;
          const zz = z * cosI;
          const p = project({ x, y, z: zz }, cam);
          if (p) points.push(p);
        }
        if (points.length < 2) return;

        ctx.save();
        ctx.lineWidth = selected ? 1.8 : 1.05;
        ctx.strokeStyle = selected ? 'rgba(183, 230, 255, 0.42)' : 'rgba(165, 202, 255, 0.16)';
        ctx.shadowColor = selected ? 'rgba(105, 218, 255, 0.34)' : 'transparent';
        ctx.shadowBlur = selected ? 10 : 0;
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(points[i].x, points[i].y);
        }
        ctx.stroke();

        if (focusBoost) {
          ctx.strokeStyle = 'rgba(127, 210, 255, 0.07)';
          ctx.lineWidth = 8;
          ctx.beginPath();
          ctx.moveTo(points[0].x, points[0].y);
          for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawSun(cam, sunScreen) {
        if (!sunScreen) return;
        const r = Math.max(28, 30 * sunScreen.scale);

        ctx.save();
        const glow = ctx.createRadialGradient(sunScreen.x, sunScreen.y, 0, sunScreen.x, sunScreen.y, r * 5.5);
        glow.addColorStop(0, 'rgba(255, 245, 201, 0.95)');
        glow.addColorStop(0.18, 'rgba(255, 214, 112, 0.72)');
        glow.addColorStop(0.46, 'rgba(255, 166, 64, 0.22)');
        glow.addColorStop(1, 'rgba(255, 134, 26, 0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(sunScreen.x, sunScreen.y, r * 5.5, 0, TAU);
        ctx.fill();

        const body = ctx.createRadialGradient(
          sunScreen.x - r * 0.24,
          sunScreen.y - r * 0.28,
          r * 0.2,
          sunScreen.x,
          sunScreen.y,
          r
        );
        body.addColorStop(0, '#fffdf3');
        body.addColorStop(0.35, '#ffe78a');
        body.addColorStop(0.72, '#ffba45');
        body.addColorStop(1, '#f36b14');
        ctx.fillStyle = body;
        ctx.beginPath();
        ctx.arc(sunScreen.x, sunScreen.y, r, 0, TAU);
        ctx.fill();

        ctx.globalCompositeOperation = 'lighter';
        ctx.strokeStyle = 'rgba(255,255,255,0.14)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(sunScreen.x, sunScreen.y, r * 1.02, 0, TAU);
        ctx.stroke();
        ctx.globalCompositeOperation = 'source-over';
        ctx.restore();

        ctx.save();
        ctx.font = '700 12px "HarmonyOS Sans SC", "PingFang SC", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(255, 205, 88, 0.55)';
        ctx.shadowBlur = 12;
        ctx.fillStyle = 'rgba(255, 248, 220, 0.92)';
        ctx.fillText('太阳', sunScreen.x, sunScreen.y + r + 16);
        ctx.restore();
      }

      function drawCraterTexture(cx, cy, r, baseColor) {
        ctx.save();
        ctx.fillStyle = baseColor;
        for (let i = 0; i < 6; i++) {
          const angle = i * 1.9;
          const rr = r * (0.12 + i * 0.02);
          const x = cx + Math.cos(angle) * r * 0.24;
          const y = cy + Math.sin(angle) * r * 0.18;
          ctx.beginPath();
          ctx.globalAlpha = 0.14 + i * 0.03;
          ctx.arc(x, y, rr, 0, TAU);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.restore();
      }

      function drawPlanetBody(planet, screen, focus, depthFactor) {
        const bodyRadius = Math.max(3.1, planet.radius * screen.scale * (0.98 + depthFactor * 0.05));
        const x = screen.x;
        const y = screen.y;
        const sunScreen = project(ORIGIN, cameraState());
        const dx = sunScreen ? sunScreen.x - x : -1;
        const dy = sunScreen ? sunScreen.y - y : -0.7;
        const len = Math.hypot(dx, dy) || 1;
        const hx = x + (dx / len) * bodyRadius * 0.35;
        const hy = y + (dy / len) * bodyRadius * 0.35;

        ctx.save();
        ctx.shadowColor = focus ? 'rgba(135, 232, 255, 0.56)' : 'rgba(0, 0, 0, 0.4)';
        ctx.shadowBlur = focus ? 20 : 8;
        ctx.beginPath();
        ctx.arc(x, y, bodyRadius, 0, TAU);
        ctx.clip();

        const grad = ctx.createRadialGradient(hx, hy, bodyRadius * 0.12, x, y, bodyRadius);
        grad.addColorStop(0, planet.accent);
        grad.addColorStop(0.38, planet.colorA);
        grad.addColorStop(1, planet.colorB);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, bodyRadius, 0, TAU);
        ctx.fill();

        if (planet.type === 'gas') {
          ctx.globalAlpha = 0.7;
          const bands = [
            'rgba(255,255,255,0.18)',
            'rgba(136, 91, 54, 0.18)',
            'rgba(255, 220, 170, 0.12)',
            'rgba(124, 73, 33, 0.14)',
          ];
          for (let i = -3; i <= 3; i++) {
            ctx.fillStyle = bands[(i + bands.length) % bands.length];
            ctx.fillRect(x - bodyRadius, y + i * bodyRadius * 0.22, bodyRadius * 2, bodyRadius * 0.08);
          }
          ctx.globalAlpha = 1;
        } else if (planet.type === 'cloudy') {
          ctx.globalAlpha = 0.4;
          ctx.strokeStyle = 'rgba(255,255,255,0.24)';
          ctx.lineWidth = Math.max(1, bodyRadius * 0.06);
          for (let i = 0; i < 4; i++) {
            ctx.beginPath();
            ctx.arc(x - bodyRadius * 0.05, y + (i - 1.5) * bodyRadius * 0.14, bodyRadius * (0.55 + i * 0.04), -0.1, 2.3);
            ctx.stroke();
          }
          ctx.globalAlpha = 1;
        } else if (planet.type === 'earth') {
          ctx.globalAlpha = 0.9;
          ctx.fillStyle = 'rgba(46, 209, 163, 0.75)';
          ctx.beginPath();
          ctx.ellipse(x - bodyRadius * 0.18, y - bodyRadius * 0.08, bodyRadius * 0.28, bodyRadius * 0.18, -0.4, 0, TAU);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(x + bodyRadius * 0.1, y + bodyRadius * 0.1, bodyRadius * 0.25, bodyRadius * 0.14, 0.4, 0, TAU);
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.48)';
          ctx.lineWidth = Math.max(1, bodyRadius * 0.05);
          for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.arc(x - bodyRadius * 0.02, y + (i - 1) * bodyRadius * 0.14, bodyRadius * (0.72 - i * 0.08), 0.5, 2.7);
            ctx.stroke();
          }
          ctx.globalAlpha = 1;
        } else if (planet.type === 'ice') {
          ctx.globalAlpha = 0.33;
          ctx.fillStyle = 'rgba(255,255,255,0.24)';
          ctx.beginPath();
          ctx.arc(x - bodyRadius * 0.2, y - bodyRadius * 0.18, bodyRadius * 0.48, 0, TAU);
          ctx.fill();
          ctx.globalAlpha = 1;
        } else if (planet.type === 'dwarf') {
          drawCraterTexture(x, y, bodyRadius, 'rgba(255,255,255,0.24)');
        } else {
          drawCraterTexture(x, y, bodyRadius, 'rgba(255,255,255,0.14)');
        }

        ctx.globalCompositeOperation = 'lighter';
        const sheen = ctx.createRadialGradient(
          x - bodyRadius * 0.4,
          y - bodyRadius * 0.45,
          0,
          x - bodyRadius * 0.18,
          y - bodyRadius * 0.18,
          bodyRadius
        );
        sheen.addColorStop(0, 'rgba(255,255,255,0.45)');
        sheen.addColorStop(0.24, 'rgba(255,255,255,0.14)');
        sheen.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = sheen;
        ctx.beginPath();
        ctx.arc(x, y, bodyRadius, 0, TAU);
        ctx.fill();
        ctx.restore();

        if (focus) {
          ctx.save();
          ctx.strokeStyle = 'rgba(127, 210, 255, 0.9)';
          ctx.lineWidth = 1.2;
          ctx.shadowColor = 'rgba(127, 210, 255, 0.85)';
          ctx.shadowBlur = 18;
          ctx.beginPath();
          ctx.arc(x, y, bodyRadius + 8, 0, TAU);
          ctx.stroke();
          ctx.restore();
        }
      }

      function drawSaturnRing(planet, screen, cam) {
        if (!planet.ring || !screen) return;
        const ring = planet.ring;
        const samples = 92;
        const points = [];
        for (let i = 0; i <= samples; i++) {
          const a = (i / samples) * TAU;
          const p = ringPosition(ring, a);
          const world = add(planet.__pos, p);
          const proj = project(world, cam);
          if (proj) points.push(proj);
        }
        if (points.length < 2) return;

        ctx.save();
        ctx.lineWidth = ring.thickness;
        ctx.strokeStyle = 'rgba(240, 223, 185, 0.24)';
        ctx.shadowColor = 'rgba(230, 207, 152, 0.25)';
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
        ctx.stroke();

        ctx.lineWidth = Math.max(1.2, ring.thickness * 0.45);
        ctx.strokeStyle = 'rgba(255, 245, 214, 0.48)';
        ctx.beginPath();
        const mid = Math.floor(points.length * 0.54);
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < mid; i++) ctx.lineTo(points[i].x, points[i].y);
        ctx.stroke();
        ctx.restore();
      }

      function drawPlanetLabel(planet, screen, selected) {
        const name = planet.name;
        const dir = normalize({
          x: screen.x - width * 0.5,
          y: screen.y - height * 0.5,
          z: 0,
        });
        const offset = 14 + planet.labelBias + (selected ? 5 : 0);
        const lx = clamp(screen.x + dir.x * offset, 16, width - 16);
        const ly = clamp(screen.y + dir.y * offset - 16, 24, height - 16);

        ctx.save();
        ctx.font = selected ? '700 13px "HarmonyOS Sans SC", "PingFang SC", sans-serif' : '600 12px "HarmonyOS Sans SC", "PingFang SC", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const padX = 8;
        const padY = 4;
        const textWidth = ctx.measureText(name).width;
        const boxW = textWidth + padX * 2;
        const boxH = 20;
        const rx = lx - boxW / 2;
        const ry = ly - boxH / 2;
        ctx.fillStyle = selected ? 'rgba(18, 31, 54, 0.9)' : 'rgba(8, 13, 24, 0.72)';
        ctx.strokeStyle = selected ? 'rgba(125, 214, 255, 0.5)' : 'rgba(255,255,255,0.12)';
        ctx.lineWidth = 1;
        roundRect(ctx, rx, ry, boxW, boxH, 10);
        ctx.fill();
        ctx.stroke();
        ctx.shadowColor = selected ? 'rgba(127, 210, 255, 0.6)' : 'rgba(0, 0, 0, 0.35)';
        ctx.shadowBlur = selected ? 10 : 6;
        ctx.fillStyle = selected ? '#ffffff' : 'rgba(245, 248, 255, 0.92)';
        ctx.fillText(name, lx, ly + 0.5);
        ctx.restore();
      }

      function roundRect(ctx, x, y, w, h, r) {
        const rr = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.arcTo(x + w, y, x + w, y + h, rr);
        ctx.arcTo(x + w, y + h, x, y + h, rr);
        ctx.arcTo(x, y + h, x, y, rr);
        ctx.arcTo(x, y, x + w, y, rr);
        ctx.closePath();
      }

      function updateInfo(selectedIndex) {
        if (selectedIndex < 0) {
          planetTitle.textContent = '未选中行星';
          infoName.textContent = '点击任意行星开始探索';
          infoRadius.textContent = '-';
          infoPeriod.textContent = '-';
          infoDesc.textContent = '太阳系九大行星会持续公转，支持拖拽、缩放和聚焦。';
          syncStatus();
          return;
        }
        const p = planets[selectedIndex];
        planetTitle.textContent = p.name;
        infoName.textContent = `${p.name} / ${p.latin}`;
        infoRadius.textContent = `${p.orbitRadius} 模拟单位`;
        infoPeriod.textContent = `${p.period.toFixed(1)} 模拟单位`;
        infoDesc.textContent = p.description;
        syncStatus();
      }

      function syncStatus() {
        const base = view.focusIndex >= 0 ? '已聚焦' : '自由探索';
        statusText.textContent = view.paused ? `${base} · 已暂停` : base;
      }

      function setSelected(index, focus = true) {
        if (index < 0 || index >= planets.length) return;
        if (focus) view.focusIndex = index;
        updateInfo(index);
      }

      function resetCamera() {
        view.goalTarget = { x: 0, y: 0, z: 0 };
        view.goalYaw = 0.78;
        view.goalPitch = 0.28;
        view.goalDistance = 540;
        view.focusIndex = -1;
        syncStatus();
      }

      speedInput.addEventListener('input', () => {
        view.speed = Number(speedInput.value);
        speedText.textContent = `${view.speed.toFixed(2)}x`;
      });
      speedText.textContent = `${view.speed.toFixed(2)}x`;

      togglePause.addEventListener('click', () => {
        view.paused = !view.paused;
        togglePause.textContent = view.paused ? '继续' : '暂停';
        syncStatus();
      });

      resetView.addEventListener('click', () => {
        resetCamera();
      });

      function hitTest(x, y, cam, time) {
        let best = -1;
        let bestDist = Infinity;
        for (let i = 0; i < planets.length; i++) {
          const p = planets[i];
          const world = planetWorld(p, time);
          const proj = project(world, cam);
          if (!proj) continue;
          const size = Math.max(4, p.radius * proj.scale);
          const dx = x - proj.x;
          const dy = y - proj.y;
          const dist = Math.hypot(dx, dy);
          const limit = size + 12;
          if (dist <= limit && dist < bestDist) {
            best = i;
            bestDist = dist;
          }
        }
        return best;
      }

      const pointerState = new Map();
      let drag = null;
      let pinch = null;
      let pendingClickIndex = -1;
      let pointerStart = null;

      canvas.addEventListener('pointerdown', (e) => {
        canvas.setPointerCapture(e.pointerId);
        pointerState.set(e.pointerId, { x: e.clientX, y: e.clientY });
        const cam = cameraState();
        const hit = hitTest(e.clientX, e.clientY, cam, simTime);
        pendingClickIndex = hit;
        pointerStart = { x: e.clientX, y: e.clientY, time: performance.now() };
        if (pointerState.size === 1) {
          drag = {
            pointerId: e.pointerId,
            startX: e.clientX,
            startY: e.clientY,
            startYaw: view.goalYaw,
            startPitch: view.goalPitch,
          };
        } else if (pointerState.size === 2) {
          const pts = [...pointerState.values()];
          pinch = {
            startDist: Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y),
            startDistance: view.goalDistance,
          };
        }
      });

      canvas.addEventListener('pointermove', (e) => {
        if (!pointerState.has(e.pointerId)) return;
        pointerState.set(e.pointerId, { x: e.clientX, y: e.clientY });

        if (pointerState.size === 2) {
          const pts = [...pointerState.values()];
          const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
          if (pinch) {
            const ratio = pinch.startDist / Math.max(60, dist);
            view.goalDistance = clamp(pinch.startDistance * ratio, 260, 840);
          }
          return;
        }

        if (!drag || drag.pointerId !== e.pointerId) return;
        const dx = e.clientX - drag.startX;
        const dy = e.clientY - drag.startY;
        if (Math.hypot(dx, dy) < 2) return;
        pendingClickIndex = -1;
        view.goalYaw = drag.startYaw + dx * 0.006;
        view.goalPitch = clamp(drag.startPitch + dy * 0.005, -1.08, 1.08);
      }, { passive: true });

      function releasePointer(e) {
        if (pointerState.has(e.pointerId)) pointerState.delete(e.pointerId);
        if (pointerState.size < 2) pinch = null;
        if (pointerState.size === 0) drag = null;

        if (pointerStart) {
          const moved = Math.hypot(e.clientX - pointerStart.x, e.clientY - pointerStart.y);
          const quickTap = performance.now() - pointerStart.time < 360;
          if (quickTap && moved < 8 && pendingClickIndex >= 0) {
            setSelected(pendingClickIndex, true);
            const focusPlanet = planets[pendingClickIndex];
            view.goalTarget = planetWorld(focusPlanet, simTime);
            view.goalDistance = clamp(310 + focusPlanet.orbitRadius * 0.46, 290, 760);
            view.goalYaw = view.yaw;
            view.goalPitch = clamp(view.pitch, -1.06, 1.06);
          } else if (quickTap && moved < 8 && pendingClickIndex < 0) {
            // Keep selection intact; blank clicks just release the drag gesture.
          }
        }
        pointerStart = null;
        pendingClickIndex = -1;
      }

      canvas.addEventListener('pointerup', releasePointer);
      canvas.addEventListener('pointercancel', releasePointer);
      canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const zoom = Math.exp(e.deltaY * 0.0011);
        view.goalDistance = clamp(view.goalDistance * zoom, 260, 840);
      }, { passive: false });

      window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
          e.preventDefault();
          togglePause.click();
        } else if (e.key.toLowerCase() === 'r') {
          resetCamera();
        }
      });

      function update(dt) {
        if (!view.paused) {
          simTime += dt * 0.001 * view.speed;
        }

        if (view.focusIndex >= 0) {
          view.goalTarget = planetWorld(planets[view.focusIndex], simTime);
          view.goalDistance = clamp(300 + planets[view.focusIndex].orbitRadius * 0.5, 300, 760);
        }
        syncStatus();

        const smooth = 1 - Math.pow(0.0008, dt / 16.67);
        view.target = lerpVec(view.target, view.goalTarget, smooth);
        view.yaw = lerp(view.yaw, view.goalYaw, smooth);
        view.pitch = lerp(view.pitch, view.goalPitch, smooth);
        view.distance = lerp(view.distance, view.goalDistance, smooth);
      }

      function render() {
        const cam = cameraState();
        drawBackground(cam);

        const sunScreen = project(ORIGIN, cam);
        const orbitEntries = planets.map((p, index) => {
          const world = planetWorld(p, simTime);
          const proj = project(world, cam);
          return {
            planet: p,
            index,
            world,
            proj,
            depth: proj ? proj.depth : Infinity,
            selected: index === view.focusIndex,
          };
        });

        orbitEntries.sort((a, b) => b.depth - a.depth);
        for (const item of orbitEntries) {
          drawOrbit(item.planet, cam, item.selected);
        }

        drawSun(cam, sunScreen);

        const planetDraws = orbitEntries
          .filter(item => item.proj)
          .sort((a, b) => a.depth - b.depth);

        for (const item of planetDraws) {
          const p = item.planet;
          p.__pos = item.world;

          const isHiddenBySun = (() => {
            if (!sunScreen || !item.proj) return false;
            const sunR = Math.max(30, 30 * sunScreen.scale);
            const dx = item.proj.x - sunScreen.x;
            const dy = item.proj.y - sunScreen.y;
            const dist = Math.hypot(dx, dy);
            return dist < sunR * 0.92 && item.depth > sunScreen.depth - 5;
          })();

          const visible = !isHiddenBySun;
          if (!visible) continue;

          if (p.ring) {
            drawSaturnRing(p, item.proj, cam);
          }

          drawPlanetBody(p, item.proj, item.selected, item.proj.depth);
          drawPlanetLabel(p, item.proj, item.selected);
        }

        // Small origin marker behind the sun for depth cue.
        if (sunScreen) {
          ctx.save();
          ctx.globalAlpha = 0.28;
          ctx.fillStyle = 'rgba(255,255,255,0.5)';
          ctx.beginPath();
          ctx.arc(sunScreen.x, sunScreen.y, 2.2, 0, TAU);
          ctx.fill();
          ctx.restore();
        }
      }

      function loop(now) {
        const dt = Math.min(40, now - lastFrame);
        lastFrame = now;
        update(dt);
        render();
        requestAnimationFrame(loop);
      }

      updateInfo(-1);
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
