<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>太阳系九大行星 · 立体交互探索</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #04060d; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", "Source Han Sans SC", sans-serif;
    color: #dfe7f5;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #scene-container { position: fixed; inset: 0; }
  canvas { display: block; }

  /* ---------- 标题 ---------- */
  #titleBox {
    position: fixed; top: 14px; left: 18px; z-index: 10; pointer-events: none;
  }
  #titleBox h1 {
    font-size: 22px; font-weight: 700; letter-spacing: 2px;
    background: linear-gradient(90deg, #ffd97a, #7ab8ff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 24px rgba(120, 170, 255, .25);
  }
  #titleBox p { font-size: 12px; color: #8fa3c8; margin-top: 4px; letter-spacing: 1px; }

  /* ---------- 行星标签 ---------- */
  .planet-label {
    position: fixed; z-index: 5;
    transform: translate(-50%, -130%);
    font-size: 12px; line-height: 1; padding: 3px 8px;
    color: #e8f0ff; background: rgba(10, 18, 36, .55);
    border: 1px solid rgba(140, 170, 220, .35); border-radius: 10px;
    cursor: pointer; white-space: nowrap;
    backdrop-filter: blur(2px);
    transition: background .15s, border-color .15s;
  }
  .planet-label:hover { background: rgba(40, 70, 130, .8); border-color: rgba(180, 210, 255, .8); }
  .planet-label.active { background: rgba(60, 100, 180, .85); border-color: #9cc4ff; color: #fff; }

  /* ---------- 控制条 ---------- */
  #controlBar {
    position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%);
    z-index: 20; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    justify-content: center; max-width: 96vw;
    padding: 10px 16px; border-radius: 16px;
    background: rgba(10, 16, 32, .72); border: 1px solid rgba(120, 150, 210, .25);
    backdrop-filter: blur(8px);
    box-shadow: 0 6px 30px rgba(0, 0, 0, .45);
  }
  #controlBar button {
    font-family: inherit; font-size: 13px; color: #dfe9ff;
    background: rgba(70, 100, 170, .3); border: 1px solid rgba(130, 160, 220, .4);
    padding: 7px 14px; border-radius: 10px; cursor: pointer;
    transition: background .15s; white-space: nowrap;
  }
  #controlBar button:hover { background: rgba(90, 130, 210, .5); }
  .speed-group { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #aebfe0; }
  #speedSlider { width: 120px; accent-color: #6ea8ff; cursor: pointer; }
  #speedVal { min-width: 44px; text-align: left; color: #ffd97a; font-variant-numeric: tabular-nums; }
  .chk { display: flex; align-items: center; gap: 5px; font-size: 13px; color: #aebfe0; cursor: pointer; white-space: nowrap; }
  .chk input { accent-color: #6ea8ff; cursor: pointer; }

  /* ---------- 信息面板 ---------- */
  #infoPanel {
    position: fixed; top: 70px; right: 18px; z-index: 15;
    width: 300px; max-width: calc(100vw - 36px);
    max-height: calc(100vh - 180px); overflow-y: auto;
    padding: 18px; border-radius: 16px;
    background: rgba(10, 16, 34, .82); border: 1px solid rgba(130, 160, 220, .3);
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 40px rgba(0, 0, 0, .5);
    transition: opacity .25s, transform .25s;
  }
  #infoPanel.hidden { opacity: 0; transform: translateX(24px); pointer-events: none; }
  #infoClose {
    position: absolute; top: 10px; right: 12px;
    background: none; border: none; color: #8fa3c8; font-size: 20px;
    cursor: pointer; line-height: 1; padding: 4px;
  }
  #infoClose:hover { color: #fff; }
  .info-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
  #infoDot { width: 14px; height: 14px; border-radius: 50%; align-self: center; flex: none; box-shadow: 0 0 10px currentColor; }
  #infoName { font-size: 22px; font-weight: 700; color: #fff; }
  #infoEn { font-size: 12px; color: #8fa3c8; letter-spacing: 1px; }
  #infoType {
    display: inline-block; font-size: 11px; color: #ffe1a0;
    border: 1px solid rgba(255, 214, 130, .45); border-radius: 8px;
    padding: 2px 8px; margin-bottom: 10px;
  }
  #infoTable { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-bottom: 10px; }
  #infoTable td { padding: 5px 0; border-bottom: 1px dashed rgba(120, 150, 210, .18); vertical-align: top; }
  #infoTable td:first-child { color: #8fa3c8; width: 78px; flex: none; }
  #infoTable td:last-child { color: #e8f0ff; }
  #infoDesc { font-size: 12.5px; line-height: 1.75; color: #c4d2ec; }
  #infoTip { font-size: 11px; color: #7d90b5; margin-top: 10px; }

  /* ---------- 引导 ---------- */
  #guide {
    position: fixed; inset: 0; z-index: 40;
    display: flex; align-items: center; justify-content: center;
    background: rgba(3, 6, 14, .55); backdrop-filter: blur(3px);
    transition: opacity .4s;
  }
  #guide.hidden { opacity: 0; pointer-events: none; }
  #guideCard {
    width: 340px; max-width: calc(100vw - 40px);
    padding: 26px 28px; border-radius: 20px;
    background: rgba(12, 20, 42, .92); border: 1px solid rgba(130, 160, 220, .35);
    box-shadow: 0 10px 60px rgba(0, 0, 0, .6);
  }
  #guideCard h3 { font-size: 18px; margin-bottom: 14px; color: #ffd97a; }
  #guideCard ul { list-style: none; }
  #guideCard li { font-size: 13.5px; line-height: 2.1; color: #c4d2ec; }
  #guideStart {
    margin-top: 16px; width: 100%; padding: 10px; font-size: 14px; font-family: inherit;
    color: #04060d; font-weight: 700; letter-spacing: 2px;
    background: linear-gradient(90deg, #ffd97a, #7ab8ff);
    border: none; border-radius: 12px; cursor: pointer;
  }
  #guideStart:hover { filter: brightness(1.1); }

  #toast {
    position: fixed; top: 64px; left: 50%; transform: translateX(-50%);
    z-index: 30; padding: 8px 18px; border-radius: 12px; font-size: 13px;
    background: rgba(12, 20, 42, .85); border: 1px solid rgba(130, 160, 220, .35);
    color: #d5e2fa; opacity: 0; transition: opacity .3s; pointer-events: none;
  }
  #toast.show { opacity: 1; }

  #fallback {
    position: fixed; inset: 0; z-index: 100; display: none;
    align-items: center; justify-content: center; text-align: center;
    padding: 30px; font-size: 15px; line-height: 2; color: #c4d2ec;
  }

  /* ---------- 移动端 ---------- */
  @media (max-width: 640px) {
    #titleBox h1 { font-size: 17px; }
    #titleBox p { font-size: 10px; }
    #infoPanel { top: auto; bottom: 86px; right: 10px; left: 10px; width: auto; max-height: 42vh; padding: 14px; }
    #infoPanel.hidden { transform: translateY(24px); }
    #controlBar { bottom: 8px; gap: 7px; padding: 8px 10px; border-radius: 13px; }
    #controlBar button { font-size: 12px; padding: 6px 10px; }
    #speedSlider { width: 84px; }
    .planet-label { font-size: 11px; padding: 2px 6px; }
  }
</style>
</head>
<body>
<div id="scene-container"></div>

<div id="titleBox">
  <h1>太阳系九大行星</h1>
  <p>立体交互模拟 · 含冥王星 PLUTO</p>
</div>

<aside id="infoPanel" class="hidden">
  <button id="infoClose" title="关闭并返回全景">×</button>
  <div class="info-head">
    <span id="infoDot"></span>
    <h2 id="infoName"></h2>
    <span id="infoEn"></span>
  </div>
  <span id="infoType"></span>
  <table id="infoTable"></table>
  <p id="infoDesc"></p>
  <p id="infoTip">相机正在跟随该天体 · 可继续拖拽环绕观察 · 按 Esc 或 × 返回全景</p>
</aside>

<div id="controlBar">
  <button id="pauseBtn" title="暂停 / 继续公转动画">⏸ 暂停</button>
  <div class="speed-group">
    <span>速度</span>
    <input type="range" id="speedSlider" min="0" max="10" step="0.1" value="1">
    <span id="speedVal">1.0×</span>
  </div>
  <button id="resetBtn" title="回到初始全景视角">⟲ 重置视角</button>
  <label class="chk"><input type="checkbox" id="orbitChk" checked>轨道</label>
  <label class="chk"><input type="checkbox" id="labelChk" checked>标签</label>
  <button id="helpBtn" title="操作指南">？帮助</button>
</div>

<div id="guide">
  <div id="guideCard">
    <h3>🪐 欢迎来到太阳系</h3>
    <ul>
      <li>🖱️ <b>拖拽</b>：旋转视角（触屏单指滑动）</li>
      <li>🖲️ <b>滚轮</b>：缩放远近（触屏双指捏合）</li>
      <li>👆 <b>点击行星或名称</b>：聚焦并查看中文详情</li>
      <li>⏯️ 底部工具条可 <b>暂停 / 调速 / 重置视角</b></li>
      <li>⌨️ <b>Esc</b>：退出聚焦，返回全景</li>
    </ul>
    <button id="guideStart">开 始 探 索</button>
  </div>
</div>

<div id="toast"></div>
<div id="fallback">很抱歉，您的浏览器不支持 WebGL，无法渲染 3D 太阳系。<br>请使用较新版本的 Chrome / Edge / Firefox / Safari 打开本页面。</div>

<script src="vendor/three.min.js"></script>
<script src="vendor/OrbitControls.js"></script>

  var EARTH_OMEGA = (2 * Math.PI) / 16;   // 1× 速度下地球 16 秒公转一圈

    },
    {
      key: 'neptune', name: '海王星', en: 'Neptune', type: '冰巨星',
      color: '#4a6fdc', radius: 4.0, orbitR: 176, periodYr: 164.8,
      incl: 1.8, node: 0.4, tilt: 28.3 * DEG, spinRate: 0.75, phase: 2.2,
      diameter: '49,528 km', dist: '30.1 AU（约 45 亿 km）',
      orbitPeriod: '164.8 年', dayPeriod: '16.1 小时',
      desc: '距太阳最远的大行星，通过数学计算被"笔尖"发现。这里刮着太阳系最强的风，风速可超 2,000 km/h。'
    },
    {
      key: 'pluto', name: '冥王星', en: 'Pluto', type: '矮行星（曾列第九大行星）',
      color: '#c9ab8b', radius: 1.3, orbitR: 200, periodYr: 248,
      incl: 17, node: 1.9, tilt: 119.6 * DEG, spinRate: -0.18, phase: 5.1,
      diameter: '2,376 km', dist: '39.5 AU（约 59 亿 km）',
      orbitPeriod: '248 年', dayPeriod: '6.4 天（逆向自转）',
      desc: '1930 年发现后曾被列为第九大行星，2006 年被重新定义为矮行星。表面有著名的心形亮区"汤博区"，轨道倾角高达 17°。'

  ];

  var SUN = {
    key: 'sun', name: '太阳', en: 'Sun', type: '恒星（G 型主序星）',
    color: '#ffb347', radius: 11,
    diameter: '1,392,000 km', dist: '—（太阳系中心）',
    orbitPeriod: '—', dayPeriod: '约 25~35 天（较差自转）',
    desc: '太阳系的中心恒星，占据太阳系总质量的 99.86%。核心以核聚变的方式持续发光发热，已燃烧约 46 亿年。'
  };

  /* ================================================================
   *  工具：确定性伪随机 + 程序化贴图
   * ================================================================ */
  function mulberry32(seed) {
    return function () {
      seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
      var t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function makeCanvas(w, h) {
    var c = document.createElement('canvas');
    c.width = w; c.height = h;
    return c;
  }

  function vBands(ctx, w, h, stops) {
    var g = ctx.createLinearGradient(0, 0, 0, h);
    for (var i = 0; i < stops.length; i++) g.addColorStop(stops[i][0], stops[i][1]);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);
  }

  function speckle(ctx, w, h, rnd, n, rMin, rMax, colors, alpha) {
    for (var i = 0; i < n; i++) {
      ctx.globalAlpha = alpha * (0.4 + 0.6 * rnd());
      ctx.fillStyle = colors[Math.floor(rnd() * colors.length)];
      ctx.beginPath();
      ctx.arc(rnd() * w, rnd() * h, rMin + rnd() * (rMax - rMin), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function streaks(ctx, w, h, rnd, n, colors, alpha, thick) {
    for (var i = 0; i < n; i++) {
      var y = rnd() * h;
      var len = w * (0.15 + rnd() * 0.5);
      var x = rnd() * w;
      ctx.globalAlpha = alpha * (0.3 + 0.7 * rnd());
      ctx.fillStyle = colors[Math.floor(rnd() * colors.length)];
      var t = thick * (0.4 + rnd());
      ctx.beginPath();
      ctx.ellipse(x, y, len / 2, t / 2, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function blob(ctx, cx, cy, r, rnd, color, alpha) {
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.beginPath();
    var pts = 10;
    for (var i = 0; i <= pts; i++) {
      var a = (i / pts) * Math.PI * 2;
      var rr = r * (0.55 + rnd() * 0.7);
      var x = cx + Math.cos(a) * rr;
      var y = cy + Math.sin(a) * rr * 0.66;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  function planetTexture(key) {
    var w = 512, h = 256;
    var c = makeCanvas(w, h), ctx = c.getContext('2d');
    var rnd = mulberry32(key.length * 7919 + key.charCodeAt(0) * 131);
    var i;

    switch (key) {
      case 'mercury':
        vBands(ctx, w, h, [[0, '#9a8d80'], [0.5, '#b8a99a'], [1, '#8d8177']]);
        speckle(ctx, w, h, rnd, 380, 1, 7, ['#6f6459', '#c9bcac', '#57504a'], 0.5);
        break;
      case 'venus':
        vBands(ctx, w, h, [[0, '#d9b478'], [0.3, '#eed3a0'], [0.55, '#e0bd85'], [0.8, '#f0d8a8'], [1, '#d3ad72']]);
        streaks(ctx, w, h, rnd, 90, ['#f6e3bd', '#cfa768', '#e8cb96'], 0.35, 14);
        break;
      case 'earth':
        vBands(ctx, w, h, [[0, '#dfeefc'], [0.1, '#2a5fd0'], [0.5, '#2f6fe4'], [0.9, '#2a5fd0'], [1, '#e6f2fd']]);
        for (i = 0; i < 16; i++) {
          blob(ctx, rnd() * w, h * (0.18 + rnd() * 0.64), 14 + rnd() * 34, rnd,
               i % 3 === 0 ? '#3e7a2e' : '#4c8a37', 0.95);
        }
        for (i = 0; i < 10; i++) {
          blob(ctx, rnd() * w, h * (0.2 + rnd() * 0.6), 8 + rnd() * 16, rnd, '#b98f4e', 0.5);
        }
        streaks(ctx, w, h, rnd, 60, ['#ffffff'], 0.35, 8);
        break;
      case 'mars':
        vBands(ctx, w, h, [[0, '#e8ceb4'], [0.08, '#c2653d'], [0.5, '#d1744a'], [0.92, '#b95c36'], [1, '#efe0d0']]);
        speckle(ctx, w, h, rnd, 220, 2, 10, ['#8e4527', '#e09268', '#7c3b21'], 0.4);
        blob(ctx, w * 0.3, h * 0.55, 40, rnd, '#8e4527', 0.5);
        blob(ctx, w * 0.72, h * 0.4, 34, rnd, '#9d4e2c', 0.45);
        break;
      case 'jupiter':
        vBands(ctx, w, h, [
          [0, '#c8b18e'], [0.12, '#e8d6b3'], [0.2, '#b98d62'], [0.28, '#efe0c0'],
          [0.38, '#c49767'], [0.46, '#f0e2c4'], [0.55, '#b78a5f'], [0.63, '#e9d8b6'],
          [0.72, '#c39466'], [0.82, '#e5d2ae'], [1, '#bfa987']
        ]);
        streaks(ctx, w, h, rnd, 130, ['#a97f55', '#f4e8cd', '#8d6844'], 0.3, 9);
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = '#c0533a';
        ctx.beginPath(); ctx.ellipse(w * 0.68, h * 0.63, 34, 15, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#d97a5a';
        ctx.beginPath(); ctx.ellipse(w * 0.68, h * 0.63, 22, 9, 0, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
        break;
      case 'saturn':
        vBands(ctx, w, h, [
          [0, '#cfae76'], [0.15, '#e9d3a0'], [0.3, '#d9bd85'], [0.45, '#f0e0b4'],
          [0.6, '#d6b87e'], [0.78, '#ecd8a8'], [1, '#c8a76f']
        ]);
        streaks(ctx, w, h, rnd, 80, ['#f4e6c2', '#c3a067'], 0.25, 10);
        break;
      case 'uranus':
        vBands(ctx, w, h, [[0, '#8fcdd4'], [0.4, '#a8dee2'], [0.6, '#9bd6db'], [1, '#7fc2ca']]);
        streaks(ctx, w, h, rnd, 30, ['#c2ecef', '#8ccbd2'], 0.2, 12);
        break;
      case 'neptune':
        vBands(ctx, w, h, [[0, '#3d5ec4'], [0.3, '#4a71dd'], [0.55, '#3f63cc'], [0.8, '#5178e2'], [1, '#3a58b8']]);
        streaks(ctx, w, h, rnd, 50, ['#7c9cf0', '#2e4aa8', '#a9c0f7'], 0.35, 10);
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = '#22398a';
        ctx.beginPath(); ctx.ellipse(w * 0.4, h * 0.42, 26, 11, 0, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
        break;
      case 'pluto':
        vBands(ctx, w, h, [[0, '#a98a6b'], [0.5, '#c9ab8b'], [1, '#93765b']]);
        speckle(ctx, w, h, rnd, 160, 2, 9, ['#7c624c', '#e0c6a4', '#6b543f'], 0.45);
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = '#e9d9be';
        ctx.beginPath(); ctx.ellipse(w * 0.55, h * 0.6, 42, 30, 0.3, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
        break;
      default:
        vBands(ctx, w, h, [[0, '#888'], [1, '#aaa']]);
    }

    var tex = new THREE.CanvasTexture(c);
    tex.encoding = THREE.sRGBEncoding;
    tex.wrapS = THREE.RepeatWrapping;
    tex.anisotropy = 4;
    return tex;
  }

  function sunTexture() {
    var w = 512, h = 256;
    var c = makeCanvas(w, h), ctx = c.getContext('2d');
    var rnd = mulberry32(20260713);
    vBands(ctx, w, h, [[0, '#ffb830'], [0.5, '#ffcf50'], [1, '#ff9d20']]);
    speckle(ctx, w, h, rnd, 500, 2, 9, ['#ffe680', '#ff8c1a', '#ffd25e', '#f57e00'], 0.4);
    var tex = new THREE.CanvasTexture(c);
    tex.encoding = THREE.sRGBEncoding;
    return tex;
  }

  function starDotTexture() {
    var s = 64;
    var c = makeCanvas(s, s), ctx = c.getContext('2d');
    var g = ctx.createRadialGradient(s / 2, s / 2, 0, s / 2, s / 2, s / 2);
    g.addColorStop(0, 'rgba(255,255,255,1)');
    g.addColorStop(0.4, 'rgba(255,255,255,0.8)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, s, s);
    return new THREE.CanvasTexture(c);
  }

  function glowTexture() {
    var s = 256;
    var c = makeCanvas(s, s), ctx = c.getContext('2d');
    var g = ctx.createRadialGradient(s / 2, s / 2, 0, s / 2, s / 2, s / 2);
    g.addColorStop(0, 'rgba(255, 236, 190, 1)');
    g.addColorStop(0.25, 'rgba(255, 190, 90, 0.55)');
    g.addColorStop(0.55, 'rgba(255, 140, 40, 0.18)');
    g.addColorStop(1, 'rgba(255, 120, 20, 0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, s, s);
    var tex = new THREE.CanvasTexture(c);
    tex.encoding = THREE.sRGBEncoding;
    return tex;
  }

  function saturnRingTexture() {
    var w = 512, h = 8;
    var c = makeCanvas(w, h), ctx = c.getContext('2d');
    var rnd = mulberry32(998877);
    for (var x = 0; x < w; x++) {
      var t = x / w;
      var a = 0.75;
      if (t < 0.06) a = t / 0.06 * 0.4;                       // 内侧淡入
      else if (t > 0.62 && t < 0.70) a = 0.08;                // 卡西尼缝
      else if (t > 0.93) a = (1 - t) / 0.07 * 0.55;           // 外侧淡出
      a *= 0.55 + 0.45 * rnd();
      var shade = 190 + Math.floor(rnd() * 60);
      ctx.fillStyle = 'rgba(' + shade + ',' + Math.floor(shade * 0.92) + ',' + Math.floor(shade * 0.72) + ',' + a.toFixed(3) + ')';
      ctx.fillRect(x, 0, 1, h);
    }
    var tex = new THREE.CanvasTexture(c);
    tex.encoding = THREE.sRGBEncoding;
    return tex;
  }

  /* ================================================================
   *  场景初始化
   * ================================================================ */
  var container = document.getElementById('scene-container');
  var renderer;
  try {
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  } catch (e) {
    document.getElementById('fallback').style.display = 'flex';
    document.getElementById('guide').classList.add('hidden');
    return;
  }
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputEncoding = THREE.sRGBEncoding;
  container.appendChild(renderer.domElement);

  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x04060d);

  var camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 6000);
  var HOME_POS = new THREE.Vector3(0, 195, 300);
  var HOME_TGT = new THREE.Vector3(0, 0, 0);
  camera.position.copy(HOME_POS);

  var controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.enablePan = false;                 // 禁止平移，防止场景中心漂移
  controls.minDistance = 18;
  controls.maxDistance = 780;
  controls.target.copy(HOME_TGT);

  scene.add(new THREE.AmbientLight(0x8899bb, 0.35));
  var sunLight = new THREE.PointLight(0xfff2dc, 1.9, 0, 0);
  scene.add(sunLight);

  /* ---------- 星空背景 ---------- */
  (function buildStars() {
    var rnd = mulberry32(42);
    var N = 2600;
    var pos = new Float32Array(N * 3);
    var col = new Float32Array(N * 3);
    for (var i = 0; i < N; i++) {
      var r = 1400 + rnd() * 1800;
      var theta = rnd() * Math.PI * 2;
      var phi = Math.acos(2 * rnd() - 1);
      pos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      pos[i * 3 + 1] = r * Math.cos(phi);
      pos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
      var b = 0.55 + rnd() * 0.45;
      var tint = rnd();
      col[i * 3] = b * (tint > 0.8 ? 1 : 0.9);
      col[i * 3 + 1] = b * 0.93;
      col[i * 3 + 2] = b * (tint < 0.25 ? 1 : 0.92);
    }
    var geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
    var mat = new THREE.PointsMaterial({
      size: 2.8, vertexColors: true, sizeAttenuation: false,
      map: starDotTexture(), transparent: true, depthWrite: false
    });
    scene.add(new THREE.Points(geo, mat));
  })();

  /* ---------- 太阳 ---------- */
  var sunMesh = new THREE.Mesh(
    new THREE.SphereGeometry(SUN.radius, 48, 32),
    new THREE.MeshBasicMaterial({ map: sunTexture() })
  );
  scene.add(sunMesh);

  var sunGlow = new THREE.Sprite(new THREE.SpriteMaterial({
    map: glowTexture(), blending: THREE.AdditiveBlending,
    depthWrite: false, transparent: true
  }));
  sunGlow.scale.set(72, 72, 1);
  scene.add(sunGlow);

  /* ---------- 行星 ---------- */
  var planets = [];
  var hitMeshes = [];

  function buildPlanet(d) {
    var plane = new THREE.Group();
    plane.rotation.order = 'YXZ';
    plane.rotation.y = d.node;
    plane.rotation.x = d.incl * DEG;
    scene.add(plane);

    // 轨道线
    var segs = 160;
    var pts = new Float32Array(segs * 3);
    for (var i = 0; i < segs; i++) {
      var a = (i / segs) * Math.PI * 2;
      pts[i * 3] = Math.cos(a) * d.orbitR;
      pts[i * 3 + 1] = 0;
      pts[i * 3 + 2] = Math.sin(a) * d.orbitR;
    }
    var og = new THREE.BufferGeometry();
    og.setAttribute('position', new THREE.BufferAttribute(pts, 3));
    var om = new THREE.LineBasicMaterial({ color: 0x91a7d0, transparent: true, opacity: 0.32 });
    var orbitLine = new THREE.LineLoop(og, om);
    plane.add(orbitLine);

    var holder = new THREE.Group();
    plane.add(holder);

    var tiltG = new THREE.Group();
    tiltG.rotation.z = d.tilt;
    holder.add(tiltG);

    var mesh = new THREE.Mesh(
      new THREE.SphereGeometry(d.radius, 40, 26),
      new THREE.MeshPhongMaterial({
        map: planetTexture(d.key),
        shininess: d.key === 'earth' ? 22 : 8,
        specular: 0x222222,
        emissive: 0x0a0c14
      })
    );
    tiltG.add(mesh);

    // 点击热区（小行星放大热区，便于点选）
    var hitR = Math.max(d.radius * 1.6, 3.4);
    var hit = new THREE.Mesh(
      new THREE.SphereGeometry(hitR, 8, 6),
      new THREE.MeshBasicMaterial({ visible: false })
    );
    hit.userData.body = null; // 稍后回填
    holder.add(hit);

    // 土星环
    if (d.key === 'saturn') {
      var ringGeo = new THREE.RingGeometry(d.radius * 1.35, d.radius * 2.15, 128, 1);
      var uv = ringGeo.attributes.uv;
      var p3 = ringGeo.attributes.position;
      var inR = d.radius * 1.35, outR = d.radius * 2.15;
      for (var vi = 0; vi < uv.count; vi++) {
        var vx = p3.getX(vi), vy = p3.getY(vi);
        var dd = Math.sqrt(vx * vx + vy * vy);
        uv.setXY(vi, (dd - inR) / (outR - inR), 0.5);
      }
      var ring = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({
        map: saturnRingTexture(), side: THREE.DoubleSide,
        transparent: true, depthWrite: false
      }));
      ring.rotation.x = -Math.PI / 2;
      tiltG.add(ring);
    }

    // 天王星细环
    if (d.key === 'uranus') {
      var ur = new THREE.Mesh(
        new THREE.RingGeometry(d.radius * 1.5, d.radius * 1.62, 96, 1),
        new THREE.MeshBasicMaterial({ color: 0xaebfd4, side: THREE.DoubleSide, transparent: true, opacity: 0.35, depthWrite: false })
      );
      ur.rotation.x = -Math.PI / 2;
      tiltG.add(ur);
    }

    // 月球（仅地球）
    var moonPivot = null;
    if (d.key === 'earth') {
      moonPivot = new THREE.Group();
      holder.add(moonPivot);
      var moon = new THREE.Mesh(
        new THREE.SphereGeometry(0.7, 20, 14),
        new THREE.MeshPhongMaterial({ color: 0xb9b9b3, emissive: 0x0a0c14 })
      );
      moon.position.set(4.8, 0, 0);
      moonPivot.add(moon);
      moonPivot.rotation.x = 0.1;
    }

    var body = {
      data: d,
      plane: plane,
      holder: holder,
      mesh: mesh,
      orbitMat: om,
      moonPivot: moonPivot,
      angle: d.phase,
      omega: EARTH_OMEGA / Math.pow(d.periodYr, 0.4),
      worldPos: new THREE.Vector3(),
      labelEl: null,
      labelOffset: d.radius * (d.key === 'saturn' ? 2.3 : 1.6) + 1.2
    };
    hit.userData.body = body;
    hitMeshes.push(hit);
    planets.push(body);
    return body;
  }

  BODIES.forEach(buildPlanet);

  // 太阳也参与点击/标签
  var sunBody = {
    data: SUN, holder: null, mesh: sunMesh,
    worldPos: new THREE.Vector3(0, 0, 0),
    labelEl: null, labelOffset: SUN.radius * 1.45, isSun: true
  };
  sunMesh.userData.body = sunBody;
  hitMeshes.push(sunMesh);

  /* ---------- 小行星带（火星与木星之间的装饰） ---------- */
  var beltGroup = new THREE.Group();
  (function buildBelt() {
    var rnd = mulberry32(777);
    var N = 850;
    var pos = new Float32Array(N * 3);
    for (var i = 0; i < N; i++) {
      var r = 74 + rnd() * 12;
      var a = rnd() * Math.PI * 2;
      pos[i * 3] = Math.cos(a) * r;
      pos[i * 3 + 1] = (rnd() - 0.5) * 3;
      pos[i * 3 + 2] = Math.sin(a) * r;
    }
    var geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    var mat = new THREE.PointsMaterial({
      color: 0x9b8d76, size: 0.9, sizeAttenuation: true,
      map: starDotTexture(), depthWrite: false, transparent: true, opacity: 0.8
    });
    beltGroup.add(new THREE.Points(geo, mat));
    scene.add(beltGroup);
  })();

  /* ================================================================
   *  HTML 标签
   * ================================================================ */
  var allBodies = planets.concat([sunBody]);
  allBodies.forEach(function (b) {
    var el = document.createElement('div');
    el.className = 'planet-label';
    el.textContent = b.data.name;
    el.addEventListener('click', function (ev) {
      ev.stopPropagation();
      focusBody(b);
    });
    document.body.appendChild(el);
    b.labelEl = el;
  });

  /* ================================================================
   *  UI 元素
   * ================================================================ */
  var infoPanel = document.getElementById('infoPanel');
  var infoDot = document.getElementById('infoDot');
  var infoName = document.getElementById('infoName');
  var infoEn = document.getElementById('infoEn');
  var infoType = document.getElementById('infoType');
  var infoTable = document.getElementById('infoTable');
  var infoDesc = document.getElementById('infoDesc');
  var pauseBtn = document.getElementById('pauseBtn');
  var speedSlider = document.getElementById('speedSlider');
  var speedVal = document.getElementById('speedVal');
  var resetBtn = document.getElementById('resetBtn');
  var orbitChk = document.getElementById('orbitChk');
  var labelChk = document.getElementById('labelChk');
  var helpBtn = document.getElementById('helpBtn');
  var guide = document.getElementById('guide');
  var toast = document.getElementById('toast');

  var paused = false;
  var simSpeed = 1;
  var labelsOn = true;
  var focusedBody = null;
  var camAnim = null;
  var prevFocusPos = new THREE.Vector3();
  var toastTimer = null;

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toast.classList.remove('show'); }, 2200);
  }

  function fillInfo(b) {
    var d = b.data;
    infoDot.style.background = d.color;
    infoDot.style.color = d.color;
    infoName.textContent = d.name;
    infoEn.textContent = d.en;
    infoType.textContent = d.type;
    var rows = [
      ['直径', d.diameter],
      ['距日距离', d.dist],
      ['公转周期', d.orbitPeriod],
      ['自转周期', d.dayPeriod]
    ];
    var html = '';
    for (var i = 0; i < rows.length; i++) {
      html += '<tr><td>' + rows[i][0] + '</td><td>' + rows[i][1] + '</td></tr>';
    }
    infoTable.innerHTML = html;
    infoDesc.textContent = d.desc;
    infoPanel.classList.remove('hidden');
  }

  function updateLabelActive() {
    allBodies.forEach(function (b) {
      b.labelEl.classList.toggle('active', b === focusedBody);
    });
    planets.forEach(function (b) {
      var sel = (b === focusedBody);
      b.orbitMat.opacity = sel ? 0.85 : 0.32;
      b.orbitMat.color.set(sel ? b.data.color : '#91a7d0');
    });
  }

  /* ---------- 相机动画与聚焦 ---------- */
  function startCamAnim(getTo, dur) {
    camAnim = {
      t: 0, dur: dur,
      fromPos: camera.position.clone(),
      fromTgt: controls.target.clone(),
      getTo: getTo
    };
  }

  function focusBody(b) {
    focusedBody = b;
    fillInfo(b);
    updateLabelActive();
    var r = b.data.radius;
    controls.minDistance = Math.max(r * 2.1, 3.5);
    var dist = Math.max(r * 6.5, 10);
    // 小屏上信息面板占据下半屏，把取景目标下移，让行星出现在屏幕上半部
    var vShift = (window.innerWidth <= 640) ? dist * 0.26 : 0;
    startCamAnim(function () {
      var tgt = b.worldPos.clone();
      var dir = camera.position.clone().sub(tgt);
      if (dir.lengthSq() < 1e-6) dir.set(0, 0.4, 1);
      dir.normalize();
      if (!b.isSun && tgt.lengthSq() > 1e-6) {
        // 偏向向阳面取景，保证聚焦后看到被照亮的半球
        var sunward = tgt.clone().multiplyScalar(-1).normalize();
        dir.lerp(sunward, 0.6);
      }
      dir.y = Math.max(dir.y, 0.18);           // 稍微俯视，画面更立体
      dir.normalize();
      var pos = tgt.clone().add(dir.multiplyScalar(dist));
      tgt.y -= vShift;
      return { pos: pos, tgt: tgt };
    }, 1.1);
    if (b.holder) b.holder.getWorldPosition(prevFocusPos);
    else prevFocusPos.copy(b.worldPos);
    showToast('已聚焦：' + b.data.name);
  }

  function unfocus(animate) {
    focusedBody = null;
    infoPanel.classList.add('hidden');
    controls.minDistance = 18;
    updateLabelActive();
    if (animate) {
      startCamAnim(function () {
        return { pos: HOME_POS.clone(), tgt: HOME_TGT.clone() };
      }, 1.2);
    }
  }

  /* ---------- 控件事件 ---------- */
  pauseBtn.addEventListener('click', function () {
    paused = !paused;
    pauseBtn.textContent = paused ? '▶ 继续' : '⏸ 暂停';
    showToast(paused ? '已暂停公转动画' : '已继续公转动画');
  });

  speedSlider.addEventListener('input', function () {
    simSpeed = parseFloat(speedSlider.value);
    speedVal.textContent = simSpeed.toFixed(1) + '×';
  });

  resetBtn.addEventListener('click', function () {
    unfocus(true);
    showToast('已重置视角');
  });

  orbitChk.addEventListener('change', function () {
    var on = orbitChk.checked;
    planets.forEach(function (b) {
      b.plane.children[0].visible = on;   // 轨道线是 plane 的第一个子对象
    });
    beltGroup.visible = on;
  });

  labelChk.addEventListener('change', function () {
    labelsOn = labelChk.checked;
  });

  document.getElementById('infoClose').addEventListener('click', function () { unfocus(true); });
  helpBtn.addEventListener('click', function () { guide.classList.remove('hidden'); });
  document.getElementById('guideStart').addEventListener('click', function () { guide.classList.add('hidden'); });
  setTimeout(function () { guide.classList.add('hidden'); }, 14000);   // 超时自动收起引导

  window.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') unfocus(true);
    if (e.key === ' ') { e.preventDefault(); pauseBtn.click(); }
  });

  // 用户开始拖拽时取消进行中的相机动画，避免抢镜头
  controls.addEventListener('start', function () { camAnim = null; });

  /* ---------- 拾取（区分点击与拖拽） ---------- */
  var raycaster = new THREE.Raycaster();
  var pointerNDC = new THREE.Vector2();
  var downX = 0, downY = 0, downT = 0;

  renderer.domElement.addEventListener('pointerdown', function (e) {
    downX = e.clientX; downY = e.clientY; downT = performance.now();
  });

  renderer.domElement.addEventListener('pointerup', function (e) {
    var dx = e.clientX - downX, dy = e.clientY - downY;
    if (dx * dx + dy * dy > 36 || performance.now() - downT > 600) return; // 视为拖拽
    pointerNDC.x = (e.clientX / window.innerWidth) * 2 - 1;
    pointerNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(pointerNDC, camera);
    var hits = raycaster.intersectObjects(hitMeshes, false);
    if (hits.length > 0) {
      focusBody(hits[0].object.userData.body);
    }
  });

  // 悬停指针样式
  var hoverPending = false;
  renderer.domElement.addEventListener('pointermove', function (e) {
    if (hoverPending || e.pointerType !== 'mouse') return;
    hoverPending = true;
    var cx = e.clientX, cy = e.clientY;
    requestAnimationFrame(function () {
      hoverPending = false;
      pointerNDC.x = (cx / window.innerWidth) * 2 - 1;
      pointerNDC.y = -(cy / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointerNDC, camera);
      var hits = raycaster.intersectObjects(hitMeshes, false);
      renderer.domElement.style.cursor = hits.length ? 'pointer' : 'grab';
    });
  });

  /* ================================================================
   *  主循环
   * ================================================================ */
  var clock = new THREE.Clock();
  var tmpV = new THREE.Vector3();

  function easeInOut(t) { return t * t * (3 - 2 * t); }

  function updateLabels() {
    var w = window.innerWidth, h = window.innerHeight;
    for (var i = 0; i < allBodies.length; i++) {
      var b = allBodies[i];
      var el = b.labelEl;
      if (!labelsOn) { el.style.display = 'none'; continue; }
      tmpV.copy(b.worldPos);
      tmpV.y += b.labelOffset;
      tmpV.project(camera);
      if (tmpV.z > 1 || tmpV.z < -1) { el.style.display = 'none'; continue; }
      el.style.display = 'block';
      el.style.left = ((tmpV.x + 1) / 2 * w).toFixed(1) + 'px';
      el.style.top = ((1 - tmpV.y) / 2 * h).toFixed(1) + 'px';
    }
  }

  function animate() {
    requestAnimationFrame(animate);
    var rawDt = clock.getDelta();
    var dt = Math.min(rawDt, 0.05);           // 模拟用：防止切后台回来行星跳变
    var animDt = Math.min(rawDt, 0.5);        // 相机动画用：低帧率下仍按真实时长推进
    var simDt = paused ? 0 : dt * simSpeed;

    // 公转 + 自转
    for (var i = 0; i < planets.length; i++) {
      var b = planets[i];
      b.angle += b.omega * simDt;
      b.holder.position.set(
        Math.cos(b.angle) * b.data.orbitR, 0, Math.sin(b.angle) * b.data.orbitR
      );
      b.mesh.rotation.y += b.data.spinRate * simDt;
      if (b.moonPivot) b.moonPivot.rotation.y += 1.6 * simDt;
      b.holder.getWorldPosition(b.worldPos);
    }
    sunMesh.rotation.y += 0.05 * simDt;
    beltGroup.rotation.y += 0.012 * simDt;

    // 相机动画
    if (camAnim) {
      camAnim.t += animDt;
      var k = easeInOut(Math.min(camAnim.t / camAnim.dur, 1));
      var to = camAnim.getTo();
      camera.position.lerpVectors(camAnim.fromPos, to.pos, k);
      controls.target.lerpVectors(camAnim.fromTgt, to.tgt, k);
      if (camAnim.t >= camAnim.dur) {
        camAnim = null;
        if (focusedBody && focusedBody.holder) focusedBody.holder.getWorldPosition(prevFocusPos);
        else if (focusedBody) prevFocusPos.copy(focusedBody.worldPos);
      }
    } else if (focusedBody) {
      // 跟随：把行星本帧位移同步叠加到相机与目标点
      tmpV.copy(focusedBody.worldPos).sub(prevFocusPos);
      camera.position.add(tmpV);
      controls.target.add(tmpV);
      prevFocusPos.copy(focusedBody.worldPos);
    }

    controls.update();
    renderer.render(scene, camera);
    updateLabels();
  }

  // 小屏时让信息面板始终位于控制条上方，避免相互遮挡
  var controlBarEl = document.getElementById('controlBar');
  function layoutPanel() {
    if (window.innerWidth <= 640) {
      var barH = controlBarEl.offsetHeight;
      infoPanel.style.bottom = (barH + 22) + 'px';
      infoPanel.style.maxHeight = 'calc(100vh - ' + (barH + 120) + 'px)';
    } else {
      infoPanel.style.bottom = '';
      infoPanel.style.maxHeight = '';
    }
  }
  layoutPanel();

  window.addEventListener('resize', function () {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    layoutPanel();
  });

  animate();
})();
</script>
</body>
</html>
