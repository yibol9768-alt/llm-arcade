<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>太阳系九大行星 · 立体交互探索</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div id="scene-container"></div>
  <div id="label-layer"></div>

  <div id="top-bar">
    <div class="title">
      太阳系九大行星 · 立体探索
      <small>拖拽旋转 · 滚轮/双指缩放 · 点击行星查看详情</small>
    </div>
  </div>

  <div id="guide-hint">拖拽旋转视角，滚轮或双指缩放，点击任意星球查看中文介绍</div>

  <div id="info-panel">
    <div id="info-panel-header">
      <div>
        <h2 id="info-title">太阳</h2>
        <p id="info-subtitle">恒星 · Sun</p>
      </div>
      <button id="info-close" title="关闭">✕</button>
    </div>
    <ul id="info-facts"></ul>
  </div>

  <div id="toolbar">
    <button id="btn-pause" class="tb-btn">暂停</button>
    <button id="btn-reset" class="tb-btn">重置视角</button>
    <div class="tb-sep"></div>
    <div class="speed-control">
      <span>速度</span>
      <input id="speed-slider" type="range" min="0" max="4" step="0.1" value="1">
      <span id="speed-label">x1.0</span>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div>正在构建太阳系场景…</div>
  </div>
</div>

<script src="js/three.min.js"></script>
<script src="js/OrbitControls.js"></script>
<script src="js/planets-data.js"></script>
<script src="js/main.js"></script>
</body>
</html>
