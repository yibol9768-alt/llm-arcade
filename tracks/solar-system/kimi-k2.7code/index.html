<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太阳系九大行星立体交互探索</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #000;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 320px;
            padding: 20px;
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            max-height: 80vh;
            overflow-y: auto;
            z-index: 10;
        }
        #info-panel h1 {
            font-size: 20px;
            margin-bottom: 12px;
            color: #6db3ff;
            text-align: center;
        }
        #info-panel h2 {
            font-size: 18px;
            margin: 15px 0 10px;
            color: #ffd700;
        }
        #info-panel p {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 8px;
            color: #e0e6ff;
        }
        #info-panel .stat {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        #info-panel .stat span:first-child {
            color: #a0b0d0;
        }
        #info-panel .stat span:last-child {
            color: #fff;
            font-weight: 500;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            align-items: center;
            padding: 12px 24px;
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        #controls button, #controls select {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: rgba(60, 100, 180, 0.6);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        #controls button:hover, #controls select:hover {
            background: rgba(80, 140, 220, 0.8);
        }
        #controls button.active {
            background: rgba(255, 100, 80, 0.8);
        }
        #controls label {
            font-size: 14px;
            color: #a0b0d0;
        }
        #controls input[type="range"] {
            width: 120px;
            cursor: pointer;
        }
        #speed-value {
            min-width: 50px;
            text-align: center;
            font-size: 14px;
            color: #6db3ff;
        }
        #tooltip {
            position: absolute;
            padding: 8px 14px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            color: #fff;
            display: none;
            z-index: 20;
            white-space: nowrap;
        }
        #hint {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 12px 18px;
            background: rgba(10, 15, 30, 0.7);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 10px;
            font-size: 13px;
            color: #a0b0d0;
            z-index: 10;
        }
        .label {
            position: absolute;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 4px;
            font-size: 12px;
            color: #fff;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 5;
        }
        @media (max-width: 768px) {
            #info-panel {
                width: 90%;
                left: 5%;
                top: 10px;
                max-height: 35vh;
            }
            #controls {
                bottom: 10px;
                flex-wrap: wrap;
                justify-content: center;
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="info-panel">
        <h1>太阳系九大行星</h1>
        <div id="default-info">
            <p>欢迎进入太阳系立体交互模型。</p>
            <p>拖动鼠标旋转视角，滚轮缩放，点击行星查看详细信息。</p>
            <p>本模型包含太阳与九大行星：水星、金星、地球、火星、木星、土星、天王星、海王星和冥王星。</p>
        </div>
        <div id="planet-info" style="display: none;">
            <h2 id="planet-name"></h2>
            <div id="planet-stats"></div>
            <p id="planet-desc"></p>
        </div>
    </div>
    <div id="hint">
        左键拖拽旋转 | 滚轮缩放 | 右键平移 | 点击行星查看详情
    </div>
    <div id="controls">
        <button id="play-pause">暂停</button>
        <label>速度: <input type="range" id="speed-slider" min="0" max="5" step="0.1" value="1"></label>
        <span id="speed-value">1.0x</span>
        <select id="planet-select">
            <option value="">聚焦行星...</option>
        </select>
        <button id="reset-view">重置视角</button>
        <button id="toggle-orbits">隐藏轨道</button>
        <button id="toggle-labels">隐藏标签</button>
    </div>
    <div id="tooltip"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.0008);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(0, 60, 160);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 20;
        controls.maxDistance = 400;

        const ambientLight = new THREE.AmbientLight(0x333333, 0.5);
        scene.add(ambientLight);

        const sunLight = new THREE.PointLight(0xffffff, 2, 400);
        sunLight.position.set(0, 0, 0);
        sunLight.castShadow = true;
        scene.add(sunLight);

        const starGeometry = new THREE.BufferGeometry();
        const starCount = 8000;
        const positions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 800;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, transparent: true, opacity: 0.8 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        const textureLoader = new THREE.TextureLoader();
        const planetTextureBase = 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/';

        const planetData = [
            {
                name: '水星', english: 'Mercury',
                radius: 1.2, distance: 18, speed: 4.1, color: 0x8c8c8c,
                description: '距离太阳最近的行星，表面温差极大，白天可达430°C，夜晚降至-180°C。',
                stats: { '直径': '4,879 km', '公转周期': '88 天', '卫星数': '0', '表面温度': '-173 ~ 427°C' }
            },
            {
                name: '金星', english: 'Venus',
                radius: 2.4, distance: 28, speed: 3.0, color: 0xe6c229,
                description: '太阳系中最热的行星，浓厚大气造成极强温室效应，表面温度约462°C。',
                stats: { '直径': '12,104 km', '公转周期': '225 天', '卫星数': '0', '表面温度': '约 462°C' }
            },
            {
                name: '地球', english: 'Earth',
                radius: 2.5, distance: 40, speed: 2.5, color: 0x2233ff,
                description: '我们的家园，目前已知唯一存在生命的星球，表面71%被海洋覆盖。',
                stats: { '直径': '12,742 km', '公转周期': '365.25 天', '卫星数': '1', '表面温度': '-88 ~ 58°C' }
            },
            {
                name: '火星', english: 'Mars',
                radius: 1.8, distance: 54, speed: 2.0, color: 0xc1440e,
                description: '红色星球，表面富含氧化铁，拥有太阳系最高的山峰奥林帕斯山。',
                stats: { '直径': '6,779 km', '公转周期': '687 天', '卫星数': '2', '表面温度': '-153 ~ 20°C' }
            },
            {
                name: '木星', english: 'Jupiter',
                radius: 6.5, distance: 80, speed: 1.1, color: 0xd8ca9d,
                description: '太阳系最大的行星，气态巨行星，著名的大红斑是一个持续数百年的风暴。',
                stats: { '直径': '139,820 km', '公转周期': '11.86 年', '卫星数': '95', '表面温度': '约 -108°C' }
            },
            {
                name: '土星', english: 'Saturn',
                radius: 5.5, distance: 110, speed: 0.8, color: 0xfad5a5,
                hasRing: true, ringInner: 7, ringOuter: 13,
                description: '以其壮观的行星环系统闻名，主要由冰粒和岩石碎片组成。',
                stats: { '直径': '116,460 km', '公转周期': '29.45 年', '卫星数': '146', '表面温度': '约 -139°C' }
            },
            {
                name: '天王星', english: 'Uranus',
                radius: 3.8, distance: 140, speed: 0.55, color: 0x4fd0e7,
                description: '冰巨星，自转轴倾斜约98度，几乎是躺着公转。',
                stats: { '直径': '50,724 km', '公转周期': '84 年', '卫星数': '27', '表面温度': '约 -197°C' }
            },
            {
                name: '海王星', english: 'Neptune',
                radius: 3.7, distance: 170, speed: 0.45, color: 0x4b70dd,
                description: '太阳系最外层的大行星，拥有极快的风暴，风速可达2100 km/h。',
                stats: { '直径': '49,244 km', '公转周期': '164.8 年', '卫星数': '14', '表面温度': '约 -201°C' }
            },
            {
                name: '冥王星', english: 'Pluto',
                radius: 1.0, distance: 200, speed: 0.3, color: 0x8a7f80,
                description: '曾被列为第九大行星，2006年被重新分类为矮行星，位于柯伊伯带。',
                stats: { '直径': '2,377 km', '公转周期': '248 年', '卫星数': '5', '表面温度': '约 -229°C' }
            }
        ];

        const sunGeometry = new THREE.SphereGeometry(8, 64, 64);
        const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffdd00 });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        scene.add(sun);

        const sunGlowGeometry = new THREE.SphereGeometry(10, 64, 64);
        const sunGlowMaterial = new THREE.MeshBasicMaterial({
            color: 0xffaa00,
            transparent: true,
            opacity: 0.3
        });
        const sunGlow = new THREE.Mesh(sunGlowGeometry, sunGlowMaterial);
        scene.add(sunGlow);

        const planets = [];
        const orbitLines = [];
        const labels = [];

        planetData.forEach(data => {
            const orbitGeometry = new THREE.RingGeometry(data.distance - 0.2, data.distance + 0.2, 128);
            const orbitMaterial = new THREE.MeshBasicMaterial({
                color: 0x444466,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.4
            });
            const orbit = new THREE.Mesh(orbitGeometry, orbitMaterial);
            orbit.rotation.x = Math.PI / 2;
            scene.add(orbit);
            orbitLines.push(orbit);

            const planetGeometry = new THREE.SphereGeometry(data.radius, 32, 32);
            const planetMaterial = new THREE.MeshPhongMaterial({
                color: data.color,
                shininess: 25,
                specular: 0x111111
            });
            const planet = new THREE.Mesh(planetGeometry, planetMaterial);
            planet.castShadow = true;
            planet.receiveShadow = true;
            planet.userData = data;

            const angle = Math.random() * Math.PI * 2;
            planet.position.set(
                Math.cos(angle) * data.distance,
                0,
                Math.sin(angle) * data.distance
            );
            scene.add(planet);
            planets.push({ mesh: planet, angle: angle, data: data });

            if (data.hasRing) {
                const ringGeometry = new THREE.RingGeometry(data.ringInner, data.ringOuter, 64);
                const ringMaterial = new THREE.MeshBasicMaterial({
                    color: 0xc8a880,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.7
                });
                const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                ring.rotation.x = Math.PI / 2.3;
                ring.rotation.y = 0.2;
                planet.add(ring);
            }

            const labelDiv = document.createElement('div');
            labelDiv.className = 'label';
            labelDiv.textContent = data.name;
            document.body.appendChild(labelDiv);
            labels.push({ element: labelDiv, mesh: planet });

            const option = document.createElement('option');
            option.value = data.name;
            option.textContent = data.name;
            document.getElementById('planet-select').appendChild(option);
        });

        const asteroidBelt = new THREE.Group();
        for (let i = 0; i < 300; i++) {
            const distance = 64 + Math.random() * 12;
            const angle = Math.random() * Math.PI * 2;
            const size = 0.1 + Math.random() * 0.25;
            const asteroidGeometry = new THREE.SphereGeometry(size, 8, 8);
            const asteroidMaterial = new THREE.MeshPhongMaterial({ color: 0x666666 });
            const asteroid = new THREE.Mesh(asteroidGeometry, asteroidMaterial);
            asteroid.position.set(
                Math.cos(angle) * distance,
                (Math.random() - 0.5) * 2,
                Math.sin(angle) * distance
            );
            asteroid.userData = { distance: distance, angle: angle, speed: 0.3 + Math.random() * 0.5 };
            asteroidBelt.add(asteroid);
        }
        scene.add(asteroidBelt);

        let isPlaying = true;
        let speed = 1.0;
        let showOrbits = true;
        let showLabels = true;
        let selectedPlanet = null;

        document.getElementById('play-pause').addEventListener('click', function() {
            isPlaying = !isPlaying;
            this.textContent = isPlaying ? '暂停' : '播放';
            this.classList.toggle('active', !isPlaying);
        });

        document.getElementById('speed-slider').addEventListener('input', function() {
            speed = parseFloat(this.value);
            document.getElementById('speed-value').textContent = speed.toFixed(1) + 'x';
        });

        document.getElementById('reset-view').addEventListener('click', function() {
            camera.position.set(0, 60, 160);
            controls.target.set(0, 0, 0);
            controls.update();
            selectedPlanet = null;
            document.getElementById('default-info').style.display = 'block';
            document.getElementById('planet-info').style.display = 'none';
        });

        document.getElementById('toggle-orbits').addEventListener('click', function() {
            showOrbits = !showOrbits;
            orbitLines.forEach(orbit => orbit.visible = showOrbits);
            this.textContent = showOrbits ? '隐藏轨道' : '显示轨道';
        });

        document.getElementById('toggle-labels').addEventListener('click', function() {
            showLabels = !showLabels;
            labels.forEach(label => label.element.style.display = showLabels ? 'block' : 'none');
            this.textContent = showLabels ? '隐藏标签' : '显示标签';
        });

        document.getElementById('planet-select').addEventListener('change', function() {
            const name = this.value;
            if (!name) return;
            const p = planets.find(p => p.data.name === name);
            if (p) {
                selectedPlanet = p.mesh;
                focusOnPlanet(p.mesh);
                showPlanetInfo(p.data);
            }
        });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');

        renderer.domElement.addEventListener('mousemove', function(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(planets.map(p => p.mesh));
            if (intersects.length > 0) {
                tooltip.style.display = 'block';
                tooltip.style.left = event.clientX + 15 + 'px';
                tooltip.style.top = event.clientY + 15 + 'px';
                tooltip.textContent = intersects[0].object.userData.name;
                renderer.domElement.style.cursor = 'pointer';
            } else {
                tooltip.style.display = 'none';
                renderer.domElement.style.cursor = 'default';
            }
        });

        renderer.domElement.addEventListener('click', function(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(planets.map(p => p.mesh));
            if (intersects.length > 0) {
                const planet = intersects[0].object;
                selectedPlanet = planet;
                focusOnPlanet(planet);
                showPlanetInfo(planet.userData);
            }
        });

        function focusOnPlanet(planet) {
            const offset = 15;
            const targetPosition = new THREE.Vector3(
                planet.position.x + offset,
                planet.position.y + offset * 0.5,
                planet.position.z + offset
            );
            camera.position.copy(targetPosition);
            controls.target.copy(planet.position);
            controls.update();
        }

        function showPlanetInfo(data) {
            document.getElementById('default-info').style.display = 'none';
            document.getElementById('planet-info').style.display = 'block';
            document.getElementById('planet-name').textContent = data.name + ' (' + data.english + ')';
            document.getElementById('planet-desc').textContent = data.description;
            const statsDiv = document.getElementById('planet-stats');
            statsDiv.innerHTML = '';
            for (const [key, value] of Object.entries(data.stats)) {
                const statDiv = document.createElement('div');
                statDiv.className = 'stat';
                statDiv.innerHTML = '<span>' + key + '</span><span>' + value + '</span>';
                statsDiv.appendChild(statDiv);
            }
        }

        function updateLabels() {
            labels.forEach(item => {
                if (!showLabels) return;
                const pos = item.mesh.position.clone();
                pos.y += item.mesh.userData.radius + 1.5;
                pos.project(camera);
                const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
                const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;
                if (pos.z > 1 || x < 0 || x > window.innerWidth || y < 0 || y > window.innerHeight) {
                    item.element.style.display = 'none';
                } else {
                    item.element.style.display = 'block';
                    item.element.style.left = x + 'px';
                    item.element.style.top = y + 'px';
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            if (isPlaying) {
                planets.forEach(p => {
                    p.angle += p.data.speed * 0.005 * speed;
                    p.mesh.position.x = Math.cos(p.angle) * p.data.distance;
                    p.mesh.position.z = Math.sin(p.angle) * p.data.distance;
                    p.mesh.rotation.y += 0.02 * speed;
                });

                asteroidBelt.children.forEach(asteroid => {
                    asteroid.userData.angle += asteroid.userData.speed * 0.002 * speed;
                    asteroid.position.x = Math.cos(asteroid.userData.angle) * asteroid.userData.distance;
                    asteroid.position.z = Math.sin(asteroid.userData.angle) * asteroid.userData.distance;
                });

                sunGlow.rotation.y += 0.002;
            }

            if (selectedPlanet) {
                controls.target.copy(selectedPlanet.position);
            }

            controls.update();
            updateLabels();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', function() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
