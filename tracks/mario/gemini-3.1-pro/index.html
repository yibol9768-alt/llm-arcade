<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Clone</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        #game-container {
            position: relative;
        }
        canvas {
            background-color: #5c94fc; /* Sky blue */
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            display: block;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
            width: 780px;
            display: flex;
            justify-content: space-between;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 40px;
            font-weight: bold;
            text-shadow: 3px 3px 0 #000;
            text-align: center;
            display: none;
            flex-direction: column;
            align-items: center;
        }
        #restart-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 20px;
            font-family: inherit;
            background-color: #e52521;
            color: white;
            border: 2px solid white;
            cursor: pointer;
            border-radius: 5px;
        }
        #restart-btn:hover {
            background-color: #c41e1a;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="score-display">SCORE: 0</div>
            <div id="lives-display">LIVES: 3</div>
        </div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div id="game-over">
            <div id="game-over-text">GAME OVER</div>
            <button id="restart-btn">Try Again</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
