<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>马里奥小游戏</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #87d7ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      user-select: none;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
    }
    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: #fff;
      text-shadow: 0 2px 0 rgba(0,0,0,.35);
    }
    .hud {
      position: absolute;
      top: 14px;
      left: 14px;
      display: flex;
      gap: 14px;
      align-items: center;
      font-weight: 700;
      letter-spacing: 0;
      font-size: 16px;
    }
    .pill {
      background: rgba(0,0,0,.28);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 8px;
      padding: 6px 10px;
      backdrop-filter: blur(4px);
    }
    .centerMsg {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      min-width: min(560px, calc(100vw - 28px));
      pointer-events: none;
      text-align: center;
      display: none;
    }
    .centerMsg .title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .centerMsg .body {
      font-size: 15px;
      line-height: 1.5;
      opacity: .95;
    }
    #touch {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 14px;
      pointer-events: none;
      gap: 14px;
    }
    .pad, .actions {
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }
    .btn {
      width: 64px;
      height: 64px;
      border: 0;
      border-radius: 12px;
      background: rgba(0,0,0,.28);
      color: #fff;
      font-size: 24px;
      font-weight: 800;
      display: grid;
      place-items: center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.15);
      backdrop-filter: blur(4px);
    }
    .btn:active, .btn.down {
      background: rgba(255,255,255,.18);
    }
    @media (max-width: 760px) {
      .hud { font-size: 14px; gap: 8px; flex-wrap: wrap; }
      .btn { width: 58px; height: 58px; border-radius: 11px; }
      .centerMsg { min-width: calc(100vw - 20px); }
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div class="hud">
    <div class="pill" id="hudLives">MARIO x3</div>
    <div class="pill" id="hudCoins">COIN 000</div>
    <div class="pill" id="hudTime">TIME 300</div>
    <div class="pill" id="hudState">READY</div>
  </div>
  <div class="centerMsg" id="message">
    <div class="title" id="msgTitle"></div>
    <div class="body" id="msgBody"></div>
  </div>
</div>
<div id="touch" aria-hidden="true">
  <div class="pad">
    <button class="btn" data-key="left">◀</button>
    <button class="btn" data-key="right">▶</button>
  </div>
  <div class="actions">
    <button class="btn" data-key="jump">A</button>
    <button class="btn" data-key="run">B</button>
  </div>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const hudLives = document.getElementById('hudLives');
  const hudCoins = document.getElementById('hudCoins');
  const hudTime = document.getElementById('hudTime');
  const hudState = document.getElementById('hudState');
  const message = document.getElementById('message');
  const msgTitle = document.getElementById('msgTitle');
  const msgBody = document.getElementById('msgBody');

  const W = 220;
  const H = 22;
  const TS = 32;
  const worldW = W * TS;
  const worldH = H * TS;

  const keys = { left: false, right: false, jump: false, run: false };
  const keyLatch = { jump: false };
  let started = false;
  let paused = false;
  let finished = false;
  let gameOver = false;
  let timeLeft = 300;
  let timeAcc = 0;
  let lives = 3;
  let coins = 0;
  let cameraX = 0;
  let cameraY = 0;
  let last = performance.now();
  let audioCtx = null;
  let sfxUnlocked = false;

  const bg = document.createElement('canvas');
  bg.width = 960;
  bg.height = 540;
  const bgCtx = bg.getContext('2d');

  const grid = Array.from({ length: H }, () => Array(W).fill(0));
  const blocks = [];
  const enemies = [];
  const coinsList = [];
  const particles = [];
  const checkpoints = [];
  const decoClouds = [];
  let goal = { x: 0, y: 0, w: 32, h: 160, active: true };

  function rand(seed) {
    const x = Math.sin(seed * 12.9898) * 43758.5453;
    return x - Math.floor(x);
  }

  function clamp(v, a, b) {
    return Math.max(a, Math.min(b, v));
  }

  function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function setTile(x, y, t) {
    if (x >= 0 && x < W && y >= 0 && y < H) grid[y][x] = t;
  }

  function getTile(x, y) {
    if (x < 0 || x >= W || y < 0 || y >= H) return 1;
    return grid[y][x];
  }

  function tileSolid(t) {
    return t === 1 || t === 2 || t === 3 || t === 4 || t === 5 || t === 6 || t === 7 || t === 8 || t === 9;
  }

  function makeParticle(x, y, vx, vy, color, life, size) {
    particles.push({ x, y, vx, vy, color, life, size });
  }

  function popCoin(x, y) {
    makeParticle(x, y, (Math.random() - 0.5) * 70, -160 - Math.random() * 80, '#ffd84d', 0.7, 6);
  }

  function playTone(freq, duration, type = 'square', gain = 0.045) {
    if (!sfxUnlocked) return;
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const t0 = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(gain, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
    osc.connect(g).connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0 + duration + 0.02);
  }

  function buildLevel() {
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) grid[y][x] = 0;
    }
    blocks.length = 0;
    enemies.length = 0;
    coinsList.length = 0;
    particles.length = 0;
    checkpoints.length = 0;
    decoClouds.length = 0;

    const groundY = 18;
    for (let x = 0; x < W; x++) {
      for (let y = groundY + (x % 17 === 0 ? 1 : 0); y < H; y++) setTile(x, y, 1);
    }

    const pits = [
      [12, 3], [25, 2], [39, 4], [55, 3], [72, 4], [91, 3], [111, 4], [132, 3], [153, 4], [176, 3], [196, 4]
    ];
    pits.forEach(([x, w]) => {
      for (let i = 0; i < w; i++) {
        for (let y = 17; y < H; y++) setTile(x + i, y, 0);
      }
    });

    function addBrickRow(x, y, w, kind = 2) {
      for (let i = 0; i < w; i++) setTile(x + i, y, kind);
    }

    function addPlatform(x, y, w) {
      for (let i = 0; i < w; i++) setTile(x + i, y, 9);
    }

    function addPipe(x, y, h) {
      setTile(x, y, 5);
      setTile(x + 1, y, 6);
      for (let i = 1; i < h; i++) {
        setTile(x, y + i, 7);
        setTile(x + 1, y + i, 8);
      }
    }

    function surfaceYAtTileX(tx) {
      for (let ty = 0; ty < H; ty++) {
        if (tileSolid(getTile(tx, ty))) return ty * TS - 28;
      }
      return 0;
    }

    for (let x = 6; x < W - 10; x += 18) {
      const y = 13 - ((x * 13) % 3);
      addPlatform(x, y, 3 + (x % 4));
      if (x % 36 === 6) {
        addBrickRow(x + 1, y - 2, 2, 3);
      }
    }

    for (let x = 10; x < W - 20; x += 24) {
      const y = 15 - ((x * 7) % 2);
      addPipe(x, y, 3 + (x % 2));
    }

    const questionBlocks = [
      [7, 12], [8, 12], [29, 10], [30, 10], [47, 11], [48, 11], [67, 9], [68, 9],
      [87, 12], [88, 12], [123, 10], [124, 10], [165, 11], [166, 11]
    ];
    questionBlocks.forEach(([x, y]) => setTile(x, y, 3));

    const bricks = [
      [16, 12, 4], [18, 12, 3], [33, 9, 6], [58, 12, 4], [61, 12, 3], [78, 10, 5],
      [97, 9, 5], [116, 12, 4], [138, 11, 6], [158, 10, 4], [179, 12, 5]
    ];
    bricks.forEach(([x, y, w]) => addBrickRow(x, y, w, 2));

    for (let x = 4; x < W - 8; x += 7) {
      if (Math.random() < 0.65) {
        coinsList.push({ x: x * TS + 12, y: (10 + ((x * 3) % 7)) * TS - 18, r: 8, taken: false });
      }
    }

    const arcs = [
      [14, 12], [41, 10], [64, 12], [95, 10], [128, 11], [150, 12], [188, 10]
    ];
    arcs.forEach(([baseX, baseY], idx) => {
      for (let i = -3; i <= 3; i++) {
        const t = (i + 3) / 6;
        const yOff = Math.round(Math.sin(t * Math.PI) * 3);
        coinsList.push({ x: (baseX + i) * TS + 12, y: (baseY - yOff) * TS - 18, r: 8, taken: false });
      }
    });

    const enemyXs = [18, 22, 34, 47, 63, 79, 98, 121, 139, 158, 171, 189, 204];
    enemyXs.forEach((x, i) => {
      enemies.push({
        x: x * TS,
        y: surfaceYAtTileX(x),
        w: 28,
        h: 28,
        vx: (i % 2 === 0 ? 1 : -1) * (48 + (i % 3) * 8),
        vy: 0,
        alive: true,
        dir: i % 2 === 0 ? 1 : -1,
        bornOnGround: true
      });
    });

    checkpoints.push({ x: 97 * TS, y: 14 * TS, w: 28, h: 48, touched: false });
    goal = { x: (W - 8) * TS, y: 9 * TS, w: 32, h: 320, active: true };

    for (let i = 0; i < 22; i++) {
      decoClouds.push({
        x: rand(i + 1) * worldW * 0.95,
        y: 40 + rand(i + 17) * 180,
        s: 0.6 + rand(i + 31) * 1.7
      });
    }

    player.x = 4 * TS;
    player.y = 18 * TS - player.h;
    player.vx = 0;
    player.vy = 0;
    player.spawnX = player.x;
    player.spawnY = player.y;
    player.big = false;
    player.inv = 0;
    player.onGround = false;
    player.jumpHeld = false;
    player.coyote = 0;
    player.jumpBuffer = 0;
    player.facing = 1;
    player.dead = false;
    player.anim = 0;

    lives = 3;
    coins = 0;
    timeLeft = 300;
    timeAcc = 0;
    started = false;
    paused = false;
    finished = false;
    gameOver = false;
    showMessage('马里奥小游戏', '按方向键移动，空格或上键跳跃，A/B 也可用。收集金币，踩掉敌人，冲到终点旗杆。');
    hudState.textContent = 'READY';
  }

  const player = {
    x: 0, y: 0, w: 24, h: 30,
    vx: 0, vy: 0,
    spawnX: 0, spawnY: 0,
    big: false,
    inv: 0,
    onGround: false,
    jumpHeld: false,
    coyote: 0,
    jumpBuffer: 0,
    facing: 1,
    dead: false,
    anim: 0
  };

  window.__marioState = {
    get playerX() { return player.x; },
    get playerY() { return player.y; },
    get cameraX() { return cameraX; },
    get lives() { return lives; },
    get coins() { return coins; },
    get timeLeft() { return timeLeft; },
    get started() { return started; },
    get finished() { return finished; },
    get gameOver() { return gameOver; },
    get state() { return hudState.textContent; }
  };

  function showMessage(title, body) {
    msgTitle.textContent = title;
    msgBody.textContent = body;
    message.style.display = 'block';
  }

  function hideMessage() {
    message.style.display = 'none';
  }

  function resetAfterDeath() {
    if (lives <= 0) {
      gameOver = true;
      hudState.textContent = 'GAME OVER';
      showMessage('游戏结束', '按 R 或点重启按钮重新开始。');
      return;
    }
    player.x = player.spawnX;
    player.y = player.spawnY;
    player.vx = 0;
    player.vy = 0;
    player.inv = 2;
    player.big = false;
    player.dead = false;
    timeLeft = 300;
    timeAcc = 0;
    hudState.textContent = 'RESPAWN';
    showMessage('复活', '继续前进。');
    setTimeout(() => {
      if (!finished && !gameOver) hideMessage();
    }, 700);
  }

  function collectCoin(coin) {
    coin.taken = true;
    coins += 1;
    popCoin(coin.x, coin.y);
    playTone(880, 0.08, 'triangle', 0.05);
    if (coins % 50 === 0) {
      lives += 1;
      playTone(1200, 0.12, 'square', 0.06);
    }
  }

  function hitBlock(block) {
    if (block.used) return;
    block.used = true;
    setTile(block.tx, block.ty, 4);
    playTone(520, 0.05, 'square', 0.04);
    makeParticle(block.x + TS / 2, block.y + TS / 2, 0, -120, '#ffd84d', 0.5, 4);
    coins += 1;
  }

  function hurtPlayer() {
    if (player.inv > 0 || finished || gameOver) return;
    if (player.big) {
      player.big = false;
      player.inv = 1.3;
      playTone(180, 0.14, 'sawtooth', 0.05);
      return;
    }
    lives -= 1;
    player.dead = true;
    player.inv = 1.2;
    playTone(110, 0.16, 'square', 0.06);
    makeParticle(player.x + player.w / 2, player.y + player.h / 2, 0, -220, '#fff', 0.4, 10);
    resetAfterDeath();
  }

  function stompEnemy(enemy) {
    enemy.alive = false;
    makeParticle(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, 0, -180, '#ffb85c', 0.5, 10);
    playTone(260, 0.08, 'triangle', 0.05);
    player.vy = -360;
  }

  function moveAndCollide(entity, dt, isPlayer = false) {
    const prevX = entity.x;
    const prevY = entity.y;
    entity.x += entity.vx * dt;
    let left = Math.floor(entity.x / TS);
    let right = Math.floor((entity.x + entity.w - 1) / TS);
    let top = Math.floor(entity.y / TS);
    let bottom = Math.floor((entity.y + entity.h - 1) / TS);

    for (let y = top; y <= bottom; y++) {
      for (let x = left; x <= right; x++) {
        const t = getTile(x, y);
        if (!tileSolid(t)) continue;
        const tile = { x: x * TS, y: y * TS, w: TS, h: TS };
        if (!rectsOverlap(entity, tile)) continue;
        if (entity.vx > 0) entity.x = tile.x - entity.w;
        else if (entity.vx < 0) entity.x = tile.x + tile.w;
        entity.vx = 0;
      }
    }

    entity.y += entity.vy * dt;
    entity.onGround = false;
    left = Math.floor(entity.x / TS);
    right = Math.floor((entity.x + entity.w - 1) / TS);
    top = Math.floor(entity.y / TS);
    bottom = Math.floor((entity.y + entity.h - 1) / TS);

    for (let y = top; y <= bottom; y++) {
      for (let x = left; x <= right; x++) {
        const t = getTile(x, y);
        if (!tileSolid(t)) continue;
        const tile = { x: x * TS, y: y * TS, w: TS, h: TS };
        if (!rectsOverlap(entity, tile)) continue;
        if (entity.vy > 0) {
          entity.y = tile.y - entity.h;
          entity.vy = 0;
          entity.onGround = true;
        } else if (entity.vy < 0) {
          entity.y = tile.y + tile.h;
          entity.vy = 0;
          if (isPlayer) {
            const tx = x;
            const ty = y;
            const kind = getTile(tx, ty);
            if (kind === 3) {
              const block = { tx, ty, x: tx * TS, y: ty * TS, used: false };
              blocks.push(block);
              hitBlock(block);
            } else if (kind === 2) {
              setTile(tx, ty, 4);
              playTone(380, 0.04, 'square', 0.04);
              makeParticle(tile.x + TS / 2, tile.y + TS / 2, 0, -90, '#c58f50', 0.4, 5);
            }
          }
        }
      }
    }

    if (isPlayer) {
      player.onGround = entity.onGround;
      if (entity.x < 0) entity.x = 0;
      if (entity.x + entity.w > worldW) entity.x = worldW - entity.w;
      if (entity.y > worldH + 120) hurtPlayer();
    }
  }

  function updateEnemy(enemy, dt) {
    if (!enemy.alive) return;
    const prevX = enemy.x;
    const speed = enemy.vx;
    enemy.vx = enemy.dir * Math.abs(speed);
    enemy.vy += 1700 * dt;
    moveAndCollide(enemy, dt, false);
    const aheadX = enemy.dir > 0 ? enemy.x + enemy.w + 3 : enemy.x - 3;
    const footY = enemy.y + enemy.h + 1;
    const under = getTile(Math.floor(aheadX / TS), Math.floor(footY / TS));
    const face = getTile(Math.floor((enemy.dir > 0 ? enemy.x + enemy.w + 1 : enemy.x - 1) / TS), Math.floor((enemy.y + enemy.h / 2) / TS));
    if (!tileSolid(under) || tileSolid(face)) enemy.dir *= -1;
    if (enemy.x <= 0 || enemy.x + enemy.w >= worldW) enemy.dir *= -1;
  }

  function updateCoinPickup(coin, dt) {
    if (coin.taken) return;
    const box = { x: coin.x - coin.r, y: coin.y - coin.r, w: coin.r * 2, h: coin.r * 2 };
    if (rectsOverlap(player, box)) collectCoin(coin);
  }

  function updateCheckpoint(cp) {
    const box = { x: cp.x, y: cp.y, w: cp.w, h: cp.h };
    if (!cp.touched && rectsOverlap(player, box)) {
      cp.touched = true;
      player.spawnX = cp.x - 40;
      player.spawnY = cp.y - 90;
      playTone(740, 0.13, 'triangle', 0.06);
      showMessage('检查点', '已经保存进度。');
      setTimeout(() => {
        if (!finished && !gameOver) hideMessage();
      }, 700);
    }
  }

  function updateGoal() {
    if (!goal.active) return;
    const box = { x: goal.x - 14, y: goal.y, w: goal.w + 16, h: goal.h };
    if (rectsOverlap(player, box)) {
      goal.active = false;
      finished = true;
      hudState.textContent = 'CLEAR';
      playTone(660, 0.15, 'triangle', 0.06);
      setTimeout(() => playTone(880, 0.15, 'triangle', 0.06), 150);
      setTimeout(() => playTone(990, 0.18, 'triangle', 0.06), 320);
      showMessage('通关', '你已经到达终点。按 R 重新开始。');
    }
  }

  function startGame() {
    started = true;
    hideMessage();
    hudState.textContent = 'RUN';
    if (!sfxUnlocked) {
      sfxUnlocked = true;
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume?.();
    }
  }

  function restartGame() {
    buildLevel();
  }

  function update(dt) {
    if (!started || paused || finished || gameOver) return;

    timeAcc += dt;
    if (timeAcc >= 1) {
      const step = Math.floor(timeAcc);
      timeLeft = Math.max(0, timeLeft - step);
      timeAcc -= step;
      if (timeLeft === 0) {
        lives -= 1;
        resetAfterDeath();
      }
    }

    player.inv = Math.max(0, player.inv - dt);
    player.coyote = player.onGround ? 0.11 : Math.max(0, player.coyote - dt);
    player.jumpBuffer = Math.max(0, player.jumpBuffer - dt);
    if (keys.jump) player.jumpBuffer = 0.12;
    if (!keys.jump) player.jumpHeld = false;

    const accel = keys.run ? 1400 : 1100;
    const maxSpeed = keys.run ? 220 : 170;
    const friction = player.onGround ? 1800 : 700;
    const gravity = 1650;
    const jumpVel = -560;

    if (keys.left) {
      player.vx -= accel * dt;
      player.facing = -1;
    }
    if (keys.right) {
      player.vx += accel * dt;
      player.facing = 1;
    }
    if (!keys.left && !keys.right) {
      if (player.vx > 0) player.vx = Math.max(0, player.vx - friction * dt);
      if (player.vx < 0) player.vx = Math.min(0, player.vx + friction * dt);
    }
    player.vx = clamp(player.vx, -maxSpeed, maxSpeed);

    player.vy += gravity * dt;
    if (player.jumpBuffer > 0 && player.coyote > 0) {
      player.vy = jumpVel;
      player.jumpBuffer = 0;
      player.coyote = 0;
      playTone(440, 0.05, 'triangle', 0.04);
    }
    if (keys.jump && player.vy < 0 && !player.jumpHeld) {
      player.jumpHeld = true;
      player.vy *= 0.88;
    }
    if (!keys.jump && player.vy < 0) {
      player.vy += 800 * dt;
    }
    if (player.vy > 900) player.vy = 900;

    moveAndCollide(player, dt, true);

    if (player.inv <= 0) {
      for (const enemy of enemies) {
        if (!enemy.alive) continue;
        const box = { x: enemy.x, y: enemy.y, w: enemy.w, h: enemy.h };
        if (!rectsOverlap(player, box)) continue;
        if (player.vy > 0 && player.y + player.h - enemy.y < 14) {
          stompEnemy(enemy);
        } else {
          hurtPlayer();
          break;
        }
      }
    }

    for (const enemy of enemies) updateEnemy(enemy, dt);
    for (const coin of coinsList) updateCoinPickup(coin, dt);
    for (const cp of checkpoints) updateCheckpoint(cp);
    updateGoal();

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt;
      p.vy += 500 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      if (p.life <= 0) particles.splice(i, 1);
    }

    const viewW = canvas.width / (window.devicePixelRatio || 1);
    const viewH = canvas.height / (window.devicePixelRatio || 1);
    cameraX += ((player.x + player.w / 2 - cameraX) - viewW * 0.35) * Math.min(1, 5 * dt);
    cameraY += ((player.y + player.h / 2 - cameraY) - viewH * 0.38) * Math.min(1, 3 * dt);
    cameraX = clamp(cameraX, 0, Math.max(0, worldW - viewW));
    cameraY = clamp(cameraY, 0, Math.max(0, worldH - viewH));

    hudLives.textContent = `MARIO x${String(lives).padStart(2, '0')}`;
    hudCoins.textContent = `COIN ${String(coins).padStart(3, '0')}`;
    hudTime.textContent = `TIME ${String(timeLeft).padStart(3, '0')}`;
    hudState.textContent = player.inv > 0 ? 'HIT' : (player.onGround ? 'RUN' : 'AIR');
  }

  function drawBackground() {
    const w = bg.width, h = bg.height;
    bgCtx.clearRect(0, 0, w, h);
    const sky = bgCtx.createLinearGradient(0, 0, 0, h);
    sky.addColorStop(0, '#8ad7ff');
    sky.addColorStop(1, '#c9f2ff');
    bgCtx.fillStyle = sky;
    bgCtx.fillRect(0, 0, w, h);

    const cam = cameraX * 0.35;
    bgCtx.fillStyle = '#69c46d';
    bgCtx.beginPath();
    bgCtx.moveTo(0, h - 60);
    for (let x = 0; x <= w; x += 40) {
      const y = h - 60 - Math.sin((x + cam) * 0.012) * 11 - Math.cos((x + cam) * 0.02) * 5;
      bgCtx.lineTo(x, y);
    }
    bgCtx.lineTo(w, h);
    bgCtx.lineTo(0, h);
    bgCtx.closePath();
    bgCtx.fill();

    bgCtx.fillStyle = '#2f8f3a';
    for (let i = 0; i < 12; i++) {
      const base = decoClouds[i];
      const x = (base.x - cam * 0.2 + w * 1.2) % (w * 1.6) - w * 0.3;
      const y = base.y;
      const s = base.s;
      bgCtx.save();
      bgCtx.translate(x, y);
      bgCtx.scale(s, s);
      bgCtx.fillStyle = 'rgba(255,255,255,.92)';
      roundedCloud(bgCtx, 0, 0, 64, 28);
      bgCtx.restore();
    }
  }

  function roundedCloud(g, x, y, w, h) {
    g.beginPath();
    g.moveTo(x + 12, y + h);
    g.quadraticCurveTo(x, y + h, x, y + h - 12);
    g.quadraticCurveTo(x, y + 8, x + 16, y + 8);
    g.quadraticCurveTo(x + 20, y, x + 32, y + 2);
    g.quadraticCurveTo(x + 40, y - 4, x + 48, y + 4);
    g.quadraticCurveTo(x + 60, y + 2, x + 60, y + 14);
    g.quadraticCurveTo(x + 72, y + 16, x + 72, y + 26);
    g.quadraticCurveTo(x + 72, y + h, x + 60, y + h);
    g.closePath();
    g.fill();
  }

  function drawTile(t, x, y) {
    const px = Math.round(x - cameraX);
    const py = Math.round(y - cameraY);
    if (px < -TS || py < -TS || px > canvas.width + TS || py > canvas.height + TS) return;
    if (t === 1) {
      ctx.fillStyle = '#8b5a2b';
      ctx.fillRect(px, py, TS, TS);
      ctx.fillStyle = '#4caf50';
      ctx.fillRect(px, py, TS, 8);
      ctx.fillStyle = 'rgba(255,255,255,.12)';
      ctx.fillRect(px + 4, py + 4, 5, 6);
    } else if (t === 2) {
      ctx.fillStyle = '#c2702d';
      ctx.fillRect(px, py, TS, TS);
      ctx.strokeStyle = '#8d4415';
      ctx.lineWidth = 2;
      ctx.strokeRect(px + 1, py + 1, TS - 2, TS - 2);
      ctx.beginPath();
      ctx.moveTo(px + 4, py + 8);
      ctx.lineTo(px + TS - 4, py + 8);
      ctx.moveTo(px + 4, py + 18);
      ctx.lineTo(px + TS - 4, py + 18);
      ctx.stroke();
    } else if (t === 3) {
      ctx.fillStyle = '#f2c233';
      ctx.fillRect(px, py, TS, TS);
      ctx.strokeStyle = '#9d6d00';
      ctx.lineWidth = 2;
      ctx.strokeRect(px + 1, py + 1, TS - 2, TS - 2);
      ctx.fillStyle = '#fff3b0';
      ctx.fillRect(px + 6, py + 5, 6, 6);
      ctx.fillRect(px + 16, py + 5, 6, 6);
      ctx.fillRect(px + 9, py + 15, 14, 6);
    } else if (t === 4) {
      ctx.fillStyle = '#91704a';
      ctx.fillRect(px, py, TS, TS);
      ctx.fillStyle = '#6c5233';
      ctx.fillRect(px, py + 20, TS, 12);
    } else if (t === 5 || t === 6) {
      ctx.fillStyle = '#2aa54a';
      ctx.fillRect(px, py, TS, TS);
      ctx.fillStyle = '#1a7f34';
      ctx.fillRect(px, py + 6, TS, TS - 6);
      ctx.fillStyle = '#4ecb6d';
      ctx.fillRect(px + 2, py + 2, TS - 4, 6);
      ctx.fillStyle = '#1e6f2c';
      ctx.fillRect(px + 4, py + 10, TS - 8, 2);
      if (t === 6) {
        ctx.fillStyle = 'rgba(255,255,255,.15)';
        ctx.fillRect(px + 16, py + 2, 4, 28);
      }
    } else if (t === 7 || t === 8) {
      ctx.fillStyle = '#1d8f3d';
      ctx.fillRect(px, py, TS, TS);
      ctx.fillStyle = '#156f2f';
      ctx.fillRect(px + 4, py + 4, TS - 8, TS - 4);
      ctx.fillStyle = 'rgba(255,255,255,.1)';
      ctx.fillRect(px + 2, py + 2, 4, 28);
    } else if (t === 9) {
      ctx.fillStyle = '#5a9c5c';
      ctx.fillRect(px, py, TS, TS);
      ctx.fillStyle = '#84c46d';
      ctx.fillRect(px, py, TS, 8);
    }
  }

  function drawEnemy(enemy) {
    if (!enemy.alive) return;
    const x = Math.round(enemy.x - cameraX);
    const y = Math.round(enemy.y - cameraY);
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(enemy.dir, 1);
    ctx.translate(enemy.dir > 0 ? 0 : -enemy.w, 0);
    ctx.fillStyle = '#b97b3c';
    ctx.fillRect(2, 7, 24, 18);
    ctx.fillStyle = '#8f5c2b';
    ctx.fillRect(0, 18, 28, 10);
    ctx.fillStyle = '#f0d1a2';
    ctx.fillRect(6, 9, 16, 9);
    ctx.fillStyle = '#fff';
    ctx.fillRect(9, 12, 3, 3);
    ctx.fillRect(16, 12, 3, 3);
    ctx.fillStyle = '#222';
    ctx.fillRect(10, 13, 1, 1);
    ctx.fillRect(17, 13, 1, 1);
    ctx.restore();
  }

  function drawPlayer() {
    const x = Math.round(player.x - cameraX);
    const y = Math.round(player.y - cameraY);
    const blink = player.inv > 0 && Math.floor(performance.now() / 80) % 2 === 0;
    if (blink) return;
    ctx.save();
    ctx.translate(x + player.w / 2, y + player.h / 2);
    if (player.facing < 0) ctx.scale(-1, 1);
    ctx.translate(-player.w / 2, -player.h / 2);
    const bodyH = player.big ? 34 : 22;
    const bodyY = player.big ? 14 : 12;
    ctx.fillStyle = '#d92d2a';
    ctx.fillRect(6, 2, 12, 9);
    ctx.fillStyle = '#2c5da8';
    ctx.fillRect(7, bodyY, 10, bodyH);
    ctx.fillStyle = '#f4c9a6';
    ctx.fillRect(8, 10, 8, 10);
    ctx.fillStyle = '#f8d44c';
    ctx.fillRect(6, 8, 12, 3);
    ctx.fillStyle = '#fff';
    ctx.fillRect(9, 5, 7, 3);
    ctx.fillStyle = '#222';
    ctx.fillRect(11, 13, 2, 2);
    ctx.fillRect(15, 13, 2, 2);
    ctx.fillStyle = '#8b4b2d';
    ctx.fillRect(6, bodyY + bodyH - 3, 5, 10);
    ctx.fillRect(13, bodyY + bodyH - 3, 5, 10);
    ctx.fillStyle = '#1f1f1f';
    ctx.fillRect(5, bodyY + bodyH + 4, 7, 4);
    ctx.fillRect(12, bodyY + bodyH + 4, 7, 4);
    ctx.restore();
  }

  function drawCoins() {
    for (const c of coinsList) {
      if (c.taken) continue;
      const x = Math.round(c.x - cameraX);
      const y = Math.round(c.y - cameraY);
      const wobble = Math.sin(performance.now() / 160 + c.x * 0.01) * 2;
      ctx.fillStyle = '#f7ce39';
      ctx.beginPath();
      ctx.ellipse(x, y + wobble, 6, 9, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff1a6';
      ctx.beginPath();
      ctx.ellipse(x - 2, y - 1 + wobble, 2, 4, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawCheckpoint(cp) {
    const x = Math.round(cp.x - cameraX);
    const y = Math.round(cp.y - cameraY);
    ctx.fillStyle = cp.touched ? '#78d88f' : '#e1ecff';
    ctx.fillRect(x + 12, y - 24, 4, 72);
    ctx.fillStyle = cp.touched ? '#3fb65d' : '#d7e1f5';
    ctx.beginPath();
    ctx.moveTo(x + 16, y - 18);
    ctx.lineTo(x + 44, y - 10);
    ctx.lineTo(x + 16, y + 2);
    ctx.closePath();
    ctx.fill();
  }

  function drawGoal() {
    const x = Math.round(goal.x - cameraX);
    const y = Math.round(goal.y - cameraY);
    ctx.fillStyle = '#d8d0c8';
    ctx.fillRect(x + 10, y, 12, 170);
    ctx.fillStyle = '#ecf0f4';
    ctx.fillRect(x + 22, y + 12, 84, 52);
    ctx.fillStyle = '#dd4c42';
    ctx.beginPath();
    ctx.moveTo(x + 26, y + 18);
    ctx.lineTo(x + 78, y + 30);
    ctx.lineTo(x + 26, y + 42);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#6f4a2c';
    ctx.fillRect(x + 4, y + 160, 28, 10);
  }

  function drawParticles() {
    for (const p of particles) {
      const x = Math.round(p.x - cameraX);
      const y = Math.round(p.y - cameraY);
      ctx.fillStyle = p.color;
      ctx.fillRect(x, y, p.size, p.size);
    }
  }

  function drawScene() {
    drawBackground();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
    ctx.translate(-cameraX, -cameraY);
    const viewW = canvas.width / (window.devicePixelRatio || 1);
    const viewH = canvas.height / (window.devicePixelRatio || 1);
    const startX = Math.max(0, Math.floor(cameraX / TS) - 2);
    const endX = Math.min(W - 1, Math.ceil((cameraX + viewW) / TS) + 2);
    const startY = Math.max(0, Math.floor(cameraY / TS) - 2);
    const endY = Math.min(H - 1, Math.ceil((cameraY + viewH) / TS) + 2);
    for (let y = startY; y <= endY; y++) {
      for (let x = startX; x <= endX; x++) {
        const t = grid[y][x];
        if (t) drawTile(t, x * TS, y * TS);
      }
    }
    drawGoal();
    for (const cp of checkpoints) drawCheckpoint(cp);
    drawCoins();
    for (const enemy of enemies) drawEnemy(enemy);
    drawPlayer();
    drawParticles();
    ctx.restore();

    if (!started) {
      showMessage('马里奥小游戏', '按方向键移动，空格或上键跳跃，A/B 也可用。收集金币，踩掉敌人，冲到终点旗杆。');
    }
  }

  function onKey(e, down) {
    const k = e.key.toLowerCase();
    if (k === 'arrowleft' || k === 'a') keys.left = down;
    if (k === 'arrowright' || k === 'd') keys.right = down;
    if (k === 'arrowup' || k === 'w' || k === ' ' || k === 'z' || k === 'j') keys.jump = down;
    if (k === 'shift' || k === 'x' || k === 'k') keys.run = down;
    if (down && (k === 'r')) restartGame();
    if (down && (k === 'p')) paused = !paused;
    if (down && !started && (k === 'arrowleft' || k === 'arrowright' || k === 'a' || k === 'd' || k === ' ' || k === 'w' || k === 'z' || k === 'j')) startGame();
  }

  window.addEventListener('keydown', (e) => { onKey(e, true); }, { passive: false });
  window.addEventListener('keyup', (e) => { onKey(e, false); }, { passive: false });

  const touchButtons = document.querySelectorAll('.btn');
  touchButtons.forEach((btn) => {
    const key = btn.dataset.key;
    const down = (ev) => {
      ev.preventDefault();
      if (key === 'left') keys.left = true;
      if (key === 'right') keys.right = true;
      if (key === 'jump') keys.jump = true;
      if (key === 'run') keys.run = true;
      if (!started) startGame();
      btn.classList.add('down');
    };
    const up = (ev) => {
      ev.preventDefault();
      if (key === 'left') keys.left = false;
      if (key === 'right') keys.right = false;
      if (key === 'jump') keys.jump = false;
      if (key === 'run') keys.run = false;
      btn.classList.remove('down');
    };
    btn.addEventListener('pointerdown', down);
    btn.addEventListener('pointerup', up);
    btn.addEventListener('pointercancel', up);
    btn.addEventListener('pointerleave', up);
  });

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.floor(innerWidth * dpr);
    canvas.height = Math.floor(innerHeight * dpr);
    ctx.imageSmoothingEnabled = false;
  }

  window.addEventListener('resize', resize);

  function loop(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;
    update(dt);
    drawScene();
    requestAnimationFrame(loop);
  }

  resize();
  buildLevel();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
