<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Mario Mini</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', 'Courier New', monospace;
    user-select: none;
    -webkit-user-select: none;
  }
  #game-container {
    position: relative;
    image-rendering: pixelated;
  }
  canvas {
    display: block;
    border: 3px solid #333;
    border-radius: 4px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #ui-overlay {
    position: absolute;
    top: 0; left: 0; right: 0;
    pointer-events: none;
    display: flex;
    justify-content: space-around;
    padding: 8px 16px;
    color: #fff;
    font-size: 14px;
    text-shadow: 2px 2px 0 #000;
  }
  #mobile-controls {
    display: none;
    position: absolute;
    bottom: 10px;
    left: 0; right: 0;
    justify-content: space-between;
    padding: 0 10px;
    pointer-events: none;
  }
  .ctrl-btn {
    pointer-events: all;
    width: 60px; height: 60px;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 12px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .ctrl-btn:active { background: rgba(255,255,255,0.35); }
  .ctrl-group { display: flex; gap: 8px; }
  @media (max-width: 820px) {
    #mobile-controls { display: flex; }
    #ui-overlay { font-size: 11px; padding: 4px 8px; }
  }
</style>
</head>
<body>

<div id="game-container">
  <canvas id="game"></canvas>
  <div id="ui-overlay">
    <span id="score-display">SCORE: 0</span>
    <span id="coins-display">🪙 × 0</span>
    <span id="lives-display">❤️ × 3</span>
    <span id="world-display">WORLD 1-1</span>
  </div>
  <div id="mobile-controls">
    <div class="ctrl-group">
      <button class="ctrl-btn" id="btn-left">◀</button>
      <button class="ctrl-btn" id="btn-right">▶</button>
    </div>
    <div class="ctrl-group">
      <button class="ctrl-btn" id="btn-run">🏃</button>
      <button class="ctrl-btn" id="btn-jump">⬆</button>
    </div>
  </div>
</div>

<script>
// ── Canvas setup ──────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 800, H = 480;
const TILE = 32;
canvas.width = W;
canvas.height = H;

// Scale canvas to fit screen
function resize() {
  const maxW = Math.min(window.innerWidth - 16, 800);
  const maxH = Math.min(window.innerHeight - 16, 480);
  const scale = Math.min(maxW / W, maxH / H);
  canvas.style.width = Math.floor(W * scale) + 'px';
  canvas.style.height = Math.floor(H * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ── Audio (simple oscillator SFX) ────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, type, duration, vol = 0.08) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function sfxJump() { playSound(200, 'square', 0.15, 0.06); playSound(400, 'square', 0.1, 0.06); }
function sfxCoin() { playSound(988, 'square', 0.05, 0.06); playSound(1319, 'square', 0.08, 0.1); }
function sfxStomp() { playSound(150, 'triangle', 0.12, 0.06); }
function sfxPowerUp() { playSound(523, 'square', 0.08, 0.1); playSound(659, 'square', 0.08, 0.1); playSound(784, 'square', 0.08, 0.15); }
function sfxHit() { playSound(100, 'sawtooth', 0.15, 0.06); }
function sfxDeath() { playSound(200, 'square', 0.3, 0.06); playSound(180, 'square', 0.3, 0.06); playSound(150, 'square', 0.4, 0.1); }

// ── Input ────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.code] = false; e.preventDefault(); });

// Mobile controls
let mobileInput = { left: false, right: false, jump: false, run: false };
function setupMobileBtn(id, key) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.addEventListener('pointerdown', e => { e.preventDefault(); mobileInput[key] = true; });
  btn.addEventListener('pointerup', e => { e.preventDefault(); mobileInput[key] = false; });
  btn.addEventListener('pointerleave', e => { mobileInput[key] = false; });
}
setupMobileBtn('btn-left', 'left');
setupMobileBtn('btn-right', 'right');
setupMobileBtn('btn-jump', 'jump');
setupMobileBtn('btn-run', 'run');

function isDown(action) {
  switch (action) {
    case 'left': return keys['ArrowLeft'] || keys['KeyA'] || mobileInput.left;
    case 'right': return keys['ArrowRight'] || keys['KeyD'] || mobileInput.right;
    case 'jump': return keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || mobileInput.jump;
    case 'run': return keys['ShiftLeft'] || keys['ShiftRight'] || keys['KeyZ'] || mobileInput.run;
    default: return false;
  }
}

// ── Game state ───────────────────────────────────────────────
let score = 0, coins = 0, lives = 3;
let cameraX = 0;
let gameState = 'title'; // title | playing | dying | gameover | win
let deathTimer = 0;
const GRAVITY = 0.6;
const LEVEL_WIDTH = 6400;

// ── Player ───────────────────────────────────────────────────
const player = {
  x: 80, y: 300,
  vx: 0, vy: 0,
  w: 28, h: 32,
  onGround: false,
  facing: 1, // 1 = right, -1 = left
  big: false,
  invincible: 0,
  animFrame: 0,
  animTimer: 0,
};

function resetPlayer() {
  player.x = 80;
  player.y = H - TILE * 3;
  player.vx = 0;
  player.vy = 0;
  player.onGround = false;
  player.facing = 1;
  player.big = false;
  player.invincible = 120;
  player.animFrame = 0;
  player.animTimer = 0;
  cameraX = 0;
}

// ── Level data ───────────────────────────────────────────────
// Legend: G=ground, B=brick, Q=question(coin), M=question(mushroom),
//         P=pipe-top-left, p=pipe-top-right, I=pipe-body-left, i=pipe-body-right,
//         C=coin, E=enemy(goomba), S=stair, T=flag-top, F=flag-pole
const levelMap = [];

// Generate level
function buildLevel() {
  // Fill with air
  for (let x = 0; x < LEVEL_WIDTH / TILE; x++) {
    levelMap[x] = [];
    for (let y = 0; y < H / TILE; y++) {
      levelMap[x][y] = null;
    }
  }
  const groundY = Math.floor(H / TILE) - 2; // Row 13

  // Ground everywhere
  for (let x = 0; x < LEVEL_WIDTH / TILE; x++) {
    levelMap[x][groundY] = 'G';
    levelMap[x][groundY + 1] = 'G';
  }

  // Gaps in ground
  const gaps = [
    [42, 45], [78, 80], [115, 117], [155, 158],
  ];
  gaps.forEach(([s, e]) => {
    for (let x = s; x <= e; x++) {
      levelMap[x][groundY] = null;
      levelMap[x][groundY + 1] = null;
    }
  });

  // Question blocks
  const qBlocks = [16, 21, 22, 23, 48, 52, 80, 88, 100, 120, 130, 140];
  qBlocks.forEach(x => { levelMap[x][groundY - 4] = 'Q'; });

  // Brick blocks
  const bricks = [20, 50, 51, 53, 60, 64, 77, 79, 90, 92, 94, 96, 98, 128, 129, 131, 132];
  bricks.forEach(x => { levelMap[x][groundY - 4] = 'B'; });

  // Pipes
  function addPipe(cx, height) {
    const top = groundY - height;
    levelMap[cx][top] = 'P';
    levelMap[cx + 1][top] = 'p';
    for (let y = top + 1; y < groundY; y++) {
      levelMap[cx][y] = 'I';
      levelMap[cx + 1][y] = 'i';
    }
  }
  addPipe(28, 2);
  addPipe(38, 3);
  addPipe(55, 2);
  addPipe(105, 2);
  addPipe(125, 3);

  // Stairs
  function addStairs(sx, sy, height) {
    for (let i = 0; i < height; i++) {
      for (let j = 0; j <= i; j++) {
        levelMap[sx + j][sy - i] = 'S';
      }
    }
  }
  addStairs(72, groundY - 1, 4);
  addStairs(85, groundY - 1, 3);
  addStairs(150, groundY - 1, 5);
  addStairs(170, groundY - 1, 8);

  // Floating coin rows
  for (let x = 62; x <= 70; x += 2) {
    levelMap[x][groundY - 6] = 'C';
  }
  for (let x = 145; x <= 153; x += 2) {
    levelMap[x][groundY - 5] = 'C';
  }

  // Flag at end
  const flagX = 190;
  levelMap[flagX][groundY - 8] = 'T';
  for (let y = groundY - 7; y < groundY; y++) {
    levelMap[flagX][y] = 'F';
  }
}

buildLevel();

// ── Entities ─────────────────────────────────────────────────
let enemies = [];
let coinEntities = [];
let particles = [];

function spawnEnemies() {
  enemies = [];
  const positions = [35, 44, 56, 62, 75, 82, 95, 108, 118, 135, 142, 155, 165];
  positions.forEach(x => {
    enemies.push({
      x: x * TILE, y: (Math.floor(H / TILE) - 2) * TILE - 28,
      vx: -1,
      vy: 0,
      w: 28, h: 28,
      alive: true,
      animTimer: 0,
    });
  });
}

function spawnCoins() {
  coinEntities = [];
  for (let x = 0; x < LEVEL_WIDTH / TILE; x++) {
    for (let y = 0; y < H / TILE; y++) {
      if (levelMap[x] && levelMap[x][y] === 'C') {
        coinEntities.push({
          x: x * TILE + 8, y: y * TILE + 4,
          w: 16, h: 16,
          collected: false,
          animTimer: Math.random() * Math.PI * 2,
        });
      }
    }
  }
}

spawnEnemies();
spawnCoins();

function spawnParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: -Math.random() * 6 - 2,
      life: 30 + Math.random() * 20,
      color,
      size: 2 + Math.random() * 4,
    });
  }
}

// ── Collision ────────────────────────────────────────────────
function rectCollide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function getTile(x, y) {
  const tx = Math.floor(x / TILE);
  const ty = Math.floor(y / TILE);
  if (tx < 0 || tx >= LEVEL_WIDTH / TILE || ty < 0 || ty >= H / TILE) return null;
  return levelMap[tx][ty];
}

function isSolid(tile) {
  return tile === 'G' || tile === 'B' || tile === 'Q' || tile === 'P' || tile === 'p'
      || tile === 'I' || tile === 'i' || tile === 'S' || tile === 'F';
}

function isSolidAt(x, y) {
  return isSolid(getTile(x, y));
}

// ── Update ───────────────────────────────────────────────────
function updatePlayer() {
  if (gameState === 'dying' || gameState === 'gameover') return;

  // Movement
  const speed = isDown('run') ? 5 : 3;
  if (isDown('left')) player.vx = -speed;
  else if (isDown('right')) player.vx = speed;
  else player.vx *= 0.7;

  if (Math.abs(player.vx) < 0.1) player.vx = 0;
  if (player.vx > 0) player.facing = 1;
  if (player.vx < 0) player.facing = -1;

  // Jump
  if (isDown('jump') && player.onGround) {
    player.vy = -11;
    player.onGround = false;
    sfxJump();
  }

  // Variable jump height
  if (!isDown('jump') && player.vy < -3) {
    player.vy = -3;
  }

  // Apply gravity
  player.vy += GRAVITY;
  if (player.vy > 14) player.vy = 14;

  // Move X
  player.x += player.vx;
  if (player.x < 0) player.x = 0;
  if (player.x > LEVEL_WIDTH - player.w) player.x = LEVEL_WIDTH - player.w;

  // X collision
  const checkPoints = [
    { x: player.x, y: player.y },
    { x: player.x + player.w - 1, y: player.y },
    { x: player.x, y: player.y + player.h - 1 },
    { x: player.x + player.w - 1, y: player.y + player.h - 1 },
  ];
  for (const cp of checkPoints) {
    if (isSolidAt(cp.x, cp.y)) {
      if (player.vx > 0) player.x = Math.floor(cp.x / TILE) * TILE - player.w;
      else if (player.vx < 0) player.x = Math.floor(cp.x / TILE) * TILE + TILE;
      player.vx = 0;
      break;
    }
  }

  // Move Y
  player.y += player.vy;

  // Y collision
  player.onGround = false;
  for (const cp of checkPoints) {
    const tx = Math.floor(cp.x / TILE);
    const ty = Math.floor(cp.y / TILE);
    const tile = getTile(cp.x, cp.y);
    if (isSolid(tile)) {
      if (player.vy > 0) {
        player.y = ty * TILE - player.h;
        player.vy = 0;
        player.onGround = true;
      } else if (player.vy < 0) {
        player.y = (ty + 1) * TILE;
        player.vy = 0;
        // Hit block from below
        if (tile === 'Q') {
          levelMap[tx][ty] = 'B';
          coins++;
          score += 200;
          sfxCoin();
          spawnParticles(tx * TILE + TILE / 2, ty * TILE, '#FFD700', 6);
          updateUI();
        } else if (tile === 'B') {
          levelMap[tx][ty] = null;
          sfxHit();
          spawnParticles(tx * TILE + TILE / 2, ty * TILE, '#8B4513', 8);
        }
      }
      break;
    }
  }

  // Fall into gap
  if (player.y > H + 50) {
    killPlayer();
  }

  // Invincibility timer
  if (player.invincible > 0) player.invincible--;

  // Animation
  if (Math.abs(player.vx) > 0.5 && player.onGround) {
    player.animTimer++;
  } else {
    player.animTimer = 0;
    player.animFrame = 0;
  }
  if (player.animTimer > 6) {
    player.animTimer = 0;
    player.animFrame = (player.animFrame + 1) % 3;
  }

  // Camera
  const targetCamX = player.x - W / 3;
  cameraX += (targetCamX - cameraX) * 0.1;
  if (cameraX < 0) cameraX = 0;
  if (cameraX > LEVEL_WIDTH - W) cameraX = LEVEL_WIDTH - W;

  // Check flag
  const flagX = 190 * TILE;
  if (player.x + player.w > flagX && player.x < flagX + TILE) {
    score += 2000;
    updateUI();
    gameState = 'win';
  }
}

function updateEnemies() {
  enemies.forEach(e => {
    if (!e.alive) return;
    e.animTimer++;

    // Gravity
    e.vy += GRAVITY;
    if (e.vy > 10) e.vy = 10;
    e.y += e.vy;

    // Ground collision
    const below = getTile(e.x + e.w / 2, e.y + e.h + 1);
    if (isSolid(below)) {
      e.y = Math.floor((e.y + e.h) / TILE) * TILE;
      e.vy = 0;
    }

    // Move horizontally
    e.x += e.vx;
    // Wall collision
    const frontX = e.vx > 0 ? e.x + e.w + 1 : e.x - 1;
    if (isSolidAt(frontX, e.y + e.h / 2)) {
      e.vx *= -1;
    }
    // Edge detection
    const frontBelow = getTile(frontX, e.y + e.h + 2);
    if (!isSolid(frontBelow) && e.vy === 0) {
      e.vx *= -1;
    }

    // Off screen cleanup
    if (e.y > H + 100) e.alive = false;
  });
}

function updatePlayerEnemyCollision() {
  if (player.invincible > 0) return;
  enemies.forEach(e => {
    if (!e.alive) return;
    if (rectCollide(player, e)) {
      // Check if stomping (player falling onto enemy from above)
      if (player.vy > 0 && player.y + player.h - e.y < 20) {
        // Stomp!
        e.alive = false;
        player.vy = -8;
        score += 100;
        sfxStomp();
        spawnParticles(e.x + e.w / 2, e.y + e.h / 2, '#FF6347', 6);
        updateUI();
      } else {
        // Player hit
        if (player.big) {
          player.big = false;
          player.invincible = 90;
          sfxHit();
        } else {
          killPlayer();
        }
      }
    }
  });
}

function updateCoinCollection() {
  coinEntities.forEach(c => {
    if (c.collected) return;
    if (rectCollide(player, c)) {
      c.collected = true;
      coins++;
      score += 100;
      sfxCoin();
      updateUI();
    }
  });
}

function killPlayer() {
  if (player.invincible > 0) return;
  lives--;
  updateUI();
  sfxDeath();
  if (lives <= 0) {
    gameState = 'gameover';
  } else {
    gameState = 'dying';
    deathTimer = 0;
    player.vy = -10;
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function updateUI() {
  document.getElementById('score-display').textContent = `SCORE: ${score}`;
  document.getElementById('coins-display').textContent = `🪙 × ${coins}`;
  document.getElementById('lives-display').textContent = `❤️ × ${lives}`;
}

function update() {
  if (gameState === 'playing') {
    updatePlayer();
    updateEnemies();
    updatePlayerEnemyCollision();
    updateCoinCollection();
    updateParticles();
  } else if (gameState === 'dying') {
    deathTimer++;
    player.vy += GRAVITY;
    player.y += player.vy;
    updateParticles();
    if (deathTimer > 60) {
      resetPlayer();
      spawnEnemies();
      spawnCoins();
      gameState = 'playing';
    }
  } else if (gameState === 'title' || gameState === 'gameover' || gameState === 'win') {
    updateParticles();
  }
}

// ── Render ───────────────────────────────────────────────────
function drawTile(tile, x, y) {
  const sx = x - cameraX;
  const sy = y;
  if (sx < -TILE || sx > W || sy < -TILE || sy > H) return;

  switch (tile) {
    case 'G':
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = '#228B22';
      ctx.fillRect(sx, sy, TILE, 8);
      ctx.fillStyle = '#654321';
      ctx.fillRect(sx, sy + 1, TILE, 2);
      break;
    case 'B':
      ctx.fillStyle = '#C84C09';
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.strokeRect(sx + 1, sy + 1, TILE - 2, TILE - 2);
      ctx.fillStyle = '#A03A05';
      ctx.fillRect(sx + 2, sy + 2, 8, 8);
      ctx.fillRect(sx + TILE - 10, sy + 2, 8, 8);
      ctx.fillRect(sx + 2, sy + TILE - 10, 8, 8);
      ctx.fillRect(sx + TILE - 10, sy + TILE - 10, 8, 8);
      break;
    case 'Q':
      const bob = Math.sin(Date.now() / 300 + x / 32) * 1;
      ctx.fillStyle = '#FFA500';
      ctx.fillRect(sx, sy + bob, TILE, TILE - bob);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(sx + 1, sy + 1 + bob, TILE - 2, TILE - 2 - bob);
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('?', sx + TILE / 2, sy + TILE / 2 + 5 + bob);
      ctx.textAlign = 'start';
      break;
    case 'P':
      ctx.fillStyle = '#228B22';
      ctx.fillRect(sx, sy, TILE * 2, TILE);
      ctx.fillStyle = '#1a6b1a';
      ctx.fillRect(sx - 2, sy, TILE * 2 + 4, 4);
      ctx.strokeStyle = '#0d4d0d';
      ctx.lineWidth = 1;
      ctx.strokeRect(sx, sy + 4, TILE * 2, TILE - 4);
      break;
    case 'p': break; // drawn by P
    case 'I':
      ctx.fillStyle = '#228B22';
      ctx.fillRect(sx, sy, TILE * 2, TILE);
      ctx.fillStyle = '#1a6b1a';
      ctx.fillRect(sx - 2, sy, 4, TILE);
      ctx.fillRect(sx + TILE * 2 - 2, sy, 4, TILE);
      break;
    case 'i': break; // drawn by I
    case 'S':
      ctx.fillStyle = '#808080';
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = '#696969';
      ctx.fillRect(sx + 2, sy + 2, TILE - 4, TILE - 4);
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 1;
      ctx.strokeRect(sx, sy, TILE, TILE);
      break;
    case 'T':
      ctx.fillStyle = '#00FF00';
      ctx.beginPath();
      ctx.moveTo(sx + TILE / 2, sy);
      ctx.lineTo(sx + TILE, sy + TILE / 2);
      ctx.lineTo(sx + TILE / 2, sy + TILE);
      ctx.lineTo(sx, sy + TILE / 2);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#FFF';
      ctx.beginPath();
      ctx.arc(sx + TILE / 2, sy + TILE / 2, 4, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'F':
      ctx.fillStyle = '#2E8B57';
      ctx.fillRect(sx + TILE / 2 - 3, sy, 6, TILE);
      ctx.fillStyle = '#FFF';
      ctx.fillRect(sx + TILE / 2 - 2, sy + 2, 4, 4);
      ctx.fillRect(sx + TILE / 2 - 2, sy + 10, 4, 4);
      ctx.fillRect(sx + TILE / 2 - 2, sy + 18, 4, 4);
      break;
  }
}

function drawPlayer() {
  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) return;

  const sx = player.x - cameraX;
  const sy = player.y;
  const f = player.facing;

  // Body
  ctx.fillStyle = '#FF0000';
  ctx.fillRect(sx + 2, sy + 8, 24, 14);
  // Overalls
  ctx.fillStyle = '#0000FF';
  ctx.fillRect(sx + 4, sy + 20, 20, 10);
  // Head
  ctx.fillStyle = '#FFCBA4';
  ctx.fillRect(sx + 6, sy + 2, 16, 10);
  // Hat
  ctx.fillStyle = '#FF0000';
  ctx.fillRect(sx + 4, sy, 20, 5);
  ctx.fillRect(sx + 2, sy + 4, 24, 3);
  // Eyes
  ctx.fillStyle = '#000';
  if (f === 1) {
    ctx.fillRect(sx + 18, sy + 4, 3, 3);
  } else {
    ctx.fillRect(sx + 8, sy + 4, 3, 3);
  }
  // Shoes
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(sx + 4, sy + 28, 10, 4);
  ctx.fillRect(sx + 14, sy + 28, 10, 4);

  // Running animation (alternating shoes)
  if (player.onGround && Math.abs(player.vx) > 0.5) {
    if (player.animFrame === 0) {
      ctx.fillRect(sx + 4, sy + 28, 10, 4);
      ctx.fillRect(sx + 14, sy + 28, 10, 4);
    } else if (player.animFrame === 1) {
      ctx.fillRect(sx + 2, sy + 28, 10, 3);
      ctx.fillRect(sx + 16, sy + 28, 10, 4);
    } else {
      ctx.fillRect(sx + 6, sy + 28, 10, 4);
      ctx.fillRect(sx + 12, sy + 28, 10, 3);
    }
  }
}

function drawEnemy(e) {
  if (!e.alive) return;
  const sx = e.x - cameraX;
  const sy = e.y;
  if (sx < -TILE || sx > W) return;

  // Body
  ctx.fillStyle = '#8B4513';
  ctx.beginPath();
  ctx.ellipse(sx + e.w / 2, sy + e.h / 2 + 2, 11, 10, 0, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(sx + 3, sy + 14, 22, 12);
  // Feet
  const footOff = Math.sin(e.animTimer * 0.15) * 2;
  ctx.fillStyle = '#000';
  ctx.fillRect(sx, sy + 24 + footOff, 12, 4);
  ctx.fillRect(sx + 16, sy + 24 - footOff, 12, 4);
  // Eyes
  ctx.fillStyle = '#FFF';
  ctx.fillRect(sx + 6, sy + 8, 8, 7);
  ctx.fillRect(sx + 14, sy + 8, 8, 7);
  ctx.fillStyle = '#000';
  const eyeDir = e.vx > 0 ? 1 : -1;
  ctx.fillRect(sx + 9 + eyeDir * 2, sy + 10, 3, 4);
  ctx.fillRect(sx + 17 + eyeDir * 2, sy + 10, 3, 4);
  // Eyebrows (angry)
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(sx + 6, sy + 6, 8, 2);
  ctx.fillRect(sx + 14, sy + 6, 8, 2);
}

function drawCoin(c) {
  if (c.collected) return;
  const sx = c.x - cameraX;
  const sy = c.y + Math.sin(c.animTimer * 0.05 + Date.now() * 0.003) * 3;
  if (sx < -TILE || sx > W) return;

  const scale = Math.abs(Math.cos(Date.now() * 0.004 + c.x * 0.1));
  if (scale < 0.3) return; // Edge-on, almost invisible

  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.ellipse(sx + c.w / 2, sy + c.h / 2, c.w / 2 * scale, c.h / 2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#FFA500';
  ctx.beginPath();
  ctx.ellipse(sx + c.w / 2, sy + c.h / 2, c.w / 2 * scale * 0.6, c.h / 2 * 0.7, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawParticles() {
  particles.forEach(p => {
    const sx = p.x - cameraX;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.min(1, p.life / 15);
    ctx.fillRect(sx, p.y, p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#5C94FC');
  grad.addColorStop(0.7, '#87CEEB');
  grad.addColorStop(1, '#B0E0E6');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Clouds
  ctx.fillStyle = '#FFF';
  function drawCloud(cx, cy) {
    const sx = cx - cameraX * 0.3;
    if (sx < -100 || sx > W + 100) return;
    ctx.beginPath();
    ctx.arc(sx, cy, 24, 0, Math.PI * 2);
    ctx.arc(sx + 24, cy - 12, 28, 0, Math.PI * 2);
    ctx.arc(sx + 50, cy, 20, 0, Math.PI * 2);
    ctx.arc(sx + 30, cy + 8, 22, 0, Math.PI * 2);
    ctx.fill();
  }
  drawCloud(200, 60);
  drawCloud(700, 40);
  drawCloud(1200, 80);
  drawCloud(1800, 50);
  drawCloud(2500, 70);
  drawCloud(3200, 45);
  drawCloud(4000, 65);
  drawCloud(4800, 55);
  drawCloud(5600, 75);

  // Hills
  ctx.fillStyle = '#7EC850';
  function drawHill(cx, baseY) {
    const sx = cx - cameraX * 0.5;
    if (sx < -200 || sx > W + 200) return;
    ctx.beginPath();
    ctx.moveTo(sx - 80, baseY);
    ctx.quadraticCurveTo(sx, baseY - 60, sx + 80, baseY);
    ctx.fill();
  }
  const baseY = (Math.floor(H / TILE) - 2) * TILE;
  drawHill(300, baseY);
  drawHill(900, baseY);
  drawHill(1600, baseY);
  drawHill(2400, baseY);
  drawHill(3200, baseY);
  drawHill(4000, baseY);
  drawHill(5000, baseY);
  drawHill(5800, baseY);

  // Bushes
  ctx.fillStyle = '#228B22';
  function drawBush(cx, baseY) {
    const sx = cx - cameraX * 0.5;
    if (sx < -60 || sx > W + 60) return;
    ctx.beginPath();
    ctx.arc(sx, baseY - 6, 14, Math.PI, 0);
    ctx.arc(sx + 20, baseY - 10, 16, Math.PI, 0);
    ctx.arc(sx + 40, baseY - 6, 14, Math.PI, 0);
    ctx.fill();
  }
  drawBush(150, baseY);
  drawBush(550, baseY);
  drawBush(1050, baseY);
  drawBush(1750, baseY);
  drawBush(2600, baseY);
  drawBush(3500, baseY);
  drawBush(4400, baseY);
  drawBush(5300, baseY);
}

function drawUI() {
  if (gameState === 'title') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 36px "Press Start 2P", "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SUPER MARIO MINI', W / 2, H / 2 - 40);
    ctx.font = '16px "Press Start 2P", "Courier New", monospace';
    ctx.fillText('Press SPACE or Tap to Start', W / 2, H / 2 + 20);
    ctx.fillText('← → / A D : Move', W / 2, H / 2 + 55);
    ctx.fillText('SPACE / W / ↑ : Jump', W / 2, H / 2 + 75);
    ctx.fillText('SHIFT / Z : Run', W / 2, H / 2 + 95);
    ctx.textAlign = 'start';
  } else if (gameState === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#FF4444';
    ctx.font = 'bold 36px "Press Start 2P", "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 20);
    ctx.fillStyle = '#FFF';
    ctx.font = '16px "Press Start 2P", "Courier New", monospace';
    ctx.fillText(`Final Score: ${score}`, W / 2, H / 2 + 30);
    ctx.fillText('Press SPACE to Retry', W / 2, H / 2 + 60);
    ctx.textAlign = 'start';
  } else if (gameState === 'win') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 36px "Press Start 2P", "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('YOU WIN!', W / 2, H / 2 - 30);
    ctx.fillStyle = '#FFF';
    ctx.font = '16px "Press Start 2P", "Courier New", monospace';
    ctx.fillText(`Score: ${score}  🪙 × ${coins}`, W / 2, H / 2 + 20);
    ctx.fillText('Press SPACE to Play Again', W / 2, H / 2 + 50);
    ctx.textAlign = 'start';
  }
}

function render() {
  ctx.clearRect(0, 0, W, H);

  drawBackground();

  // Draw tiles
  const startTX = Math.floor(cameraX / TILE) - 1;
  const endTX = Math.floor((cameraX + W) / TILE) + 1;
  for (let tx = startTX; tx <= endTX; tx++) {
    if (tx < 0 || tx >= LEVEL_WIDTH / TILE) continue;
    for (let ty = 0; ty < H / TILE; ty++) {
      const tile = levelMap[tx][ty];
      if (tile) {
        drawTile(tile, tx * TILE, ty * TILE);
      }
    }
  }

  // Draw coins
  coinEntities.forEach(c => drawCoin(c));

  // Draw enemies
  enemies.forEach(e => drawEnemy(e));

  // Draw player
  drawPlayer();

  // Draw particles
  drawParticles();

  // Draw overlay UI
  drawUI();
}

// ── Game loop ────────────────────────────────────────────────
function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

// ── Start / Restart ──────────────────────────────────────────
function startGame() {
  score = 0;
  coins = 0;
  lives = 3;
  gameState = 'playing';
  buildLevel();
  spawnEnemies();
  spawnCoins();
  particles = [];
  resetPlayer();
  updateUI();
}

// Touch/click to start
canvas.addEventListener('click', () => {
  if (gameState === 'title' || gameState === 'gameover' || gameState === 'win') {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    startGame();
  }
});

window.addEventListener('keydown', e => {
  if (e.code === 'Space' && (gameState === 'title' || gameState === 'gameover' || gameState === 'win')) {
    e.preventDefault();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    startGame();
  }
});

// Initialize
updateUI();
gameLoop();

console.log('🍄 Super Mario Mini ready!');
console.log('Controls: Arrow Keys / WASD to move, Space to jump, Shift to run');
console.log('Click the game or press Space to start!');
</script>
