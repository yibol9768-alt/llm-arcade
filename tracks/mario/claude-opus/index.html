<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>超级马里奥 · Claude Opus</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: #1c1a2e;
    font-family: "Segoe UI", Arial, sans-serif;
    overflow: hidden;
    user-select: none;
  }
  #wrap {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 10px;
    background:
      radial-gradient(1200px 600px at 50% -10%, #3a3560 0%, #1c1a2e 60%);
  }
  #title {
    color: #ffd34e;
    font-weight: 800;
    letter-spacing: 2px;
    font-size: clamp(16px, 3.4vw, 26px);
    text-shadow: 2px 2px 0 #7a3b00, 4px 4px 0 rgba(0,0,0,.35);
  }
  #hud {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    font-weight: 700;
    color: #fff;
    font-size: clamp(11px, 2.4vw, 15px);
  }
  .chip {
    background: rgba(0,0,0,.45);
    border: 2px solid rgba(255,255,255,.14);
    border-radius: 999px;
    padding: 5px 13px;
    display: flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
  }
  .chip b { color: #ffd34e; font-variant-numeric: tabular-nums; }
  #stage {
    position: relative;
    line-height: 0;
    box-shadow: 0 18px 40px rgba(0,0,0,.55), 0 0 0 4px #101020, 0 0 0 8px #34314f;
    border-radius: 6px;
    overflow: hidden;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    width: min(94vw, 800px);
    height: auto;
    background: #6fb7ff;
    touch-action: none;
  }
  /* Overlays */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 16px;
    color: #fff;
    background: rgba(8,8,20,.72);
    backdrop-filter: blur(2px);
    padding: 20px;
    z-index: 5;
  }
  .overlay.hidden { display: none; }
  .overlay h2 {
    font-size: clamp(24px, 6vw, 46px);
    letter-spacing: 2px;
    text-shadow: 3px 3px 0 rgba(0,0,0,.5);
  }
  .overlay .big { color: #ffd34e; }
  .overlay .lose { color: #ff6b6b; }
  .overlay p { font-size: clamp(13px, 2.8vw, 17px); opacity: .92; max-width: 560px; line-height: 1.5; }
  .btn {
    cursor: pointer;
    border: none;
    background: linear-gradient(#ffdf6c, #ffb020);
    color: #5a2b00;
    font-weight: 800;
    font-size: clamp(15px, 3vw, 19px);
    letter-spacing: 1px;
    padding: 12px 30px;
    border-radius: 12px;
    box-shadow: 0 6px 0 #b96f00, 0 10px 16px rgba(0,0,0,.35);
    transition: transform .05s, box-shadow .05s;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b96f00, 0 4px 8px rgba(0,0,0,.35); }
  .keys { font-size: clamp(11px, 2.4vw, 14px); opacity: .8; line-height: 1.7; }
  kbd {
    background: #2b2a44; border: 1px solid #4a4870; border-bottom-width: 3px;
    border-radius: 5px; padding: 1px 7px; margin: 0 1px; font-family: inherit; font-weight: 700;
  }
  /* touch controls */
  #touch {
    position: absolute; inset: 0; z-index: 4; pointer-events: none;
    display: none; justify-content: space-between; align-items: flex-end; padding: 14px;
  }
  #touch.on { display: flex; }
  .pad { display: flex; gap: 12px; pointer-events: auto; }
  .tbtn {
    width: 62px; height: 62px; border-radius: 50%;
    background: rgba(255,255,255,.16); border: 2px solid rgba(255,255,255,.35);
    color: #fff; font-size: 26px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(2px);
  }
  .tbtn:active { background: rgba(255,255,255,.4); }
  #btnJump { background: rgba(255,180,40,.35); border-color: rgba(255,210,80,.7); }
  #foot { color: #9a97c0; font-size: clamp(10px, 2.2vw, 13px); text-align: center; }
  #foot a { color: #ffd34e; text-decoration: none; }
</style>
</head>
<body>
<div id="wrap">
  <div id="title">★ 超级马里奥 · CLAUDE OPUS ★</div>
  <div id="hud">
    <div class="chip">分数 <b id="hScore">0</b></div>
    <div class="chip">🪙 <b id="hCoins">0</b></div>
    <div class="chip">生命 <b id="hLives">3</b></div>
    <div class="chip">时间 <b id="hTime">300</b></div>
    <div class="chip">世界 <b>1-1</b></div>
    <div class="chip" id="muteChip" title="按 M 静音">🔊 声音</div>
  </div>

  <div id="stage">
    <canvas id="game" width="800" height="480"></canvas>

    <!-- 开始界面 -->
    <div class="overlay" id="startScreen">
      <h2><span class="big">超级马里奥</span></h2>
      <p>跑跳穿越关卡,顶问号砖拿金币和蘑菇,踩扁板栗仔,抵达终点旗杆通关!</p>
      <button class="btn" id="startBtn">开始游戏</button>
      <div class="keys">
        <div><kbd>← →</kbd> / <kbd>A</kbd> <kbd>D</kbd> 移动 &nbsp; <kbd>空格</kbd> / <kbd>↑</kbd> / <kbd>W</kbd> 跳跃</div>
        <div><kbd>Shift</kbd> 加速跑 &nbsp; <kbd>M</kbd> 静音 &nbsp; <kbd>P</kbd> 暂停 &nbsp; <kbd>R</kbd> 重开</div>
      </div>
    </div>

    <!-- 通关 / 失败 -->
    <div class="overlay hidden" id="endScreen">
      <h2 id="endTitle"></h2>
      <p id="endMsg"></p>
      <button class="btn" id="againBtn">再玩一次</button>
    </div>

    <!-- 暂停 -->
    <div class="overlay hidden" id="pauseScreen">
      <h2>暂停</h2>
      <p>按 <kbd>P</kbd> 继续</p>
    </div>

    <!-- 触屏控制 -->
    <div id="touch">
      <div class="pad">
        <div class="tbtn" id="btnLeft">◀</div>
        <div class="tbtn" id="btnRight">▶</div>
      </div>
      <div class="pad">
        <div class="tbtn" id="btnJump">⤒</div>
      </div>
    </div>
  </div>

  <div id="foot">用键盘或触屏操作 · 单文件网页游戏 · 由 Claude Opus 生成</div>
</div>

<script>
"use strict";
(function () {
  // ------------------------------------------------------------------
  //  基础设置
  // ------------------------------------------------------------------
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const VIEW_W = canvas.width;   // 800
  const VIEW_H = canvas.height;  // 480
  const T = 40;                  // 瓦片大小
  const VIS_ROWS = VIEW_H / T;   // 12

  // 物理常量
  const GRAVITY   = 0.75;
  const MAX_FALL  = 15;
  const ACCEL     = 0.55;
  const FRICTION  = 0.42;
  const WALK_MAX  = 4.6;
  const RUN_MAX   = 7.2;
  const JUMP_V    = -14.2;
  const ENEMY_SPD = 1.15;

  // ------------------------------------------------------------------
  //  关卡设计（程序化构建瓦片网格）
  //  瓦片类型:
  //   ' ' 空   'G' 泥土地面  'S' 顶部草地  'B' 砖块  '?' 问号(金币)
  //   'M' 问号(蘑菇)  'U' 已敲空砖  'P' 水管  'X' 硬块/平台
  //   'C' 金币(可拾取)  'F' 旗杆  'f' 旗顶
  // ------------------------------------------------------------------
  const LW = 214;   // 关卡宽（瓦片）
  const LH = 12;    // 关卡高（瓦片）
  const grid = [];
  for (let y = 0; y < LH; y++) grid.push(new Array(LW).fill(' '));

  const goombaSpawns = [];
  const set = (x, y, t) => { if (x >= 0 && x < LW && y >= 0 && y < LH) grid[y][x] = t; };
  const groundTop = LH - 2; // 第10行为地表

  // 地面（含几处坑）
  const pits = [[42, 44], [78, 80], [120, 122], [158, 160]];
  const inPit = (x) => pits.some(p => x >= p[0] && x <= p[1]);
  for (let x = 0; x < LW; x++) {
    if (inPit(x)) continue;
    set(x, groundTop, 'S');
    set(x, groundTop + 1, 'G');
  }

  // 辅助:一排砖/问号
  const row = (x0, x1, y, t) => { for (let x = x0; x <= x1; x++) set(x, y, t); };
  // 阶梯
  const stairsUp = (x0, h, y0) => { for (let i = 0; i < h; i++) for (let j = 0; j <= i; j++) set(x0 + i, y0 - j, 'X'); };
  const stairsDown = (x0, h, y0) => { for (let i = 0; i < h; i++) for (let j = 0; j < (h - i); j++) set(x0 + i, y0 - j, 'X'); };
  // 水管
  const pipe = (x, h) => { for (let i = 0; i < h; i++) { set(x, groundTop - 1 - i, 'P'); set(x + 1, groundTop - 1 - i, 'P'); } };

  // --- 布置关卡内容 ---
  set(16, 7, '?');
  set(20, 7, 'B'); set(21, 7, '?'); set(22, 7, 'B'); set(23, 7, 'M'); set(24, 7, 'B');
  set(22, 3, '?');
  goombaSpawns.push(26, 27);

  pipe(31, 2);
  pipe(37, 3);
  goombaSpawns.push(34);

  // 坑 42-44 前后的金币引导
  for (let x = 39; x <= 41; x++) set(x, 5, 'C');
  row(46, 49, 7, 'B'); set(47, 7, '?'); set(48, 7, '?');
  goombaSpawns.push(52, 53);

  // 悬空平台段
  row(56, 60, 6, 'X');
  for (let x = 56; x <= 60; x++) set(x, 5, 'C');
  set(58, 3, '?');
  goombaSpawns.push(64);

  row(68, 70, 8, 'B'); set(69, 8, 'M');
  pipe(73, 2);

  // 坑 78-80
  for (let x = 75; x <= 77; x++) set(x, 5, 'C');
  set(76, 8, 'X'); set(77, 8, 'X');
  goombaSpawns.push(84, 85, 86);

  // 砖块屋顶 + 问号
  row(88, 96, 6, 'B');
  set(90, 6, '?'); set(92, 6, 'M'); set(94, 6, '?');
  for (let x = 89; x <= 95; x++) set(x, 8, 'C');
  goombaSpawns.push(100, 101);

  stairsUp(104, 4, groundTop - 1);
  pipe(112, 3);
  goombaSpawns.push(116);

  // 坑 120-122
  row(117, 119, 5, 'B'); set(118, 5, '?');
  set(124, 7, '?'); set(126, 7, '?'); set(128, 7, '?');
  goombaSpawns.push(132, 133);

  // 双层砖
  row(136, 144, 4, 'B'); row(136, 144, 7, 'B');
  set(138, 7, 'M'); set(140, 7, '?'); set(142, 7, '?');
  for (let x = 137; x <= 143; x++) set(x, 6, 'C');
  goombaSpawns.push(148, 149, 150);

  // 坑 158-160 之前的跳台
  stairsDown(152, 4, groundTop - 1);
  set(154, 3, '?');
  for (let x = 155; x <= 157; x++) set(x, 4, 'C');
  goombaSpawns.push(164, 165);

  pipe(168, 2);
  row(172, 178, 6, 'B'); set(174, 6, '?'); set(176, 6, 'M');
  goombaSpawns.push(182, 183);

  // 结尾大阶梯 + 旗杆 + 城堡
  stairsUp(186, 6, groundTop - 1);
  const poleX = 198;
  for (let y = 3; y <= groundTop - 1; y++) set(poleX, y, 'F');
  set(poleX, 2, 'f');
  // 城堡地基（硬块，纯装饰但可站）
  for (let x = poleX + 4; x <= poleX + 8; x++) { set(x, groundTop - 1, 'X'); }

  const LEVEL_PX_W = LW * T;
  const FLAG_TRIGGER = poleX * T;         // 触碰旗杆触发通关
  const POLE_BASE_Y = (groundTop) * T;    // 旗杆底部像素

  const SOLID = new Set(['G', 'S', 'B', '?', 'M', 'U', 'P', 'X']);
  const isSolidType = (t) => SOLID.has(t);
  function solidAt(col, r) {
    if (col < 0) return true;            // 左墙
    if (col >= LW) return false;
    if (r < 0 || r >= LH) return false;  // 顶部/掉坑
    return isSolidType(grid[r][col]);
  }

  // ------------------------------------------------------------------
  //  实体
  // ------------------------------------------------------------------
  const START_X = 3 * T, START_Y = (groundTop - 3) * T;

  const player = {
    x: START_X, y: START_Y, w: 26, h: 34,
    vx: 0, vy: 0, py: START_Y,
    onGround: false, facing: 1, big: false,
    walk: 0, jumpCut: false, invuln: 0, dead: false, deadTimer: 0,
    winTimer: 0
  };

  let goombas = [];
  let mushrooms = [];   // 移动中的蘑菇
  let popCoins = [];    // 敲砖冒出的金币动画
  let bumps = [];       // 砖块顶起动画
  let shards = [];      // 砖块碎片
  let floats = [];      // 漂浮的 "+100" 文字

  function spawnGoombas() {
    goombas = [];
    for (const gx of goombaSpawns) {
      goombas.push({
        x: gx * T + 6, y: (groundTop - 1) * T, w: 30, h: 32,
        vx: -ENEMY_SPD, vy: 0, alive: true, squash: 0, onGround: false
      });
    }
  }

  // ------------------------------------------------------------------
  //  游戏状态
  // ------------------------------------------------------------------
  const STATE = { START: 0, PLAY: 1, PAUSE: 2, DEAD: 3, WIN: 4, LEVELCLEAR: 5 };
  let state = STATE.START;
  let score = 0, coins = 0, lives = 3, timeLeft = 300;
  let cameraX = 0;
  let timeAcc = 0;

  // ------------------------------------------------------------------
  //  输入
  // ------------------------------------------------------------------
  const keys = { left: false, right: false, jump: false, run: false };
  let jumpPressed = false; // 边沿检测

  const KEYMAP = {
    ArrowLeft: 'left', KeyA: 'left',
    ArrowRight: 'right', KeyD: 'right',
    ArrowUp: 'jump', KeyW: 'jump', Space: 'jump',
    ShiftLeft: 'run', ShiftRight: 'run'
  };

  window.addEventListener('keydown', (e) => {
    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
    const a = KEYMAP[e.code];
    if (a) {
      if (a === 'jump' && !keys.jump) jumpPressed = true;
      keys[a] = true;
    }
    if (e.code === 'KeyM') toggleMute();
    if (e.code === 'KeyP') togglePause();
    if (e.code === 'KeyR') { if (state !== STATE.START) restartGame(); }
    if (e.code === 'Enter') {
      if (state === STATE.START) startGame();
      else if (state === STATE.WIN || state === STATE.DEAD) restartGame();
    }
  });
  window.addEventListener('keyup', (e) => {
    const a = KEYMAP[e.code];
    if (a) keys[a] = false;
  });

  // 触屏
  function bindTouch(id, act) {
    const el = document.getElementById(id);
    const on = (e) => { e.preventDefault(); if (act === 'jump' && !keys.jump) jumpPressed = true; keys[act] = true; ensureAudio(); };
    const off = (e) => { e.preventDefault(); keys[act] = false; };
    el.addEventListener('touchstart', on, { passive: false });
    el.addEventListener('touchend', off, { passive: false });
    el.addEventListener('touchcancel', off, { passive: false });
    el.addEventListener('mousedown', on);
    window.addEventListener('mouseup', off);
  }
  bindTouch('btnLeft', 'left');
  bindTouch('btnRight', 'right');
  bindTouch('btnJump', 'jump');
  if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
    document.getElementById('touch').classList.add('on');
  }

  // ------------------------------------------------------------------
  //  音效（WebAudio,程序生成）
  // ------------------------------------------------------------------
  let audioCtx = null, muted = false;
  function ensureAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { audioCtx = null; }
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  function tone(freq, dur, type, vol, when) {
    if (!audioCtx || muted) return;
    const t0 = audioCtx.currentTime + (when || 0);
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol || 0.15, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0 + dur + 0.02);
  }
  const sfx = {
    jump:  () => tone(520, 0.16, 'square', 0.14),
    coin:  () => { tone(988, 0.07, 'square', 0.16); tone(1319, 0.13, 'square', 0.16, 0.07); },
    stomp: () => tone(180, 0.12, 'triangle', 0.2),
    bump:  () => tone(220, 0.08, 'square', 0.15),
    brk:   () => { tone(300, 0.05, 'square', 0.15); tone(150, 0.12, 'square', 0.15, 0.03); },
    power: () => { [392,523,659,784].forEach((f,i)=>tone(f,0.12,'square',0.15,i*0.06)); },
    grow:  () => { [523,659,784].forEach((f,i)=>tone(f,0.1,'square',0.14,i*0.05)); },
    hurt:  () => { tone(400,0.1,'sawtooth',0.16); tone(200,0.2,'sawtooth',0.16,0.1); },
    die:   () => { [392,330,262,196].forEach((f,i)=>tone(f,0.18,'square',0.16,i*0.14)); },
    win:   () => { [392,523,659,784,1047].forEach((f,i)=>tone(f,0.16,'square',0.15,i*0.13)); },
    clear: () => { [523,659,784,1047,784,1047].forEach((f,i)=>tone(f,0.18,'triangle',0.15,i*0.16)); }
  };
  function toggleMute() {
    muted = !muted;
    document.getElementById('muteChip').textContent = muted ? '🔇 静音' : '🔊 声音';
  }
  document.getElementById('muteChip').addEventListener('click', toggleMute);

  // ------------------------------------------------------------------
  //  碰撞解析
  // ------------------------------------------------------------------
  function resolveX(e) {
    const dir = Math.sign(e.vx);
    if (dir === 0) return false;
    const lead = dir > 0 ? e.x + e.w : e.x;
    const col = Math.floor(lead / T);
    const top = Math.floor(e.y / T);
    const bot = Math.floor((e.y + e.h - 1) / T);
    for (let r = top; r <= bot; r++) {
      if (solidAt(col, r)) {
        if (dir > 0) e.x = col * T - e.w; else e.x = (col + 1) * T;
        e.vx = 0;
        return true;
      }
    }
    return false;
  }
  // 返回顶到的砖块 {col,row} 或 null
  function resolveY(e) {
    const dir = Math.sign(e.vy);
    e.onGround = false;
    if (dir === 0) return null;
    const lead = dir > 0 ? e.y + e.h : e.y;
    const rr = Math.floor(lead / T);
    const left = Math.floor((e.x + 3) / T);
    const right = Math.floor((e.x + e.w - 4) / T);
    for (let c = left; c <= right; c++) {
      if (solidAt(c, rr)) {
        if (dir > 0) { e.y = rr * T - e.h; e.vy = 0; e.onGround = true; return null; }
        else { e.y = (rr + 1) * T; e.vy = 0; return { col: c, row: rr }; }
      }
    }
    return null;
  }

  // ------------------------------------------------------------------
  //  砖块 / 问号交互
  // ------------------------------------------------------------------
  function hitBlock(col, r) {
    const t = grid[r][col];
    bumps.push({ col, row: r, t: 0 });
    if (t === '?' || t === 'M') {
      grid[r][col] = 'U';
      if (t === 'M') {
        // 冒出蘑菇
        mushrooms.push({ x: col * T + 6, y: r * T - 30, w: 28, h: 28, vx: 1.4, vy: -2, onGround: false, emerge: 16 });
        sfx.power();
      } else {
        coins++; addScore(200);
        popCoins.push({ x: col * T + T / 2, y: r * T, vy: -9, t: 0 });
        sfx.coin();
      }
    } else if (t === 'B') {
      if (player.big) {
        // 打碎
        grid[r][col] = ' ';
        sfx.brk();
        addScore(50);
        for (let i = 0; i < 4; i++) {
          shards.push({
            x: col * T + (i % 2) * 20 + 6, y: r * T + Math.floor(i / 2) * 20 + 4,
            vx: (i % 2 ? 2.4 : -2.4), vy: -6 - Math.random() * 2, t: 0
          });
        }
      } else {
        sfx.bump();
      }
    } else {
      sfx.bump();
    }
  }

  function addScore(n) { score += n; }
  function addFloat(x, y, text) { floats.push({ x, y, text, t: 0 }); }

  // ------------------------------------------------------------------
  //  更新（固定步长 60Hz）
  // ------------------------------------------------------------------
  function stepPlayer() {
    const p = player;
    p.py = p.y;

    // 水平输入
    const max = keys.run ? RUN_MAX : WALK_MAX;
    if (keys.left && !keys.right) { p.vx -= ACCEL; p.facing = -1; }
    else if (keys.right && !keys.left) { p.vx += ACCEL; p.facing = 1; }
    else {
      if (p.vx > 0) p.vx = Math.max(0, p.vx - FRICTION);
      else if (p.vx < 0) p.vx = Math.min(0, p.vx + FRICTION);
    }
    p.vx = Math.max(-max, Math.min(max, p.vx));

    // 跳跃
    if (jumpPressed && p.onGround) {
      p.vy = JUMP_V; p.onGround = false; p.jumpCut = false; sfx.jump();
    }
    if (!keys.jump && p.vy < 0 && !p.jumpCut) { p.vy *= 0.45; p.jumpCut = true; }
    jumpPressed = false;

    // 水平移动
    p.x += p.vx;
    if (p.x < 0) { p.x = 0; p.vx = 0; }
    resolveX(p);

    // 垂直移动
    p.vy = Math.min(MAX_FALL, p.vy + GRAVITY);
    p.y += p.vy;
    const hit = resolveY(p);
    if (hit) hitBlock(hit.col, hit.row);

    // 行走动画帧
    if (p.onGround && Math.abs(p.vx) > 0.3) p.walk += Math.abs(p.vx) * 0.04;
    else if (p.onGround) p.walk = 0;

    if (p.invuln > 0) p.invuln--;

    // 掉坑
    if (p.y > VIEW_H + 80) { killPlayer(); return; }

    // 拾取金币瓦片
    collectCoins();

    // 敌人 / 蘑菇碰撞
    checkGoombas();
    checkMushrooms();

    // 到达旗杆
    if (p.x + p.w >= FLAG_TRIGGER && state === STATE.PLAY) {
      startLevelClear();
    }
  }

  function playerRect() { return { x: player.x, y: player.y, w: player.w, h: player.h }; }
  function overlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function collectCoins() {
    const p = player;
    const c0 = Math.floor(p.x / T), c1 = Math.floor((p.x + p.w) / T);
    const r0 = Math.floor(p.y / T), r1 = Math.floor((p.y + p.h) / T);
    for (let r = r0; r <= r1; r++) for (let c = c0; c <= c1; c++) {
      if (r < 0 || r >= LH || c < 0 || c >= LW) continue;
      if (grid[r][c] === 'C') {
        grid[r][c] = ' ';
        coins++; addScore(100); sfx.coin();
        addFloat(c * T + 8, r * T, '+100');
      }
    }
  }

  function checkGoombas() {
    const p = player;
    for (const g of goombas) {
      if (!g.alive) continue;
      if (!overlap(playerRect(), g)) continue;
      const falling = p.vy > 0 && (p.py + p.h) <= g.y + 14;
      if (falling) {
        g.alive = false; g.squash = 24;
        p.vy = JUMP_V * 0.62;
        addScore(100); addFloat(g.x, g.y - 10, '+100'); sfx.stomp();
      } else if (p.invuln <= 0) {
        damagePlayer();
      }
    }
  }

  function checkMushrooms() {
    const p = player;
    for (const m of mushrooms) {
      if (m.dead) continue;
      if (overlap(playerRect(), m)) {
        m.dead = true;
        if (!p.big) {
          p.big = true; p.h = 54; p.y -= 20; sfx.grow();
        } else { addScore(1000); }
        addScore(1000); addFloat(m.x, m.y - 10, '+1000');
      }
    }
    mushrooms = mushrooms.filter(m => !m.dead);
  }

  function damagePlayer() {
    const p = player;
    if (p.big) {
      p.big = false; p.h = 34; p.y += 20; p.invuln = 90; sfx.hurt();
    } else {
      killPlayer();
    }
  }

  function killPlayer() {
    if (player.dead) return;
    player.dead = true; player.vy = -11; player.vx = 0;
    player.deadTimer = 0;
    state = STATE.DEAD;
    sfx.die();
  }

  function stepGoomba(g) {
    if (!g.alive) { if (g.squash > 0) g.squash--; return; }
    g.vy = Math.min(MAX_FALL, g.vy + GRAVITY);
    g.y += g.vy;
    resolveY(g);
    // 边缘检测 + 撞墙掉头
    g.x += g.vx;
    const wall = resolveX(g);
    if (wall) g.vx = -g.vx;
    if (g.onGround) {
      // 前方是否有地：无地则掉头
      const aheadCol = Math.floor((g.vx > 0 ? g.x + g.w + 2 : g.x - 2) / T);
      const belowRow = Math.floor((g.y + g.h + 2) / T);
      if (!solidAt(aheadCol, belowRow)) g.vx = -g.vx;
    }
    if (g.y > VIEW_H + 120) g.alive = false;
  }

  function stepMushroom(m) {
    if (m.emerge > 0) { m.emerge--; m.y -= 1; return; }
    m.vy = Math.min(MAX_FALL, m.vy + GRAVITY);
    m.y += m.vy;
    resolveY(m);
    m.x += m.vx;
    if (resolveX(m)) m.vx = -m.vx;
    if (m.y > VIEW_H + 120) m.dead = true;
  }

  function updatePlay(dt) {
    stepPlayer();
    if (player.dead) return;
    for (const g of goombas) stepGoomba(g);
    for (const m of mushrooms) stepMushroom(m);

    // 粒子
    popCoins.forEach(c => { c.vy += 0.6; c.y += c.vy; c.t++; });
    popCoins = popCoins.filter(c => c.t < 34);
    shards.forEach(s => { s.vy += 0.6; s.x += s.vx; s.y += s.vy; s.t++; });
    shards = shards.filter(s => s.t < 60);
    bumps.forEach(b => b.t++);
    bumps = bumps.filter(b => b.t < 12);
    floats.forEach(f => { f.y -= 0.8; f.t++; });
    floats = floats.filter(f => f.t < 45);

    // 倒计时
    timeAcc += dt;
    if (timeAcc >= 0.42) {
      timeAcc = 0; timeLeft--;
      if (timeLeft <= 0) { timeLeft = 0; killPlayer(); }
    }

    // 相机
    const target = player.x + player.w / 2 - VIEW_W / 2;
    cameraX = Math.max(0, Math.min(LEVEL_PX_W - VIEW_W, target));
  }

  function updateDead(dt) {
    player.deadTimer++;
    player.vy = Math.min(MAX_FALL, player.vy + GRAVITY);
    player.y += player.vy;
    if (player.deadTimer > 80) {
      lives--;
      if (lives <= 0) endGame(false);
      else respawn();
    }
  }

  function updateLevelClear(dt) {
    // 沿旗杆下滑
    const p = player;
    if (p.y + p.h < POLE_BASE_Y) {
      p.y += 3.2;
      p.x = FLAG_TRIGGER - p.w - 2;
    } else {
      p.winTimer++;
      // 走向城堡
      if (p.winTimer < 60) { p.x += 2.2; p.walk += 0.2; }
      else { endGame(true); }
    }
    const target = player.x + player.w / 2 - VIEW_W / 2;
    cameraX = Math.max(0, Math.min(LEVEL_PX_W - VIEW_W, target));
  }

  function startLevelClear() {
    if (state === STATE.LEVELCLEAR) return;
    state = STATE.LEVELCLEAR;
    player.vx = 0; player.vy = 0; player.winTimer = 0;
    // 依剩余时间加分
    addScore(timeLeft * 50);
    sfx.clear();
  }

  function respawn() {
    player.x = START_X; player.y = START_Y;
    player.vx = 0; player.vy = 0; player.dead = false; player.deadTimer = 0;
    player.big = false; player.h = 34; player.invuln = 60; player.facing = 1;
    timeLeft = 300; timeAcc = 0;
    spawnGoombas();
    mushrooms = []; popCoins = []; shards = []; bumps = []; floats = [];
    cameraX = 0;
    state = STATE.PLAY;
  }

  // ------------------------------------------------------------------
  //  绘制
  // ------------------------------------------------------------------
  const cloudSeed = [];
  for (let i = 0; i < 24; i++) cloudSeed.push({ x: i * 380 + (i * 137 % 200), y: 40 + (i * 53 % 120), s: 0.6 + (i % 3) * 0.25 });
  const hillSeed = [];
  for (let i = 0; i < 18; i++) hillSeed.push({ x: i * 520 + (i * 90 % 300), big: i % 2 === 0 });
  const bushSeed = [];
  for (let i = 0; i < 30; i++) bushSeed.push({ x: i * 300 + (i * 70 % 180) });

  function drawBackground() {
    // 天空渐变
    const g = ctx.createLinearGradient(0, 0, 0, VIEW_H);
    g.addColorStop(0, '#5fa8ff');
    g.addColorStop(0.55, '#8fc9ff');
    g.addColorStop(1, '#cdeaff');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);

    // 远山（视差）
    ctx.fillStyle = '#7dc96a';
    for (const h of hillSeed) {
      const hx = h.x - cameraX * 0.35;
      if (hx < -300 || hx > VIEW_W + 300) continue;
      const base = groundTop * T;
      const r = h.big ? 120 : 80;
      ctx.beginPath();
      ctx.moveTo(hx - r, base);
      ctx.quadraticCurveTo(hx, base - r * 1.3, hx + r, base);
      ctx.fill();
    }
    // 灌木
    ctx.fillStyle = '#4fae4a';
    for (const b of bushSeed) {
      const bx = b.x - cameraX * 0.55;
      if (bx < -200 || bx > VIEW_W + 200) continue;
      const base = groundTop * T;
      for (let k = 0; k < 3; k++) {
        ctx.beginPath();
        ctx.arc(bx + k * 34, base - 6, 26, Math.PI, 0);
        ctx.fill();
      }
      ctx.fillRect(bx - 26, base - 8, 26 * 3 + 26, 8);
      ctx.fillStyle = '#4fae4a';
    }
    // 云
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    for (const c of cloudSeed) {
      const cx = c.x - cameraX * 0.25;
      if (cx < -160 || cx > VIEW_W + 160) continue;
      drawCloud(cx, c.y, c.s);
    }
  }

  function drawCloud(x, y, s) {
    ctx.beginPath();
    ctx.arc(x, y, 20 * s, 0, Math.PI * 2);
    ctx.arc(x + 24 * s, y + 4 * s, 26 * s, 0, Math.PI * 2);
    ctx.arc(x + 52 * s, y, 20 * s, 0, Math.PI * 2);
    ctx.arc(x + 26 * s, y - 12 * s, 20 * s, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawTiles() {
    const c0 = Math.floor(cameraX / T);
    const c1 = Math.min(LW - 1, c0 + VIS_ROWS * 2 + 2);
    for (let c = c0; c <= c1; c++) {
      for (let r = 0; r < LH; r++) {
        const t = grid[r][c];
        if (t === ' ') continue;
        let px = c * T - cameraX;
        let py = r * T;
        // 顶起动画
        const bump = bumps.find(b => b.col === c && b.row === r);
        if (bump) py -= Math.sin((bump.t / 12) * Math.PI) * 10;
        drawTile(t, px, py, c, r);
      }
    }
  }

  function drawTile(t, px, py, col, r) {
    switch (t) {
      case 'G': // 泥土
        ctx.fillStyle = '#b5651d'; ctx.fillRect(px, py, T, T);
        ctx.fillStyle = '#8b4a12';
        ctx.fillRect(px + 3, py + 6, 8, 8); ctx.fillRect(px + 26, py + 20, 8, 8);
        ctx.fillRect(px + 16, py + 30, 8, 6);
        ctx.strokeStyle = 'rgba(0,0,0,.18)'; ctx.strokeRect(px + .5, py + .5, T - 1, T - 1);
        break;
      case 'S': // 草地表层
        ctx.fillStyle = '#b5651d'; ctx.fillRect(px, py, T, T);
        ctx.fillStyle = '#5fbf3f'; ctx.fillRect(px, py, T, 12);
        ctx.fillStyle = '#4aa02f'; for (let i = 0; i < 5; i++) ctx.fillRect(px + i * 8, py + 8, 5, 5);
        ctx.strokeStyle = 'rgba(0,0,0,.15)'; ctx.strokeRect(px + .5, py + .5, T - 1, T - 1);
        break;
      case 'B': // 砖
        ctx.fillStyle = '#c1662a'; ctx.fillRect(px, py, T, T);
        ctx.fillStyle = '#9c4a18';
        ctx.fillRect(px, py + 9, T, 2); ctx.fillRect(px, py + 20, T, 2); ctx.fillRect(px, py + 31, T, 2);
        ctx.fillRect(px + 12, py, 2, 9); ctx.fillRect(px + 27, py + 11, 2, 9);
        ctx.fillRect(px + 12, py + 22, 2, 9); ctx.fillRect(px + 27, py + 33, 2, 7);
        ctx.fillStyle = 'rgba(255,255,255,.14)'; ctx.fillRect(px, py, T, 3);
        break;
      case '?':
      case 'M': { // 问号砖（发光）
        const glow = 0.5 + 0.5 * Math.sin((r + col + tick * 0.08));
        ctx.fillStyle = `rgb(${230},${170 + glow * 40 | 0},${20})`;
        ctx.fillRect(px, py, T, T);
        ctx.fillStyle = '#a5720a';
        ctx.fillRect(px, py, T, 3); ctx.fillRect(px, py + T - 3, T, 3);
        ctx.fillRect(px, py, 3, T); ctx.fillRect(px + T - 3, py, 3, T);
        // 四角铆钉
        ctx.fillStyle = '#fff2b0';
        [[6,6],[T-11,6],[6,T-11],[T-11,T-11]].forEach(o => ctx.fillRect(px+o[0], py+o[1], 5, 5));
        // 问号
        ctx.fillStyle = '#8a5a00';
        ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('?', px + T / 2, py + T / 2 + 1);
        break;
      }
      case 'U': // 敲空
        ctx.fillStyle = '#9c6a20'; ctx.fillRect(px, py, T, T);
        ctx.fillStyle = '#7a5216';
        ctx.fillRect(px, py, T, 3); ctx.fillRect(px, py + T - 3, T, 3);
        ctx.fillRect(px, py, 3, T); ctx.fillRect(px + T - 3, py, 3, T);
        break;
      case 'P': { // 水管
        const topPipe = !(r > 0 && grid[r - 1][col] === 'P');
        ctx.fillStyle = '#2fa32f';
        if (topPipe && col > 0 && grid[r][col - 1] !== 'P') {
          // 左半 + 管口（宽 2 格,画在左格时画整口）
          ctx.fillRect(px + 2, py + 6, T * 2 - 4, T - 6);
          ctx.fillStyle = '#33b833';
          ctx.fillRect(px - 2, py, T * 2 + 4, 12);
          ctx.fillStyle = '#1c7a1c';
          ctx.fillRect(px - 2, py + 12, T * 2 + 4, 3);
          // 高光
          ctx.fillStyle = 'rgba(255,255,255,.25)';
          ctx.fillRect(px + 6, py + 16, 5, T - 18);
          ctx.fillStyle = 'rgba(0,0,0,.18)';
          ctx.fillRect(px + T * 2 - 12, py + 16, 6, T - 18);
        } else if (!topPipe && col > 0 && grid[r][col - 1] !== 'P') {
          ctx.fillRect(px + 2, py, T * 2 - 4, T);
          ctx.fillStyle = 'rgba(255,255,255,.22)';
          ctx.fillRect(px + 6, py, 5, T);
          ctx.fillStyle = 'rgba(0,0,0,.18)';
          ctx.fillRect(px + T * 2 - 12, py, 6, T);
        }
        break;
      }
      case 'X': // 硬块/平台
        ctx.fillStyle = '#caa15a'; ctx.fillRect(px, py, T, T);
        ctx.fillStyle = '#a37c34';
        ctx.fillRect(px, py, T, 4); ctx.fillRect(px, py, 4, T);
        ctx.fillStyle = '#8a6526';
        ctx.fillRect(px + T - 4, py, 4, T); ctx.fillRect(px, py + T - 4, T, 4);
        ctx.fillStyle = 'rgba(255,255,255,.18)'; ctx.fillRect(px + 6, py + 6, T - 12, 4);
        break;
      case 'C': // 金币
        drawCoinSprite(px + T / 2, py + T / 2, 11);
        break;
      case 'F': // 旗杆
        ctx.fillStyle = '#cfe8c0'; ctx.fillRect(px + T / 2 - 3, py, 6, T);
        break;
      case 'f': // 旗顶球
        ctx.fillStyle = '#cfe8c0'; ctx.fillRect(px + T / 2 - 3, py + 10, 6, T - 10);
        ctx.fillStyle = '#2fa32f'; ctx.beginPath();
        ctx.arc(px + T / 2, py + 8, 8, 0, Math.PI * 2); ctx.fill();
        break;
    }
  }

  function drawCoinSprite(cx, cy, r) {
    const w = Math.abs(Math.cos(tick * 0.12)) * r + 2;
    ctx.fillStyle = '#ffd34e';
    ctx.beginPath(); ctx.ellipse(cx, cy, w, r, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#e0a800';
    ctx.beginPath(); ctx.ellipse(cx, cy, w * 0.55, r * 0.6, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff4c0';
    ctx.fillRect(cx - 1, cy - r * 0.6, 2, r * 1.2);
  }

  function drawFlagOnPole() {
    // 结尾旗子挂在旗杆上
    const px = poleX * T - cameraX;
    const topY = 2 * T + 8;
    ctx.fillStyle = '#e33';
    ctx.beginPath();
    ctx.moveTo(px + T / 2 - 3, topY);
    ctx.lineTo(px + T / 2 - 40, topY + 12);
    ctx.lineTo(px + T / 2 - 3, topY + 24);
    ctx.closePath(); ctx.fill();
  }

  function drawCastle() {
    const baseX = (poleX + 4) * T - cameraX;
    const baseY = (groundTop - 1) * T;
    const w = 5 * T;
    ctx.fillStyle = '#c0392b';
    ctx.fillRect(baseX, baseY - T * 2, w, T * 3);
    // 城垛
    ctx.fillStyle = '#a93226';
    for (let i = 0; i < 6; i++) ctx.fillRect(baseX + i * (w / 6), baseY - T * 2 - 12, w / 6 - 6, 12);
    // 门
    ctx.fillStyle = '#2c1a10';
    ctx.beginPath();
    ctx.arc(baseX + w / 2, baseY + T * 0.6, 22, Math.PI, 0);
    ctx.fill();
    ctx.fillRect(baseX + w / 2 - 22, baseY + T * 0.6, 44, T * 0.4);
    // 塔楼
    ctx.fillStyle = '#c0392b';
    ctx.fillRect(baseX + w / 2 - 26, baseY - T * 3.2, 52, T * 1.3);
    ctx.fillStyle = '#a93226';
    for (let i = 0; i < 3; i++) ctx.fillRect(baseX + w / 2 - 26 + i * 18, baseY - T * 3.2 - 10, 12, 10);
    // 窗
    ctx.fillStyle = '#2c1a10';
    ctx.fillRect(baseX + w / 2 - 8, baseY - T * 2.9, 16, 20);
  }

  // --- 马里奥 ---
  function drawMario() {
    const p = player;
    if (p.invuln > 0 && Math.floor(p.invuln / 4) % 2 === 0 && !p.dead) return; // 闪烁
    const px = p.x - cameraX, py = p.y;
    ctx.save();
    ctx.translate(px + p.w / 2, py);
    ctx.scale(p.facing, 1);
    ctx.translate(-p.w / 2, 0);
    if (p.big) drawMarioBig(p); else drawMarioSmall(p);
    ctx.restore();
  }

  function limbPhase(p) {
    if (p.dead) return 0;
    if (!p.onGround) return 2; // 跳跃姿势
    if (Math.abs(p.vx) < 0.3) return 0;
    return (Math.floor(p.walk) % 2 === 0) ? 1 : -1;
  }

  const RED = '#e2352a', DRED = '#a4271f', SKIN = '#f7c69b', DSKIN = '#c98d5a';
  const BLUE = '#2a52c9', DBLUE = '#1c3a8f', BROWN = '#7a3b12', HAIR = '#3a1d08';

  function drawMarioSmall(p) {
    const ph = limbPhase(p);
    const W = p.w, H = p.h;
    // 帽
    ctx.fillStyle = RED; ctx.fillRect(5, 0, 16, 6); ctx.fillRect(3, 4, 20, 4);
    ctx.fillRect(19, 4, 8, 5); // 帽檐
    // 脸
    ctx.fillStyle = SKIN; ctx.fillRect(6, 8, 15, 10);
    ctx.fillStyle = HAIR; ctx.fillRect(4, 8, 4, 8); // 鬓角
    // 眼
    ctx.fillStyle = '#222'; ctx.fillRect(15, 10, 3, 4);
    // 鼻/胡
    ctx.fillStyle = DSKIN; ctx.fillRect(19, 12, 4, 3);
    ctx.fillStyle = HAIR; ctx.fillRect(12, 15, 10, 3);
    // 身体（背带裤 + 红衣）
    ctx.fillStyle = RED; ctx.fillRect(5, 18, 16, 6);
    ctx.fillStyle = BLUE; ctx.fillRect(7, 20, 12, 8);
    ctx.fillStyle = '#ffd34e'; ctx.fillRect(9, 21, 3, 3); ctx.fillRect(15, 21, 3, 3); // 纽扣
    // 手
    ctx.fillStyle = SKIN;
    if (ph === 2) { ctx.fillRect(1, 16, 5, 5); ctx.fillRect(20, 16, 5, 5); }
    else { ctx.fillRect(2, 20, 5, 5); ctx.fillRect(19, 20, 5, 5); }
    // 腿/鞋
    ctx.fillStyle = BROWN;
    if (ph === 2) { ctx.fillRect(6, 28, 7, 6); ctx.fillRect(14, 28, 7, 6); }
    else if (ph === 1) { ctx.fillRect(5, 28, 7, 6); ctx.fillRect(15, 28, 7, 6); }
    else if (ph === -1) { ctx.fillRect(7, 28, 7, 6); ctx.fillRect(13, 28, 7, 6); }
    else { ctx.fillRect(6, 28, 6, 6); ctx.fillRect(14, 28, 6, 6); }
  }

  function drawMarioBig(p) {
    const ph = limbPhase(p);
    // 帽
    ctx.fillStyle = RED; ctx.fillRect(6, 0, 18, 7); ctx.fillRect(4, 5, 22, 4);
    ctx.fillRect(22, 5, 9, 6);
    // 脸
    ctx.fillStyle = SKIN; ctx.fillRect(7, 9, 17, 14);
    ctx.fillStyle = HAIR; ctx.fillRect(5, 9, 4, 12);
    ctx.fillStyle = '#222'; ctx.fillRect(18, 12, 3, 5);
    ctx.fillStyle = DSKIN; ctx.fillRect(22, 15, 5, 4);
    ctx.fillStyle = HAIR; ctx.fillRect(13, 19, 12, 4);
    // 躯干
    ctx.fillStyle = RED; ctx.fillRect(5, 23, 20, 10);
    ctx.fillStyle = BLUE; ctx.fillRect(6, 30, 18, 16);
    ctx.fillStyle = RED; ctx.fillRect(6, 30, 4, 10); ctx.fillRect(20, 30, 4, 10); // 背带
    ctx.fillStyle = '#ffd34e'; ctx.fillRect(10, 33, 4, 4); ctx.fillRect(16, 33, 4, 4);
    // 手
    ctx.fillStyle = SKIN;
    if (ph === 2) { ctx.fillRect(1, 22, 6, 7); ctx.fillRect(24, 22, 6, 7); }
    else { ctx.fillRect(2, 31, 6, 7); ctx.fillRect(23, 31, 6, 7); }
    // 腿/鞋
    ctx.fillStyle = BLUE;
    ctx.fillRect(8, 44, 6, 6); ctx.fillRect(17, 44, 6, 6);
    ctx.fillStyle = BROWN;
    if (ph === 1) { ctx.fillRect(5, 48, 9, 6); ctx.fillRect(17, 48, 9, 6); }
    else if (ph === -1) { ctx.fillRect(7, 48, 9, 6); ctx.fillRect(15, 48, 9, 6); }
    else { ctx.fillRect(7, 48, 8, 6); ctx.fillRect(16, 48, 8, 6); }
  }

  function drawGoomba(g) {
    const px = g.x - cameraX, py = g.y;
    if (!g.alive) {
      if (g.squash > 0) {
        ctx.fillStyle = '#6b4423';
        ctx.fillRect(px + 2, py + g.h - 10, g.w - 4, 10);
      }
      return;
    }
    const wig = Math.sin(tick * 0.2) * 2;
    // 身体
    ctx.fillStyle = '#8b5a2b';
    ctx.beginPath();
    ctx.moveTo(px + 2, py + g.h);
    ctx.lineTo(px + g.w - 2, py + g.h);
    ctx.lineTo(px + g.w - 4, py + 12);
    ctx.quadraticCurveTo(px + g.w / 2, py - 4, px + 4, py + 12);
    ctx.closePath(); ctx.fill();
    // 底
    ctx.fillStyle = '#5c3a1a';
    ctx.fillRect(px + 2 + wig, py + g.h - 8, 10, 8);
    ctx.fillRect(px + g.w - 12 - wig, py + g.h - 8, 10, 8);
    // 眼
    ctx.fillStyle = '#fff';
    ctx.fillRect(px + 7, py + 12, 7, 8); ctx.fillRect(px + g.w - 14, py + 12, 7, 8);
    ctx.fillStyle = '#000';
    ctx.fillRect(px + 11, py + 14, 3, 5); ctx.fillRect(px + g.w - 12, py + 14, 3, 5);
    // 眉
    ctx.fillStyle = '#3a2410';
    ctx.fillRect(px + 6, py + 10, 9, 3); ctx.fillRect(px + g.w - 15, py + 10, 9, 3);
  }

  function drawMushroom(m) {
    const px = m.x - cameraX, py = m.y;
    ctx.fillStyle = '#e2352a';
    ctx.beginPath(); ctx.arc(px + m.w / 2, py + 10, m.w / 2, Math.PI, 0); ctx.fill();
    ctx.fillRect(px, py + 10, m.w, 6);
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(px + 8, py + 8, 4, 0, Math.PI * 2); ctx.arc(px + m.w - 8, py + 8, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#f7c69b';
    ctx.fillRect(px + 6, py + 16, m.w - 12, m.h - 16);
    ctx.fillStyle = '#000';
    ctx.fillRect(px + 10, py + 20, 3, 4); ctx.fillRect(px + m.w - 13, py + 20, 3, 4);
  }

  function drawParticles() {
    // 冒出的金币
    for (const c of popCoins) {
      drawCoinSprite(c.x - cameraX, c.y, 11);
    }
    // 砖碎片
    ctx.fillStyle = '#9c4a18';
    for (const s of shards) ctx.fillRect(s.x - cameraX, s.y, 8, 8);
    // 漂浮文字
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
    ctx.font = 'bold 15px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    for (const f of floats) {
      ctx.strokeText(f.text, f.x - cameraX, f.y);
      ctx.fillText(f.text, f.x - cameraX, f.y);
    }
  }

  function render() {
    drawBackground();
    drawTiles();
    drawFlagOnPole();
    drawCastle();
    for (const g of goombas) drawGoomba(g);
    for (const m of mushrooms) drawMushroom(m);
    drawParticles();
    drawMario();
  }

  // ------------------------------------------------------------------
  //  HUD
  // ------------------------------------------------------------------
  const elScore = document.getElementById('hScore');
  const elCoins = document.getElementById('hCoins');
  const elLives = document.getElementById('hLives');
  const elTime = document.getElementById('hTime');
  function syncHUD() {
    elScore.textContent = score;
    elCoins.textContent = coins;
    elLives.textContent = lives;
    elTime.textContent = timeLeft;
  }

  // ------------------------------------------------------------------
  //  流程控制
  // ------------------------------------------------------------------
  const startScreen = document.getElementById('startScreen');
  const endScreen = document.getElementById('endScreen');
  const pauseScreen = document.getElementById('pauseScreen');

  function startGame() {
    ensureAudio();
    score = 0; coins = 0; lives = 3; timeLeft = 300; timeAcc = 0;
    spawnGoombas();
    respawn();
    startScreen.classList.add('hidden');
    endScreen.classList.add('hidden');
    state = STATE.PLAY;
  }
  function restartGame() {
    endScreen.classList.add('hidden');
    startGame();
  }
  function endGame(win) {
    state = win ? STATE.WIN : STATE.DEAD;
    const title = document.getElementById('endTitle');
    const msg = document.getElementById('endMsg');
    if (win) {
      state = STATE.WIN;
      title.innerHTML = '<span class="big">🏰 通关成功!</span>';
      msg.innerHTML = `你成功抵达城堡!<br>最终得分 <b>${score}</b> · 金币 <b>${coins}</b>`;
      sfx.win();
    } else {
      title.innerHTML = '<span class="lose">💀 游戏结束</span>';
      msg.innerHTML = `生命耗尽了。<br>本局得分 <b>${score}</b> · 金币 <b>${coins}</b>`;
    }
    endScreen.classList.remove('hidden');
  }
  function togglePause() {
    if (state === STATE.PLAY) { state = STATE.PAUSE; pauseScreen.classList.remove('hidden'); }
    else if (state === STATE.PAUSE) { state = STATE.PLAY; pauseScreen.classList.add('hidden'); }
  }

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('againBtn').addEventListener('click', restartGame);
  // 点击画布也可开始/继续
  canvas.addEventListener('mousedown', () => { ensureAudio(); if (state === STATE.START) startGame(); });

  // ------------------------------------------------------------------
  //  主循环（固定步长积分）
  // ------------------------------------------------------------------
  let tick = 0;
  let last = 0, acc = 0;
  const STEP = 1 / 60;

  function frame(now) {
    if (!last) last = now;
    let dt = (now - last) / 1000;
    last = now;
    if (dt > 0.1) dt = 0.1; // 防止卡顿后大跳
    acc += dt;

    while (acc >= STEP) {
      tick++;
      if (state === STATE.PLAY) updatePlay(STEP);
      else if (state === STATE.DEAD && player.dead) updateDead(STEP);
      else if (state === STATE.LEVELCLEAR) updateLevelClear(STEP);
      acc -= STEP;
    }

    render();
    syncHUD();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // 初始渲染一帧（开始界面下也有画面）
  render();
})();
</script>
</body>
</html>
